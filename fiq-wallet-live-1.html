<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIQ Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #0D1B2A;
  --navy-card: #162436;
  --border:    #243348;
  --gold:      #C9A84C;
  --gold-pale: #EDD98A;
  --green:     #27C384;
  --muted:     #7A90A8;
  --off:       #D8E4F0;
  --white:     #FFFFFF;
}

html, body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.shell {
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.statusbar {
  display: flex;
  justify-content: space-between;
  padding: 14px 22px 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--off);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 0;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7A5A1A, var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.topbar-name { font-size: 14px; font-weight: 600; color: var(--off); }
.topbar-loc  { font-size: 11px; color: var(--muted); margin-top: 1px; }

.scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding-bottom: 90px;
}
.scroll::-webkit-scrollbar { display: none; }

/* Loading state */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  gap: 16px;
}
.loading-pip {
  width: 12px; height: 12px;
  background: var(--gold);
  border-radius: 50%;
  animation: breathe 1.2s ease-in-out infinite;
}
.loading-text { font-size: 13px; color: var(--muted); }
@keyframes breathe {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.3; transform: scale(0.6); }
}

/* Era badge */
.era-wrap { padding: 20px 20px 0; }
.era-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 24px;
  padding: 5px 12px 5px 8px;
}
.era-pip {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  animation: breathe 2.4s ease-in-out infinite;
}
.era-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--gold-pale);
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.era-mult {
  background: var(--gold);
  color: var(--navy);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px; font-weight: 700;
  border-radius: 10px;
  padding: 1px 6px;
}

/* Balance */
.balance-block { padding: 18px 20px 0; }
.balance-label {
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.balance-amount {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 52px; font-weight: 700;
  color: var(--white);
  line-height: 1;
  letter-spacing: -2px;
}
.balance-unit {
  font-size: 20px; font-weight: 600;
  color: var(--gold);
  margin-left: 4px;
}
.balance-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.month-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(39,195,132,0.12);
  border: 1px solid rgba(39,195,132,0.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px; font-weight: 600;
  color: var(--green);
}
.balance-sub-label { font-size: 12px; color: var(--muted); }

/* Chips */
.status-row {
  padding: 18px 16px 0;
  display: flex;
  gap: 8px;
}
.chip {
  flex: 1;
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 10px;
  text-align: center;
}
.chip-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--white);
}
.chip-val.gold { color: var(--gold); }
.chip-val.green { color: var(--green); }
.chip-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Rank */
.rank-strip {
  margin: 16px 16px 0;
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}
.rank-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.rank-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--gold-pale);
}
.rank-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.rank-pos {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px; font-weight: 700;
  color: var(--green); line-height: 1;
}
.rank-pos-label { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
.progress-track {
  background: rgba(255,255,255,0.07);
  border-radius: 4px; height: 5px; overflow: hidden;
}
.progress-bar {
  height: 100%; width: 79%;
  background: linear-gradient(90deg, #7A5A1A, var(--gold));
  border-radius: 4px;
}
.progress-labels {
  display: flex; justify-content: space-between;
  margin-top: 5px; font-size: 10px; color: var(--muted);
}
.progress-labels span:last-child { color: var(--gold); }

/* Divider */
.divider {
  height: 1px; background: var(--border);
  margin: 20px 16px 0; opacity: 0.5;
}

/* Section header */
.sec-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 20px 10px;
}
.sec-hdr h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--off);
}
.sec-hdr span { font-size: 11px; color: var(--gold); }

/* Feed */
.feed { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
.feed-item {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
  animation: slideIn 0.4s ease both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feed-icon {
  width: 38px; height: 38px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  background: rgba(201,168,76,0.13);
}
.feed-body { flex: 1; min-width: 0; }
.feed-action {
  font-size: 13px; font-weight: 500; color: var(--off);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.feed-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.feed-earn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--green); flex-shrink: 0;
}

/* Nav */
.nav {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 390px; max-width: 100vw;
  background: rgba(13,27,42,0.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0 24px; z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 5px 16px; border-radius: 10px;
}
.nav-item.active { background: rgba(201,168,76,0.1); }
.nav-glyph { font-size: 19px; }
.nav-lbl { font-size: 10px; color: var(--muted); font-weight: 500; }
.nav-item.active .nav-lbl { color: var(--gold); }

@media (min-width: 440px) {
  body { display: flex; justify-content: center; }
  .shell {
    box-shadow: 0 0 0 1px var(--border), 0 40px 80px rgba(0,0,0,0.5);
    border-radius: 40px; overflow: hidden;
    margin: 24px auto; min-height: auto; height: 812px;
  }
  .nav { border-radius: 0 0 40px 40px; }
}
</style>
</head>
<body>

<div class="shell">

  <div class="statusbar">
    <span id="clock">9:41</span>
    <span>●●● WiFi ▮</span>
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar">RD</div>
      <div>
        <div class="topbar-name">Rob Dehni</div>
        <div class="topbar-loc">Dubai · MedTech</div>
      </div>
    </div>
  </div>

  <div class="scroll" id="main-content">
    <div class="loading">
      <div class="loading-pip"></div>
      <div class="loading-text">Loading FIQ wallet...</div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active">
      <div class="nav-glyph">◈</div>
      <div class="nav-lbl">Wallet</div>
    </div>
    <div class="nav-item">
      <div class="nav-glyph">📋</div>
      <div class="nav-lbl">Activity</div>
    </div>
    <div class="nav-item">
      <div class="nav-glyph">🏆</div>
      <div class="nav-lbl">Leaderboard</div>
    </div>
    <div class="nav-item">
      <div class="nav-glyph">👤</div>
      <div class="nav-lbl">Profile</div>
    </div>
  </div>

</div>

<script>
const WORKER_URL = "https://square-poetry-162a.rdehni1979.workers.dev/wallet?user=USER001";

function formatFIQ(n) {
  return n.toLocaleString();
}

function getIcon(type) {
  if (!type) return "✓";
  const t = type.toLowerCase();
  if (t.includes("genesis") || t.includes("grant")) return "⭐";
  if (t.includes("endors")) return "⭐";
  if (t.includes("visit")) return "✓";
  if (t.includes("account")) return "📍";
  if (t.includes("streak")) return "🔥";
  if (t.includes("onboard")) return "🎯";
  return "✓";
}

function getIconBg(type) {
  if (!type) return "rgba(39,195,132,0.12)";
  const t = type.toLowerCase();
  if (t.includes("genesis") || t.includes("grant") || t.includes("endors")) return "rgba(201,168,76,0.13)";
  if (t.includes("account")) return "rgba(168,85,247,0.12)";
  if (t.includes("streak")) return "rgba(240,165,0,0.12)";
  return "rgba(39,195,132,0.12)";
}

async function loadWallet() {
  try {
    const res = await fetch(WORKER_URL);
    const data = await res.json();

    const content = document.getElementById("main-content");
    content.innerHTML = `
      <div class="era-wrap">
        <div class="era-badge">
          <div class="era-pip"></div>
          <span class="era-text">${data.era} Contributor</span>
          <span class="era-mult">${data.era_multiplier}× FIQ</span>
        </div>
      </div>

      <div class="balance-block">
        <div class="balance-label">Lifetime FIQ</div>
        <div class="balance-amount">${formatFIQ(data.lifetime_fiq)}<span class="balance-unit">FIQ</span></div>
        <div class="balance-sub">
          <div class="month-pill">▲ ${data.transaction_count} transactions</div>
          <div class="balance-sub-label">all time</div>
        </div>
      </div>

      <div class="status-row">
        <div class="chip">
          <div class="chip-val gold">100</div>
          <div class="chip-lbl">Reputation</div>
        </div>
        <div class="chip">
          <div class="chip-val">5.0</div>
          <div class="chip-lbl">Quality</div>
        </div>
        <div class="chip">
          <div class="chip-val green">#1</div>
          <div class="chip-lbl">Company rank</div>
        </div>
      </div>

      <div class="rank-strip">
        <div class="rank-top">
          <div>
            <div class="rank-name">⭐ Genesis Contributor</div>
            <div class="rank-sub">Next: Field Authority — 12,660 FIQ to go</div>
          </div>
          <div>
            <div class="rank-pos">#1</div>
            <div class="rank-pos-label">Company rank</div>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
        <div class="progress-labels">
          <span>${formatFIQ(data.lifetime_fiq)} earned</span>
          <span>Field Authority at 500,000</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="sec-hdr">
        <h3>Recent earnings</h3>
        <span>${data.transaction_count} total</span>
      </div>

      <div class="feed">
        ${data.transactions.map((t, i) => `
          <div class="feed-item" style="animation-delay:${i * 0.08}s">
            <div class="feed-icon" style="background:${getIconBg(t.type)}">${getIcon(t.type)}</div>
            <div class="feed-body">
              <div class="feed-action">${t.type || "Contribution"}</div>
              <div class="feed-meta">${t.id} · ${t.description ? t.description.substring(0, 30) + "..." : "FIQ Engine V1"}</div>
            </div>
            <div class="feed-earn">+${formatFIQ(t.amount)}</div>
          </div>
        `).join("")}
      </div>

      <div style="height:8px;"></div>
    `;
  } catch (err) {
    document.getElementById("main-content").innerHTML = `
      <div class="loading">
        <div style="font-size:13px;color:#E05555;">Failed to load wallet</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">${err.message}</div>
      </div>
    `;
  }
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
}
updateClock();
setInterval(updateClock, 60000);

loadWallet();
</script>
</body>
</html>
