<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Open Actions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:18px;padding-bottom:40px}
.container{max-width:900px;margin:0 auto}
.topbar{text-align:center;margin-bottom:14px}
.topbar h1{font-size:23px;color:#0b1f3a;font-weight:800;letter-spacing:-0.4px}
.topbar p{color:#7a8aa3;font-size:12.5px;margin-top:4px;font-weight:600}
.manager-badge{
  display:inline-block;background:#fff3e0;color:#d98a1c;border:1px solid #ffe5b3;border-radius:8px;
  font-size:10.5px;font-weight:800;padding:3px 10px;margin-left:8px;text-transform:uppercase;letter-spacing:0.5px;
}
.home-btn{
  display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;
  text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:16px;border:1px solid #e3ebf5;
  box-shadow:0 2px 8px rgba(11,31,58,0.05);
}
.home-btn:hover{border-color:#2f8fff}

.filter-bar{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.filter-bar h3{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.filter-select{width:100%;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;font-size:12.5px;outline:none;font-weight:600}
.filter-select:focus{border-color:#2f8fff}
.filter-btns{display:flex;gap:8px}
.fbtn-apply{flex:1;padding:11px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:10px;font-size:12.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.3)}
.fbtn-reset{flex:1;padding:11px;background:#fff;color:#7a8aa3;border:1.5px solid #e3ebf5;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.filter-status{font-size:10.5px;color:#2f8fff;margin-top:8px;text-align:center;min-height:14px;font-weight:700}

.stats-row{display:flex;gap:10px;margin-bottom:18px}
.stat-pill{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px 12px;font-size:11.5px;color:#7a8aa3;flex:1;text-align:center;font-weight:700;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.stat-pill span{display:block;font-size:24px;font-weight:800;color:#2f8fff;margin-bottom:4px}
.stat-pill.high span{color:#e0344a}

.section-title{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #e3ebf5;display:flex;align-items:center;gap:8px}

.account-block{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.account-block.high{border-left:4px solid #e0344a}
.account-block.medium{border-left:4px solid #d98a1c}
.account-block.low{border-left:4px solid #1fa861}
.account-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.account-name{font-size:14.5px;font-weight:800;color:#0b1f3a}
.account-meta{font-size:11.5px;color:#aab8cc;margin-top:3px;font-weight:600}
.priority-badge{font-size:10.5px;padding:4px 11px;border-radius:8px;font-weight:800;white-space:nowrap}
.badge-high{background:#ffe5e8;color:#e0344a}
.badge-medium{background:#fff3e0;color:#d98a1c}
.badge-low{background:#e3f8ea;color:#1fa861}

/* Expand/collapse button for account card */
.ab-expand-btn{display:block;width:100%;padding:8px 14px;background:#f4f8fc;color:#2f8fff;border:1px solid #e3ebf5;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:background 0.15s;touch-action:manipulation}
.ab-expand-btn:hover{background:#eaf3ff;border-color:#2f8fff}

/* Action body — hidden by default */
.action-list-body{display:none;margin-top:10px;border-top:1px solid #eef3f9;padding-top:10px}

.action-list{margin-top:0}
.action-item{font-size:12.5px;color:#3a4a63;padding:6px 0;border-bottom:1px solid #f4f8fc;display:flex;align-items:flex-start;gap:8px;line-height:1.6;font-weight:500}
.action-item:last-child{border-bottom:none;padding-bottom:0}
.action-bullet{color:#2f8fff;flex-shrink:0;margin-top:1px;font-weight:800}
.action-footer{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.af-badge{font-size:10.5px;padding:4px 11px;border-radius:8px;font-weight:700}
.af-rep{background:#eaf3ff;color:#2f8fff}
.af-terr{background:#eef3f9;color:#5b6b85}

/* Per-item expand/collapse for long action text */
.ai-headline{font-size:12.5px;color:#3a4a63;line-height:1.6;font-weight:500}
.ai-full{font-size:12.5px;color:#3a4a63;line-height:1.6;font-weight:500;white-space:pre-wrap;display:none}
.ai-toggle{font-size:11px;color:#2f8fff;font-weight:700;cursor:pointer;user-select:none;margin-left:4px;flex-shrink:0}

.loading{text-align:center;padding:60px 20px;color:#aab8cc;font-weight:600}
.spinner{width:36px;height:36px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#aab8cc;font-size:13px;padding:30px;font-weight:600}

.access-denied{
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:80px 24px;
}
.access-denied-icon{font-size:54px;margin-bottom:16px}
.access-denied h2{font-size:20px;color:#0b1f3a;font-weight:800;margin-bottom:8px}
.access-denied p{font-size:13.5px;color:#7a8aa3;font-weight:600;max-width:320px;line-height:1.6;margin-bottom:20px}
.access-denied a{
  display:inline-block;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;font-weight:700;
  text-decoration:none;padding:13px 28px;border-radius:14px;box-shadow:0 8px 20px rgba(47,143,255,0.32);font-size:14px;
}

@media(min-width:1100px){
  .container{max-width:1300px}
  body{padding:32px 40px 60px}
  .stats-row{max-width:600px}
  .account-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .account-block{margin-bottom:0}
}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
  <h1>Open Actions <span class="manager-badge">Manager</span></h1>
  <p id="lastUpdated">Loading...</p>
</div>
<a class="home-btn" href="./index.html" id="topHomeBtn">← Home</a>

<div id="accessDenied" class="access-denied" style="display:none">
  <div class="access-denied-icon">🔒</div>
  <h2>Manager Access Required</h2>
  <p>Open Actions shows outstanding action items across all reps and accounts. This page is restricted to Manager accounts.</p>
  <a href="./index.html" id="accessDeniedHomeBtn">Return Home</a>
</div>

<div id="mainContent" style="display:none">
  <div class="filter-bar">
    <h3>Filters</h3>
    <div class="filter-row">
      <select class="filter-select" id="filterRep"><option value="">All Reps</option></select>
      <select class="filter-select" id="filterTerritory">
        <option value="">All Territories</option>
        <option>UAE</option><option>KSA</option><option>Qatar</option>
        <option>Kuwait</option><option>Bahrain</option><option>Oman</option>
      </select>
    </div>
    <div class="filter-row">
      <select class="filter-select" id="filterPriority">
        <option value="">All Priorities</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
      <select class="filter-select" id="filterDate">
        <option value="">All Time</option>
        <option value="7">This Week</option>
        <option value="month">This Month</option>
        <option value="30">Last 30 Days</option>
        <option value="90">Last 90 Days</option>
      </select>
    </div>
    <div class="filter-btns">
      <button class="fbtn-apply" onclick="applyFilters()">Apply</button>
      <button class="fbtn-reset" onclick="resetFilters()">Reset</button>
    </div>
    <div class="filter-status" id="filterStatus"></div>
  </div>

  <div class="stats-row">
    <div class="stat-pill high"><span id="statHigh">0</span>High</div>
    <div class="stat-pill"><span id="statTotal">0</span>Total Actions</div>
    <div class="stat-pill"><span id="statAccounts">0</span>Accounts</div>
  </div>

  <div id="actionContent"></div>
</div>

<div class="loading" id="loadingEl"><div class="spinner"></div>Loading actions...</div>
</div>

<script>
// ── MANAGER ACCESS CONTROL ───────────────────────────────────
var role = localStorage.getItem('fieldiq_user_role');
var isManager = (role === 'Manager');

document.getElementById('topHomeBtn').href = isManager ? './fieldiq.html' : './index.html';
document.getElementById('accessDeniedHomeBtn').href = isManager ? './fieldiq.html' : './index.html';

var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var allRecords=[];

function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

function parseActions(text){
  if(!text)return[];
  var lines=text.split('\n');
  var actions=[];
  lines.forEach(function(line){
    line=line.trim();
    line=line.replace(/^\d+\.\s*/,'').replace(/^[-•*]\s*/,'').trim();
    if(line.length>5&&line.length<300)actions.push(line);
  });
  return actions;
}

function getPriorityClass(p){
  if(!p)return'medium';
  p=p.toLowerCase();
  if(p==='high')return'high';
  if(p==='low')return'low';
  return'medium';
}

function getBadgeClass(p){
  if(!p)return'badge-medium';
  p=p.toLowerCase();
  if(p==='high')return'badge-high';
  if(p==='low')return'badge-low';
  return'badge-medium';
}

function populateRepFilter(records){
  var reps={};
  records.forEach(function(r){
    var rep=r.fields['Rep Name']||'';
    if(rep){rep=rep.trim();rep=rep.charAt(0).toUpperCase()+rep.slice(1).toLowerCase();reps[rep]=1;}
  });
  var sel=document.getElementById('filterRep');
  while(sel.options.length>1)sel.remove(1);
  Object.keys(reps).sort().forEach(function(r){
    var o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);
  });
}

function getFilteredRecords(){
  var rep=document.getElementById('filterRep').value;
  var terr=document.getElementById('filterTerritory').value;
  var priority=document.getElementById('filterPriority').value;
  var days=document.getElementById('filterDate').value;
  var cutoff=null;
  if(days==='month'){var now=new Date();cutoff=new Date(now.getFullYear(),now.getMonth(),1);}
  else if(days){cutoff=new Date(Date.now()-parseInt(days)*24*60*60*1000);}
  return allRecords.filter(function(r){
    var f=r.fields;
    if(!f['Action Items']&&!f['Next Steps'])return false;
    var repName=(f['Rep Name']||'').trim();
    repName=repName.charAt(0).toUpperCase()+repName.slice(1).toLowerCase();
    if(rep&&repName!==rep)return false;
    if(terr&&f['Territory']!==terr)return false;
    if(priority&&f['Priority']!==priority)return false;
    if(cutoff&&f['Visit Date']&&new Date(f['Visit Date'])<cutoff)return false;
    return true;
  });
}

// Toggle expand/collapse for an entire account card
function toggleAccountCard(cardId,btn){
  var body=document.getElementById(cardId+'-body');
  if(!body)return;
  var open=window.getComputedStyle(body).display!=='none';
  body.style.display=open?'none':'block';
  btn.textContent=open?'▸ Expand':'▴ Collapse';
}

// Toggle expand/collapse for a single long action item
function toggleAI(id,btn){
  var full=document.getElementById(id);
  var hl=document.getElementById(id+'-h');
  if(!full)return;
  var open=window.getComputedStyle(full).display!=='none';
  full.style.display=open?'none':'block';
  if(hl)hl.style.display=open?'':'none';
  btn.textContent=open?'▸ More':'▴ Less';
}

function buildActionsView(records){
  var accountMap={};
  records.forEach(function(r){
    var f=r.fields;
    var hospital=f['Hospital Name']||'Unknown Account';
    var actions=parseActions(f['Action Items']||f['Next Steps']||'');
    if(actions.length===0)return;
    if(!accountMap[hospital]){
      accountMap[hospital]={
        name:hospital,
        territory:f['Territory']||'',
        priority:f['Priority']||'Medium',
        rep:(f['Rep Name']||'').trim(),
        lastVisit:f['Visit Date']||'',
        actions:[]
      };
    }
    actions.forEach(function(a){
      var exists=accountMap[hospital].actions.some(function(existing){
        return existing.toLowerCase().substring(0,40)===a.toLowerCase().substring(0,40);
      });
      if(!exists)accountMap[hospital].actions.push(a);
    });
    var p=f['Priority']||'Medium';
    if(p==='High')accountMap[hospital].priority='High';
    else if(p==='Medium'&&accountMap[hospital].priority==='Low')accountMap[hospital].priority='Medium';
    if(f['Visit Date']&&(!accountMap[hospital].lastVisit||f['Visit Date']>accountMap[hospital].lastVisit)){
      accountMap[hospital].lastVisit=f['Visit Date'];
      accountMap[hospital].rep=(f['Rep Name']||'').trim();
      accountMap[hospital].rep=accountMap[hospital].rep.charAt(0).toUpperCase()+accountMap[hospital].rep.slice(1).toLowerCase();
    }
  });

  var accounts=Object.values(accountMap);
  var order={High:0,Medium:1,Low:2};
  accounts.sort(function(a,b){return(order[a.priority]||1)-(order[b.priority]||1);});

  var high=accounts.filter(function(a){return a.priority==='High';});
  var medium=accounts.filter(function(a){return a.priority==='Medium';});
  var low=accounts.filter(function(a){return a.priority==='Low';});

  var totalActions=accounts.reduce(function(sum,a){return sum+a.actions.length;},0);
  document.getElementById('statHigh').textContent=high.length;
  document.getElementById('statTotal').textContent=totalActions;
  document.getElementById('statAccounts').textContent=accounts.length;

  // Counter reset per render — IDs are unique within the freshly-rendered DOM
  var _cid=0;

  function renderAccounts(list){
    if(list.length===0)return'<div class="empty">None</div>';
    return list.map(function(acc){
      var pc=getPriorityClass(acc.priority);
      var bc=getBadgeClass(acc.priority);
      var cardId='ab-'+(++_cid);

      // Build action items — long items get expand/collapse treatment
      var actionItemsHtml=acc.actions.map(function(a,ai){
        var needsExpand=a.length>160;
        if(needsExpand){
          var aiId=cardId+'-ai-'+ai;
          var headline=a.substring(0,120)+'…';
          return'<div class="action-item">'+
            '<span class="action-bullet">→</span>'+
            '<span>'+
              '<span class="ai-headline" id="'+aiId+'-h">'+headline+'</span>'+
              '<span class="ai-full" id="'+aiId+'">'+a+'</span>'+
              '<span class="ai-toggle" onclick="toggleAI(\''+aiId+'\',this)">▸ More</span>'+
            '</span>'+
          '</div>';
        }
        return'<div class="action-item"><span class="action-bullet">→</span>'+a+'</div>';
      }).join('');

      return'<div class="account-block '+pc+'" id="'+cardId+'">'+
        // Always-visible header: name, action count, last visit, priority badge
        '<div class="account-header">'+
          '<div>'+
            '<div class="account-name">'+acc.name+'</div>'+
            '<div class="account-meta">'+
              acc.actions.length+' action'+(acc.actions.length!==1?'s':'')+
              (acc.territory?' · '+acc.territory:'')+
              (acc.lastVisit?' · Last visit: '+formatDate(acc.lastVisit):'')+
            '</div>'+
          '</div>'+
          '<span class="priority-badge '+bc+'">'+acc.priority+'</span>'+
        '</div>'+
        // Expand button — visible when collapsed
        '<button class="ab-expand-btn" onclick="toggleAccountCard(\''+cardId+'\',this)">▸ Expand</button>'+
        // Hidden body — action list + footer
        '<div class="action-list-body" id="'+cardId+'-body">'+
          '<div class="action-list">'+actionItemsHtml+'</div>'+
          '<div class="action-footer">'+
            (acc.rep?'<span class="af-badge af-rep">'+acc.rep+'</span>':'')+
            (acc.territory?'<span class="af-badge af-terr">'+acc.territory+'</span>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  var html='';
  if(high.length>0)html+='<div class="section-title">High Priority Actions</div>'+renderAccounts(high);
  if(medium.length>0)html+='<div class="section-title">Medium Priority Actions</div>'+renderAccounts(medium);
  if(low.length>0)html+='<div class="section-title">Low Priority Actions</div>'+renderAccounts(low);
  if(html==='')html='<div class="empty">No open actions found.</div>';

  document.getElementById('actionContent').innerHTML=html;
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();
}

function applyFilters(){
  var filtered=getFilteredRecords();
  var rep=document.getElementById('filterRep').value;
  var terr=document.getElementById('filterTerritory').value;
  var priority=document.getElementById('filterPriority').value;
  var days=document.getElementById('filterDate').value;
  var parts=[];
  if(rep)parts.push('Rep: '+rep);
  if(terr)parts.push(terr);
  if(priority)parts.push(priority+' Priority');
  if(days)parts.push(days==='month'?'This Month':'Last '+days+' days');
  document.getElementById('filterStatus').textContent=parts.length?'Filtering: '+parts.join(' · '):'';
  buildActionsView(filtered);
}

function resetFilters(){
  document.getElementById('filterRep').value='';
  document.getElementById('filterTerritory').value='';
  document.getElementById('filterPriority').value='';
  document.getElementById('filterDate').value='';
  document.getElementById('filterStatus').textContent='';
  buildActionsView(allRecords);
}

async function loadActions(){
  if(!isManager){
    document.getElementById('loadingEl').style.display='none';
    document.getElementById('accessDenied').style.display='block';
    return;
  }
  try{
    var res=await fetch(WORKER+'/get-visits');
    var data=await res.json();
    if(!res.ok)throw new Error(JSON.stringify(data));
    allRecords=data.records||[];
    populateRepFilter(allRecords);
    buildActionsView(allRecords);
    document.getElementById('loadingEl').style.display='none';
    document.getElementById('mainContent').style.display='block';
  }catch(err){
    document.getElementById('loadingEl').textContent='Failed to load: '+err.message;
  }
}

loadActions();
</script>
</body>
</html>
