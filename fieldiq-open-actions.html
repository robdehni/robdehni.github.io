<style>
*{margin:0;padding:0;box-sizing:border-box}

.reminder-strip-blue{background:#fff4e0;color:#b86e00;border:1px solid #f5d08a}
.empty{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:34px 20px;text-align:center;color:#8a9bb3;font-weight:700;box-shadow:0 4px 14px rgba(11,31,58,0.05)}

.retry-btn{margin-top:10px;border:none;background:#2f8fff;color:#fff;padding:10px 18px;border-radius:10px;font-weight:800}

</style>

<body>
<div class="container">
  <div class="header">
    <div class="brand">
      <span class="brand-cloud">☁️</span>
      <div class="brand-text">
        <h1>Field<span>IQ</span></h1>
        <p>Territory Intelligence Platform</p>
      </div>
    </div>
    <p class="page-subtitle">Everything you need to do next, in one place.</p>
  </div>

  <a href="./index.html" class="home-btn">← Home</a>

  <div class="summary">
    <div class="summary-left">
      <div class="summary-icon"><i data-lucide="check-square"></i></div>
      <div>
        <div class="summary-title">Open Actions</div>
        <div class="summary-sub" id="repName">Loading rep...</div>
      </div>
    </div>
    <div class="count-pill" id="countPill">0</div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Loading actions...</div>
  </div>

</div>

<div class="toast" id="toast">Action completed.</div>

<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var currentUserId=localStorage.getItem('fieldiq_user_id');
var currentUserName=localStorage.getItem('fieldiq_user_name');
var currentUserRole=localStorage.getItem('fieldiq_user_role')||'Sales Rep';
var actions=[];

if(!currentUserId||!currentUserName){
  window.location.href='./index.html';
  throw new Error('No identity locked');
}
if(currentUserRole==='Manager'){
  window.location.href='./fieldiq.html';
  throw new Error('Managers use manager portal');
}

document.getElementById('repName').textContent=currentUserName+' · '+currentUserRole;

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g,function(m){
    return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]);
  });
}
function formatDate(value){
  if(!value)return '';
  try{return new Date(value+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
  catch(e){return value;}
}

// Reused verbatim from the manager Open Actions page — same field-name
// candidates, same lookup order. The "Source Visit" linked-record field is
// already written by the Worker's /save-actions endpoint on every action;
// this just reads what was already there.
function getField(f,names,fallback){
  for(var i=0;i<names.length;i++){
    if(f[names[i]]!==undefined&&f[names[i]]!==null&&f[names[i]]!=='')return f[names[i]];
  }
  return fallback||'';
}
function firstLinkedId(v){
  if(Array.isArray(v)&&v.length)return v[0];
  if(typeof v==='string')return v;
  return '';
}
function getVisitId(f){
  return firstLinkedId(getField(f,['Visit','Field Visit','Visit Record','Visit ID','Visit Record ID','Source Visit','Source Visit ID'],''));
}
// Builds the URL back to THIS page after viewing the visit, preserving the
// existing Calendar-origin context (returnTo/calYear/calMonth/calDay) if
// this page itself was opened from Calendar, so that chain isn't broken.
function buildReturnHref(actionId){
  var q=['actionId='+encodeURIComponent(actionId)];
  var params=new URLSearchParams(window.location.search);
  if(params.get('returnTo')==='calendar'){
    q.push('returnTo=calendar');
    ['calYear','calMonth','calDay'].forEach(function(k){
      var v=params.get(k);
      if(v)q.push(k+'='+encodeURIComponent(v));
    });
  }
  return './fieldiq-open-actions.html?'+q.join('&');
}
function visitHref(r){
  var f=r.fields||{};
  var visitId=getVisitId(f);
  if(!visitId)return '';
  var account=getField(f,['Account Name'],'');
  var url='./fieldiq-visit-history.html';
  var q=['visitId='+encodeURIComponent(visitId),'actionId='+encodeURIComponent(r.id)];
  if(account)q.push('account='+encodeURIComponent(account));
  q.push('returnTo='+encodeURIComponent(buildReturnHref(r.id)));
  // NOTE: 'manager-actions' here is Visit History's existing internal flag
  // name for "show a Back-to-Open-Actions button using the supplied
  // returnTo URL" — it is not manager-specific and is never displayed. It
  // is the only value that reliably triggers that branch (Visit History's
  // other check is an exact-match on a bare, param-less URL, which our
  // context-carrying returnTo above will never match). Reusing it avoids
  // any change to fieldiq-visit-history.html.
  q.push('source='+encodeURIComponent('rep-actions'));
  return url+'?'+q.join('&');
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg||'Action completed.';
  t.className='toast visible';
  setTimeout(function(){t.className='toast';},1800);
}
function reminderStrip(f){
  var count=Number(f['Reminder Count']||0);
  if(count===0)return '';
  var due=f['Due Date']||'';
  var today=new Date().toISOString().slice(0,10);
  var cls='reminder-strip-blue';
  var label='Manager reminder sent ('+count+')';
  if(due&&due<today){cls='reminder-strip-red';label='Overdue · Manager reminder sent ('+count+')';}
  else if(due&&due===today){cls='reminder-strip-orange';label='Due today · Manager reminder sent ('+count+')';}
  return '<div class="reminder-strip '+cls+'">'+label+'</div>';
}

function renderActionCard(r, account){
  var f=r.fields||{};
  var action=f['Action Text']||'';
  var source=f['Source']||'AI';
  var due=f['Due Date']||'';
  var created=r.createdTime?r.createdTime.slice(0,10):'';
  var reminderCount=f['Reminder Count'];
  var meta='';
  if(created)meta+='<span class="meta">Created: '+escapeHtml(formatDate(created))+'</span>';
  meta+='<span class="meta">Source: '+escapeHtml(source)+'</span>';
  if(due)meta+='<span class="meta">Due: '+escapeHtml(formatDate(due))+'</span>';
  if(reminderCount!==undefined)meta+='<span class="meta">Reminders: '+escapeHtml(reminderCount)+'</span>';

  var vHref=visitHref(r);

  return (
    '<div class="action-card" id="card-'+r.id+'">'+
      '<div class="action-top">'+
        '<div class="account-name">'+escapeHtml(account)+'</div>'+
        '<div class="status-pill">Open</div>'+
      '</div>'+
      reminderStrip(f)+
      '<div class="action-text">'+escapeHtml(action)+'</div>'+
      '<div class="meta-row">'+meta+'</div>'+
      (vHref?'<a class="view-visit-link" href="'+escapeHtml(vHref)+'"><i data-lucide="file-text"></i> View Visit</a>':'')+
      '<button class="complete-btn" onclick="completeAction(\''+r.id+'\')" id="btn-'+r.id+'">'+
        '<i data-lucide="check"></i> Complete'+
      '</button>'+
      '<button class="dismiss-btn" onclick="dismissAction(\''+r.id+'\')" id="dbtn-'+r.id+'">'+
        '<i data-lucide="x"></i> Dismiss'+
      '</button>'+
    '</div>'
  );
}

function render(){
  var content=document.getElementById('content');
  document.getElementById('countPill').textContent=actions.length;

  if(actions.length===0){
    content.innerHTML='<div class="empty"><i data-lucide="check-circle"></i><div>No open actions.</div></div>';
    lucide.createIcons();
    return;
  }

  // Manager-reminded actions must appear at the very top of the page,
  // regardless of account grouping or alphabetical order — visibility comes
  // from position, not a new heading or counter. No reminder-timestamp field
  // is loaded by this page, so Due Date (ascending, undated last) is used as
  // the tiebreaker — the same tiebreak already used for the normal sort below.
  var remindedActions=actions.filter(function(r){
    return Number((r.fields||{})['Reminder Count']||0)>0;
  });
  var normalActions=actions.filter(function(r){
    return Number((r.fields||{})['Reminder Count']||0)===0;
  });
  remindedActions.sort(function(a,b){
    var fa=a.fields||{},fb=b.fields||{};
    var da=(fa['Due Date'])||'9999-99-99';
    var db=(fb['Due Date'])||'9999-99-99';
    return da.localeCompare(db);
  });

  var html='';
  remindedActions.forEach(function(r){
    var account=(r.fields||{})['Account Name']||'Unknown Account';
    html+=renderActionCard(r,account);
  });

  // Group the remaining (non-reminded) actions by Account Name — identical
  // to the existing behaviour.
  var groups={};
  normalActions.forEach(function(r){
    var f=r.fields||{};
    var account=f['Account Name']||'Unknown Account';
    if(!groups[account])groups[account]=[];
    groups[account].push(r);
  });

  // Sort each group: identical to existing logic. Reminded actions have
  // already been pulled out above, so this tier check is now a no-op safety
  // net rather than the primary mechanism — left in place unchanged.
  Object.keys(groups).forEach(function(account){
    groups[account].sort(function(a,b){
      var fa=a.fields||{},fb=b.fields||{};
      var aReminded=Number(fa['Reminder Count']||0)>0;
      var bReminded=Number(fb['Reminder Count']||0)>0;
      if(aReminded!==bReminded)return aReminded?-1:1;
      var da=(fa['Due Date'])||'9999-99-99';
      var db=(fb['Due Date'])||'9999-99-99';
      return da.localeCompare(db);
    });
  });

  // Render groups alphabetically
  var sortedAccounts=Object.keys(groups).sort(function(a,b){
    return a.toLowerCase().localeCompare(b.toLowerCase());
  });

  sortedAccounts.forEach(function(account){
    html+='<div class="account-group">';
    html+='<div class="account-group-label">'+escapeHtml(account)+'</div>';

    groups[account].forEach(function(r){
      html+=renderActionCard(r,account);
    });

    html+='</div>'; // end account-group
  });

  content.innerHTML=html;
  lucide.createIcons();
}

async function loadActions(){
  var content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div>Loading actions...</div>';
  var _ctrl=new AbortController();
  var _timer=setTimeout(function(){_ctrl.abort();},15000);
  try{
    var url=WORKER+'/get-actions?userId='+encodeURIComponent(currentUserId)+'&role='+encodeURIComponent(currentUserRole)+'&status=Open';
    var res=await fetch(url,{cache:'no-store',signal:_ctrl.signal});
    clearTimeout(_timer);
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'Could not load actions');
    actions=data.records||[];
    render();
  }catch(err){
    clearTimeout(_timer);
    var msg=(err.name==='AbortError')?'Request timed out — check your connection.':err.message;
    content.innerHTML='<div class="error-box">Could not load open actions.<br>'+escapeHtml(msg)+'<br><button class="retry-btn" onclick="loadActions()">Retry</button></div>';
  }
}

async function completeAction(actionId){
  var btn=document.getElementById('btn-'+actionId);
  if(btn){
    btn.disabled=true;
    btn.innerHTML='Completing...';
  }
  var _removedIdx=actions.findIndex(function(r){return r.id===actionId;});
  var _removedRec=_removedIdx>-1?actions[_removedIdx]:null;
  if(_removedRec){
    actions=actions.filter(function(r){return r.id!==actionId;});
    render();
  }
  try{
    var res=await fetch(WORKER+'/complete-action',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({actionId:actionId,userId:currentUserId})
    });
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'Could not complete action');
    showToast('Action completed.');
    var _rp=new URLSearchParams(window.location.search);
    if(_rp.get('returnTo')==='calendar'){
      var _cy=_rp.get('calYear')||'',_cm=_rp.get('calMonth')||'',_cd=_rp.get('calDay')||'';
      var _cu='./fieldiq-calendar.html';
      var _cq=[];
      if(_cy)_cq.push('calYear='+encodeURIComponent(_cy));
      if(_cm!=='')_cq.push('calMonth='+encodeURIComponent(_cm));
      if(_cd)_cq.push('calDay='+encodeURIComponent(_cd));
      if(_cq.length)_cu+='?'+_cq.join('&');
      setTimeout(function(){window.location.href=_cu;},400);
    }
  }catch(err){
    if(_removedRec){
      actions.push(_removedRec);
      render();
    }
    var _btnAfter=document.getElementById('btn-'+actionId);
    if(_btnAfter){
      _btnAfter.disabled=false;
      _btnAfter.innerHTML='<i data-lucide="check"></i> Complete';
      lucide.createIcons({el:_btnAfter});
    }
    alert('Could not complete action: '+err.message);
  }
}

async function dismissAction(actionId){
  var confirmed=confirm('Dismiss this action?\n\nThis action will remain in the account history as "Dismissed". It will no longer appear in your Open Actions.');
  if(!confirmed)return;
  var btn=document.getElementById('dbtn-'+actionId);
  if(btn){
    btn.disabled=true;
    btn.innerHTML='Dismissing...';
  }
  var _removedIdx=actions.findIndex(function(r){return r.id===actionId;});
  var _removedRec=_removedIdx>-1?actions[_removedIdx]:null;
  if(_removedRec){
    actions=actions.filter(function(r){return r.id!==actionId;});
    render();
  }
  try{
    var res=await fetch(WORKER+'/dismiss-action',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({actionId:actionId,userId:currentUserId})
    });
    var data=await res.json();
    if(!res.ok)throw new Error(data.error||'Could not dismiss action');
    showToast('Action dismissed.');
    var _rp=new URLSearchParams(window.location.search);
    if(_rp.get('returnTo')==='calendar'){
      var _cy=_rp.get('calYear')||'',_cm=_rp.get('calMonth')||'',_cd=_rp.get('calDay')||'';
      var _cu='./fieldiq-calendar.html';
      var _cq=[];
      if(_cy)_cq.push('calYear='+encodeURIComponent(_cy));
      if(_cm!=='')_cq.push('calMonth='+encodeURIComponent(_cm));
      if(_cd)_cq.push('calDay='+encodeURIComponent(_cd));
      if(_cq.length)_cu+='?'+_cq.join('&');
      setTimeout(function(){window.location.href=_cu;},400);
    }
  }catch(err){
    if(_removedRec){
      actions.push(_removedRec);
      render();
    }
    var _btnAfter=document.getElementById('dbtn-'+actionId);
    if(_btnAfter){
      _btnAfter.disabled=false;
      _btnAfter.innerHTML='Dismiss';
    }
    alert('Could not dismiss action: '+err.message);
  }
}

document.addEventListener('DOMContentLoaded',function(){
  lucide.createIcons();
  var _params=new URLSearchParams(window.location.search);
  var targetActionId=_params.get('actionId');
  // If opened from Calendar, point the back button to Calendar with context restored.
  if(_params.get('returnTo')==='calendar'){
    var _cy=_params.get('calYear')||'',_cm=_params.get('calMonth')||'',_cd=_params.get('calDay')||'';
    var _cu='./fieldiq-calendar.html';
    var _cq=[];
    if(_cy)_cq.push('calYear='+encodeURIComponent(_cy));
    if(_cm!=='')_cq.push('calMonth='+encodeURIComponent(_cm));
    if(_cd)_cq.push('calDay='+encodeURIComponent(_cd));
    if(_cq.length)_cu+='?'+_cq.join('&');
    var _hb=document.querySelector('.home-btn');
    if(_hb){_hb.href=_cu;_hb.textContent='← Calendar';}
  }
  loadActions().then(function(){
    if(!targetActionId)return;
    var card=document.getElementById('card-'+targetActionId);
    if(!card)return;
    card.classList.add('highlighted');
    setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'start'});},100);
  });
});
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js",{updateViaCache:"none"}).catch(function(){});}</script>
<script>
// Back-to-top floating button — purely cosmetic, self-contained. Created
// entirely via JS so no existing HTML/IDs/layout are touched. Appears only
// after scrolling past 500px, scrolls smoothly to top on click. Does not
// interact with action cards, Complete, View Visit, reminders, or any
// business logic.
(function(){
  var btn=document.createElement('button');
  btn.type='button';
  btn.className='back-to-top';
  btn.setAttribute('aria-label','Back to top');
  btn.textContent='↑';
  btn.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });
  document.addEventListener('DOMContentLoaded',function(){
    document.body.appendChild(btn);
  });
  window.addEventListener('scroll',function(){
    btn.classList.toggle('visible',(window.scrollY||document.documentElement.scrollTop)>500);
  },{passive:true});
})();
</script>
</body>
</html>
