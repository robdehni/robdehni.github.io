<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ Voice Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:white;font-family:Arial,sans-serif;padding:20px}
.wrap{max-width:600px;margin:auto}
h1{text-align:center;color:#00d4ff;font-size:36px;margin-top:20px}
.sub{text-align:center;color:#888;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px}
input,select,textarea{width:100%;background:#1a1a1a;color:white;border:1px solid #333;border-radius:10px;padding:13px;font-size:16px;margin-top:6px}
.card{background:#111;border:1px solid #222;border-radius:18px;padding:24px;text-align:center}
.big{width:110px;height:110px;border-radius:50%;border:4px solid #00d4ff;background:#061b22;margin:10px auto 18px;font-size:42px;color:#00d4ff}
.big.recording{border-color:#ff4444;color:#ff4444;background:#220606}
.status{color:#aaa;font-size:15px;margin-bottom:10px}
.timer{font-size:42px;font-weight:bold;color:#333;margin-bottom:18px}
.timer.on{color:#ff4444}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:bold;margin-top:10px}
.stop{background:#ff4444;color:white;display:none}
.save{background:#00d4ff;color:black;display:none}
audio{width:100%;margin-top:18px;display:none}
textarea{min-height:120px;margin-top:18px;line-height:1.5}
.ok{display:none;margin-top:12px;background:#06220d;border:1px solid #00ff5533;color:#00ff88;padding:12px;border-radius:10px}
.err{margin-top:12px;color:#ff6666;font-size:14px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
<h1>FieldIQ</h1>
<p class="sub">Voice Capture — MediaRecorder Test</p>

<div class="grid">
  <div>
    <label>Hospital</label>
    <input id="hospital" placeholder="Type hospital name">
  </div>
  <div>
    <label>Visit Date</label>
    <input id="visitDate" type="date">
  </div>
  <div>
    <label>Territory</label>
    <select id="territory">
      <option value="">Select territory</option>
      <option>UAE</option><option>KSA</option><option>Qatar</option>
      <option>Kuwait</option><option>Bahrain</option><option>Oman</option>
    </select>
  </div>
  <div>
    <label>Visit Type</label>
    <select id="visitType">
      <option value="">Select type</option>
      <option>In-person</option><option>Virtual</option><option>Phone</option>
    </select>
  </div>
</div>

<div class="card">
  <button id="recordBtn" class="big">🎙️</button>
  <div id="status" class="status">Tap microphone to start recording</div>
  <div id="timer" class="timer">0:00</div>

  <button id="stopBtn" class="btn stop">Stop Recording</button>

  <audio id="player" controls></audio>

  <textarea id="notes" placeholder="After recording, type any missing details here..."></textarea>

  <button id="saveBtn" class="btn save">Save Visit Notes</button>
  <div id="ok" class="ok">✅ Saved</div>
  <div id="err" class="err"></div>
</div>
</div>

<script>
window.onerror=function(msg,src,line){
  document.getElementById("err").textContent="Error: "+msg+" line "+line;
};

var mediaRecorder=null;
var chunks=[];
var seconds=0;
var timer=null;
var streamRef=null;

document.getElementById("visitDate").value=new Date().toISOString().split("T")[0];

document.getElementById("recordBtn").addEventListener("click",startRecording);
document.getElementById("stopBtn").addEventListener("click",stopRecording);
document.getElementById("saveBtn").addEventListener("click",function(){
  document.getElementById("ok").style.display="block";
  this.textContent="Saved ✓";
});

async function startRecording(){
  try{
    document.getElementById("err").textContent="";
    document.getElementById("ok").style.display="none";
    document.getElementById("player").style.display="none";
    document.getElementById("saveBtn").style.display="none";

    chunks=[];
    seconds=0;
    document.getElementById("timer").textContent="0:00";
    document.getElementById("timer").className="timer on";

    streamRef=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(streamRef);

    mediaRecorder.ondataavailable=function(e){
      if(e.data && e.data.size>0){chunks.push(e.data);}
    };

    mediaRecorder.onstop=function(){
      var blob=new Blob(chunks,{type:"audio/webm"});
      var url=URL.createObjectURL(blob);
      var player=document.getElementById("player");
      player.src=url;
      player.style.display="block";

      document.getElementById("saveBtn").style.display="block";
      document.getElementById("status").textContent="Recording complete. Press play to review.";
      document.getElementById("recordBtn").className="big";
      document.getElementById("timer").className="timer";

      if(streamRef){
        streamRef.getTracks().forEach(function(t){t.stop();});
      }
    };

    mediaRecorder.start();

    timer=setInterval(function(){
      seconds++;
      var m=Math.floor(seconds/60);
      var s=seconds%60;
      document.getElementById("timer").textContent=m+":"+(s<10?"0":"")+s;
    },1000);

    document.getElementById("recordBtn").className="big recording";
    document.getElementById("status").textContent="Recording... speak naturally";
    document.getElementById("stopBtn").style.display="block";
  }catch(e){
    document.getElementById("err").textContent="Microphone error: "+e.message;
  }
}

function stopRecording(){
  clearInterval(timer);
  document.getElementById("stopBtn").style.display="none";
  if(mediaRecorder && mediaRecorder.state!=="inactive"){
    mediaRecorder.stop();
  }
}
</script>
</body>
</html>
