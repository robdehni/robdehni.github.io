<style>  
*{margin:0;padding:0;box-sizing:border-box}  
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:20px 18px 40px;overflow-x:hidden}  
.container{max-width:780px;margin:0 auto;width:100%}  /* ── Brand block — matches fieldiq.html reference ── */
.topbar{margin-bottom:8px}
.topbar-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-cloud{font-size:26px;line-height:1}
.page-kind{font-size:10px;font-weight:800;letter-spacing:1.3px;color:#0d9488;text-transform:uppercase;margin-bottom:2px}
.brand-text h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}
.brand-text h1 span{color:#2f8fff}
.brand-text p{font-size:10px;color:#8a9bb3;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.topbar-sub{color:#7a8aa3;font-size:12.5px;margin-top:2px;font-weight:600}

.home-btn{
display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;
text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:18px;border:1px solid #e3ebf5;
box-shadow:0 2px 8px rgba(11,31,58,0.05);
}
.home-btn:hover{border-color:#2f8fff}

.filter-bar{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.filter-bar h3{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.filter-select{
width:100%;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;
font-size:12.5px;outline:none;font-weight:600;
}
.filter-select:focus{border-color:#2f8fff}
.filter-btns{display:flex;gap:8px}
.fbtn-apply{flex:1;padding:11px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:10px;font-size:12.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.3)}
.fbtn-reset{flex:1;padding:11px;background:#fff;color:#7a8aa3;border:1.5px solid #e3ebf5;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.filter-active{font-size:10.5px;color:#2f8fff;margin-top:8px;text-align:center;min-height:14px;font-weight:700}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.stat-pill{
background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px 14px;font-size:11.5px;
color:#7a8aa3;text-align:center;font-weight:700;box-shadow:0 4px 14px rgba(11,31,58,0.05);
}
.stat-pill span{display:block;font-size:26px;font-weight:800;color:#2f8fff;margin-bottom:4px}

.count-label{font-size:12px;color:#aab8cc;margin-bottom:14px;text-align:center;font-weight:600}

.visit-card{
background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:18px;margin-bottom:12px;
box-shadow:0 4px 14px rgba(11,31,58,0.05);cursor:pointer;transition:border-color 0.15s;
}
.visit-card.new-account{border-color:#bfe0ff;background:#f3f9ff}
.visit-card.expanded{border-color:#2f8fff}
.visit-card.command-centre-highlight{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(47,143,255,0.18);position:relative}
.visit-card.command-centre-highlight::before{
  content:'Opened from Command Centre';position:absolute;top:-9px;left:14px;background:#2f8fff;color:#fff;
  font-size:9.5px;font-weight:800;letter-spacing:0.3px;text-transform:uppercase;padding:2px 9px;border-radius:999px;
}
.visit-card.rep-actions-highlight{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(47,143,255,0.18);position:relative}
.visit-card.rep-actions-highlight::before{
  content:'Opened from Open Actions';position:absolute;top:-9px;left:14px;background:#2f8fff;color:#fff;
  font-size:9.5px;font-weight:800;letter-spacing:0.3px;text-transform:uppercase;padding:2px 9px;border-radius:999px;
}
.visit-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.visit-account{font-size:15px;font-weight:800;color:#0b1f3a;flex:1}
.visit-date{font-size:11.5px;color:#aab8cc;white-space:nowrap;font-weight:700}
.visit-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.badge{font-size:10.5px;padding:4px 11px;border-radius:8px;font-weight:700}
.badge-territory{background:#eef3f9;color:#5b6b85}
.badge-type{background:#eef3f9;color:#5b6b85}
.badge-high{background:#ffe5e8;color:#e0344a}
.badge-medium{background:#fff3e0;color:#d98a1c}
.badge-low{background:#e3f8ea;color:#1fa861}
.badge-new{background:#eaf3ff;color:#2f8fff}
.visit-summary{font-size:12.5px;color:#7a8aa3;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid #eef3f9}
.visit-card.expanded .visit-summary{display:none}

.visit-toggle{font-size:11px;color:#2f8fff;font-weight:700;margin-top:10px;text-align:center;user-select:none}
.visit-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #eef3f9}
.visit-detail.open{display:block}
.visit-detail .report-section{margin:10px 0}
.avf-list{display:flex;flex-direction:column;gap:6px}
.avf-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fbff;border:1px solid #e3ebf5;border-radius:10px;padding:8px 11px}
.avf-text{font-size:12.5px;color:#3d4f6b;font-weight:500;line-height:1.4}
.avf-badge{flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px}
.avf-badge-completed{background:#e1f5ea;color:#1f8a52;border:1px solid #bfe9d0}
.avf-badge-dismissed{background:#eceef1;color:#6b7280;border:1px solid #dde1e6}
.avf-badge-pending{background:#eaf3ff;color:#2f8fff;border:1px solid #cfe3ff}
.visit-watch-row{margin:2px 0 8px}
.watch-star{border:none;background:none;color:#c8d0dc;font-size:17px;line-height:1;cursor:pointer;padding:0;margin-right:6px;flex-shrink:0;align-self:flex-start;margin-top:1px}
.watch-star.watching{color:#f0a400}
.watch-star:disabled{opacity:.5;cursor:not-allowed}
.watch-star-unresolved{color:#c8d0dc;opacity:.6}
.review-row{margin:0 0 14px}
.mark-reviewed-btn{background:#2f8fff;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer}
.mark-reviewed-btn:disabled{opacity:.6;cursor:not-allowed}
.reviewed-badge{display:inline-block;background:#e3f8ea;color:#1fa861;border-radius:999px;padding:6px 14px;font-size:12px;font-weight:800}
.visit-detail .report-section:first-child{margin-top:0}
.visit-detail .report-section h4{color:#2f8fff;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;font-weight:800}
.visit-detail .report-section p{color:#3d4f6b;font-size:13px;line-height:1.65}

.loading{text-align:center;padding:60px 20px;color:#aab8cc;font-weight:600}
.spinner{width:36px;height:36px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#aab8cc;font-size:13.5px;padding:40px 20px;font-weight:600}

.footer{text-align:center;color:#aab8cc;font-size:11px;font-weight:600;margin-top:24px}

@media(min-width:768px){
.container{max-width:900px}
.visit-card{padding:22px 24px}
.visit-account{font-size:16.5px}
.stat-pill{padding:22px}
.stat-pill span{font-size:32px}
}
@media(min-width:1100px){
.container{max-width:1100px}
body{padding:32px 40px 60px}
}
.visit-card{width:100%;overflow-wrap:break-word;word-break:break-word}
.visit-summary{white-space:normal;overflow-wrap:break-word;word-break:break-word}
.visit-account{overflow-wrap:break-word;word-break:break-word}
[data-lucide]{display:inline-block;vertical-align:middle;stroke-width:1.8}
.visit-toggle [data-lucide]{width:12px;height:12px}

.photo-evidence{margin:10px 0;padding-top:10px;border-top:1px solid #eef3f9}
.photo-evidence h4{color:#2f8fff;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;font-weight:800}
.photo-evidence-grid{display:flex;gap:8px;flex-wrap:wrap}
.photo-evidence-thumb{display:block;width:88px;height:88px;object-fit:cover;border-radius:8px;border:1px solid #dde8f5;cursor:pointer;transition:opacity 0.15s}
.photo-evidence-thumb:hover{opacity:0.82}
.photo-evidence-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#2f8fff;font-weight:700;text-decoration:none;padding:7px 11px;background:#eaf3ff;border-radius:8px;border:1px solid #cfe4ff}
.photo-evidence-link:hover{background:#d5eaff}

.photo-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,31,58,0.92);z-index:9999;align-items:center;justify-content:center;padding:20px}
.photo-modal-overlay.open{display:flex}
.photo-modal-img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.photo-modal-close{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.back-to-top{
  position:fixed;right:18px;bottom:24px;width:44px;height:44px;border-radius:50%;
  background:#2f8fff;color:#fff;border:none;box-shadow:0 6px 16px rgba(47,143,255,0.35);
  display:none;align-items:center;justify-content:center;cursor:pointer;z-index:500;
  font-size:20px;font-weight:900;line-height:1;
}
.back-to-top.visible{display:flex}
p.page-subtitle{color:#7a8aa3;font-size:13px;margin-top:6px;font-weight:600;text-transform:none;letter-spacing:normal}
</style>

var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';  
  
(function(){  
  var params=new URLSearchParams(window.location.search);
  var source=params.get('source');
  var returnTo=params.get('returnTo');
  var homeBtn=document.getElementById('homeBtn');
  if(source==='manager-actions'||source==='open-actions'||source==='rep-actions'||returnTo==='./fieldiq-actions.html'){
    homeBtn.href=returnTo||'./fieldiq-actions.html';
    homeBtn.textContent='← Back to Open Actions';
  }else if(source==='manager-home'){
    homeBtn.href='./fieldiq.html';
    homeBtn.textContent='← Back to Manager Home';
  }else if(source==='operations'){
    homeBtn.href='./fieldiq-operations.html';
    homeBtn.textContent='← Back to Operations';
  }else if(source==='dashboard'){
    var dashQ2=[];
    ['rep','territory','priority','period'].forEach(function(k){
      var v=params.get(k);
      if(v)dashQ2.push(k+'='+encodeURIComponent(v));
    });
    homeBtn.href='./dashboard.html'+(dashQ2.length?'?'+dashQ2.join('&'):'');
    homeBtn.textContent='← Back to Dashboard';
  }else{
    var role=localStorage.getItem('fieldiq_user_role');
    if(role==='Manager'){
      var dashQ=[];
      ['rep','territory','priority','period'].forEach(function(k){
        var v=params.get(k);
        if(v)dashQ.push(k+'='+encodeURIComponent(v));
      });
      homeBtn.href='./dashboard.html'+(dashQ.length?'?'+dashQ.join('&'):'');
      homeBtn.textContent='← Back to Dashboard';
    }else{
      homeBtn.href='./index.html';
    }
  }
})();  
  
function formatDate(d){  
  if(!d)return'—';  
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});  
}  
  
function getPriorityClass(p){  
  if(!p)return'badge-medium';  
  p=p.toLowerCase();  
  if(p==='high')return'badge-high';  
  if(p==='low')return'badge-low';  
  return'badge-medium';  
}  
  
function truncateSummary(text,n){  
  if(!text)return'';  
  var i=text.indexOf('VISIT SUMMARY');  
  var raw=(i>-1?text.substring(i+13):text).trim();  
  if(raw.length<=n)return raw;  
  var cut=raw.substring(0,n);  
  var lastPeriod=cut.lastIndexOf('. ');  
  if(lastPeriod>n*0.5){return cut.substring(0,lastPeriod+1).trim();}  
  var lastSpace=cut.lastIndexOf(' ');  
  if(lastSpace>-1){return cut.substring(0,lastSpace).trim()+'...';}  
  return cut.trim()+'...';  
}  
  
function parseFullReport(text){  
  var sections={summary:'',contacts:'',outcomes:'',nextSteps:'',signals:'',sentiment:''};  
  var lines=(text||'').split('\n'),current='';  
  for(var i=0;i<lines.length;i++){  
    var l=lines[i].trim();  
    if(l.match(/VISIT SUMMARY/i))current='summary';  
    else if(l.match(/KEY CONTACTS/i))current='contacts';  
    else if(l.match(/OUTCOMES/i))current='outcomes';  
    else if(l.match(/NEXT STEPS/i))current='nextSteps';  
    else if(l.match(/OPPORTUNITY/i))current='signals';  
    else if(l.match(/SENTIMENT/i))current='sentiment';  
    else if(l.match(/PRIORITY/i))current='';  
    else if(l&&current)sections[current]+=(sections[current]?'\n':'')+l;  
  }  
  return sections;  
}  
  
function renderPhotoEvidence(urlsField,visitId){
  if(!urlsField||!String(urlsField).trim())return'';
  var urls=String(urlsField).split('\n').map(function(u){return u.trim();}).filter(function(u){return u.length>4;}).slice(0,2);
  if(!urls.length)return'';
  var html='<div class="photo-evidence"><h4>Visit Evidence</h4><div class="photo-evidence-grid">';
  urls.forEach(function(url){
    html+='<img class="photo-evidence-thumb" src="'+url+'" alt="Visit photo" loading="lazy" onclick="event.stopPropagation();openPhotoModal(\''+url.replace(/'/g,"\\'")+'\',\''+String(visitId||'').replace(/'/g,"\\'")+'\')">';
  });
  html+='</div></div>';
  return html;
}
function openPhotoModal(url,visitId){
  try{
    sessionStorage.setItem('fieldiq_return_visitId',visitId||'');
    sessionStorage.setItem('fieldiq_return_scroll',String(window.scrollY||0));
  }catch(e){}
  document.getElementById('photoModalImg').src=url;
  document.getElementById('photoModalOverlay').classList.add('open');
}
function closePhotoModal(){
  document.getElementById('photoModalOverlay').classList.remove('open');
  document.getElementById('photoModalImg').src='';
  try{sessionStorage.removeItem('fieldiq_return_visitId');sessionStorage.removeItem('fieldiq_return_scroll');}catch(e){}
}
function restoreReturnStateIfAny(){
  try{
    var vid=sessionStorage.getItem('fieldiq_return_visitId');
    if(vid){
      expandAndScrollToVisit(vid);
      sessionStorage.removeItem('fieldiq_return_visitId');
      sessionStorage.removeItem('fieldiq_return_scroll');
    }
  }catch(e){}
}  
function renderReviewButton(f, recordId){
  if(!currentUser||currentUser.role!=='Manager')return'';
  var qualifies=(f['Priority']==='High'||f['Outcome']==='Negative');
  if(!qualifies)return'';
  if(f['Reviewed']===true){
    return '<div class="review-row"><span class="reviewed-badge">Reviewed ✓</span></div>';
  }
  return '<div class="review-row"><button class="mark-reviewed-btn" id="reviewBtn-'+recordId+'" onclick="event.stopPropagation();markVisitReviewed(\''+recordId+'\',this)">✓ Mark as Reviewed</button></div>';
}
function markVisitReviewed(recordId,btnEl){
  btnEl.disabled=true;
  btnEl.textContent='Saving…';
  fetch(WORKER+'/update-visit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({recordId:recordId,reviewed:true})
  }).then(function(res){
    if(!res.ok)throw new Error('Request failed');
    var rec=sortedRecords.find(function(r){return r.id===recordId;});
    if(rec)rec.fields['Reviewed']=true;
    var wrapper=btnEl.parentElement;
    wrapper.innerHTML='<span class="reviewed-badge">Reviewed ✓</span>';
  }).catch(function(err){
    console.error('Could not mark visit reviewed:',err);
    btnEl.disabled=false;
    btnEl.textContent='✓ Mark as Reviewed';
    alert('Could not save right now. Please try again.');
  });
}
function renderFullReport(text){  
  if(!text)return'<div class="report-section"><p>No additional details available.</p></div>';  
  var s=parseFullReport(text),html='';  
  if(s.summary)html+='<div class="report-section"><h4>Visit Summary</h4><p>'+escapeHtmlLocal(s.summary).replace(/\n/g,'<br>')+'</p></div>';  
  if(s.contacts)html+='<div class="report-section"><h4>Key Contacts</h4><p>'+escapeHtmlLocal(s.contacts).replace(/\n/g,'<br>')+'</p></div>';  
  if(s.outcomes)html+='<div class="report-section"><h4>Outcomes & Decisions</h4><p>'+escapeHtmlLocal(s.outcomes).replace(/\n/g,'<br>')+'</p></div>';  
  if(s.nextSteps)html+='<div class="report-section"><h4>Next Steps</h4><p>'+escapeHtmlLocal(s.nextSteps).replace(/\n/g,'<br>')+'</p></div>';  
  if(s.signals)html+='<div class="report-section"><h4>Opportunity Signals</h4><p>'+escapeHtmlLocal(s.signals).replace(/\n/g,'<br>')+'</p></div>';  
  if(s.sentiment)html+='<div class="report-section"><h4>Sentiment</h4><p>'+escapeHtmlLocal(s.sentiment).replace(/\n/g,'<br>')+'</p></div>';  
  return html||'<div class="report-section"><p>'+escapeHtmlLocal(text)+'</p></div>';  
}  

// ── Actions from this Visit ──────────────────────────────────────────────
// New, additive block shown beneath the existing AI Summary / Next Steps —
// that content is never modified. Shows each action linked to this specific
// visit (via the Source Visit field) with its true current status. No
// inline matching or guessing against the AI-generated text — this is a
// separate, honest list sourced directly from Open Actions records.
function escapeHtmlLocal(str){
  return String(str||'').replace(/[&<>"']/g,function(m){
    return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]);
  });
}
function renderActionsFromVisitList(records){
  if(!records.length)return '<p style="color:#8a9bb3;font-size:12px;margin:0">No actions linked to this visit.</p>';
  return '<div class="avf-list">'+records.map(function(r){
    var f=r.fields||{};
    var text=f['Action Text']||'';
    var status=String(f['Status']||'Open').toLowerCase();
    var isDismissed=status==='dismissed';
    var isCompleted=status==='completed';
    var badgeClass=isDismissed?'avf-badge-dismissed':(isCompleted?'avf-badge-completed':'avf-badge-pending');
    var badgeText=isDismissed?'Dismissed':(isCompleted?'Completed':'Pending');
    return '<div class="avf-item"><span class="avf-text">'+escapeHtmlLocal(text)+'</span><span class="avf-badge '+badgeClass+'">'+badgeText+'</span></div>';
  }).join('')+'</div>';
}
// Fetches and appends the Actions-from-this-Visit block to an already-
// rendered detail panel. Called after the existing synchronous AI report
// content, so it never delays or blocks that rendering. Fails gracefully —
// a fetch error or an empty result both produce a calm, honest message,
// never a raw error shown to the user.
function loadActionsForVisit(detailEl,visitRecordId){
  var container=document.createElement('div');
  container.className='report-section';
  container.innerHTML='<h4>Actions from this Visit</h4><p style="color:#8a9bb3;font-size:12px;margin:0">Loading actions...</p>';
  detailEl.appendChild(container);
  fetch(WORKER+'/get-actions?visitId='+encodeURIComponent(visitRecordId))
    .then(function(res){return res.json();})
    .then(function(data){
      container.innerHTML='<h4>Actions from this Visit</h4>'+renderActionsFromVisitList(data.records||[]);
    })
    .catch(function(err){
      console.error('Could not load actions for this visit:',err);
      container.innerHTML='<h4>Actions from this Visit</h4><p style="color:#8a9bb3;font-size:12px;margin:0">Could not load actions for this visit.</p>';
    });
}  
  
var sortedRecords=[];  
var allRecordsRaw=[];  
var watchedAccountIds={};
var accountIdByName={};
var targetVisitId=null;  
  
function renderVisits(records){  
  var today=new Date();today.setHours(0,0,0,0);  
  var weekAgo=new Date(today);weekAgo.setDate(today.getDate()-7);  
  var thisWeek=0,newAccounts=0;  
  var sorted=records.slice().sort(function(a,b){  
    var da=a.fields['Visit Date']?new Date(a.fields['Visit Date']):new Date(0);  
    var db=b.fields['Visit Date']?new Date(b.fields['Visit Date']):new Date(0);  
    return db-da;  
  });  
  sortedRecords=sorted;  
  sorted.forEach(function(r){  
    var f=r.fields;var vDate=f['Visit Date']?new Date(f['Visit Date']):null;  
    if(vDate&&vDate>=weekAgo)thisWeek++;  
    if(f['New Account']===true||f['New Account']==='true'||f['New Account']===1||f['New Account']==='1')newAccounts++;  
  });  
  document.getElementById('statTotal').textContent=records.length;  
  document.getElementById('statThisWeek').textContent=thisWeek;  
  document.getElementById('statNewAccounts').textContent=newAccounts;  
  document.getElementById('countLabel').textContent='Showing '+sorted.length+' visit'+(sorted.length!==1?'s':'')+', most recent first';  
  if(sorted.length===0){document.getElementById('visitList').innerHTML='<div class="empty">No visits logged yet.</div>';return;}  
  var html='';  
  sorted.forEach(function(r,idx){  
    var f=r.fields;var priority=f['Priority']||'Medium';  
    var isNew=(f['New Account']===true||f['New Account']==='true'||f['New Account']===1||f['New Account']==='1');  
    var summary=truncateSummary(f['AI Summary']||f['Meeting Notes']||'',180);  
    var linkedAccountId=(f['Account']&&f['Account'][0])?f['Account'][0]:null;
    if(!linkedAccountId){
      var normalizedName=String(f['Hospital Name']||'').trim().toLowerCase();
      if(normalizedName&&accountIdByName[normalizedName])linkedAccountId=accountIdByName[normalizedName];
    }
    var starHtml='';
    if(currentUser.role==='Manager'){
      if(linkedAccountId){
        var isWatched=!!watchedAccountIds[linkedAccountId];
        starHtml='<button class="watch-star'+(isWatched?' watching':'')+'" onclick="event.stopPropagation();toggleWatch(\''+linkedAccountId+'\',this)" data-account-id="'+linkedAccountId+'" aria-label="'+(isWatched?'Remove from watchlist':'Add to watchlist')+'" title="'+(isWatched?'Watching — tap to remove':'Tap to watch this account')+'">'+(isWatched?'⭐':'☆')+'</button>';
      }else{
        starHtml='<button class="watch-star watch-star-unresolved" disabled aria-label="Account not linked — cannot watch" title="This visit is not linked to an account record yet, so it cannot be watched.">☆</button>';
      }
    }
    html+=  
      '<div class="visit-card'+(isNew?' new-account':'')+'" data-idx="'+idx+'" data-id="'+r.id+'">'+  
        '<div class="visit-header">'+  
          starHtml+
          '<div class="visit-account">'+(f['Hospital Name']||'Unknown Account')+'</div>'+  
          '<div class="visit-date">'+formatDate(f['Visit Date'])+'</div>'+  
        '</div>'+  
        '<div class="visit-meta">'+  
          (f['Territory']?'<span class="badge badge-territory">'+f['Territory']+'</span>':'')+  
          (f['Visit Type']?'<span class="badge badge-type">'+f['Visit Type']+'</span>':'')+  
          '<span class="badge '+getPriorityClass(priority)+'">'+priority+'</span>'+  
          (f['Rep Name']?'<span class="badge badge-territory">'+f['Rep Name']+'</span>':'')+  
          (isNew?'<span class="badge badge-new">New Account</span>':'')+  
        '</div>'+  
        (summary?'<div class="visit-summary">'+summary+'</div>':'')+  
        '<div class="visit-toggle"><i data-lucide="chevron-down"></i> Tap to view full report</div>'+  
        '<div class="visit-detail" id="detail-'+idx+'"></div>'+  
      '</div>';  
  });  
  document.getElementById('visitList').innerHTML=html;lucide.createIcons();  
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();  
}  
  
// ── Watch / Unwatch Account ──────────────────────────────────────────────
// Instant, optimistic toggle — same pattern already proven for Dismiss and
// Mark Reviewed elsewhere in this app. Watching is Account-level, resolved
// via the visit's linked Account field; every other card for the same
// Account updates too, so the toggle state never contradicts itself across
// cards for the same account on screen at once.
function toggleWatch(accountId,btnEl){
  var isWatching=btnEl.classList.contains('watching');
  btnEl.disabled=true;
  var endpoint=isWatching?'/unwatch-account':'/watch-account';
  fetch(WORKER+endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({accountId:accountId})
  }).then(function(res){
    if(!res.ok)throw new Error('Request failed');
    watchedAccountIds[accountId]=!isWatching;
    document.querySelectorAll('.watch-star[data-account-id="'+accountId+'"]').forEach(function(b){
      var nowWatching=!isWatching;
      b.classList.toggle('watching',nowWatching);
      b.textContent=nowWatching?'⭐':'☆';
      b.setAttribute('aria-label',nowWatching?'Remove from watchlist':'Add to watchlist');
      b.setAttribute('title',nowWatching?'Watching — tap to remove':'Tap to watch this account');
      b.disabled=false;
    });
  }).catch(function(err){
    console.error('Could not update watch status:',err);
    btnEl.disabled=false;
    alert('Could not update watch status. Please try again.');
  });
}

document.getElementById('visitList').addEventListener('click',function(e){  
  var card=e.target.closest('.visit-card');if(!card)return;  
  var idx=card.getAttribute('data-idx');var detail=document.getElementById('detail-'+idx);var toggle=card.querySelector('.visit-toggle');  
  if(!detail)return;  
  var isOpen=detail.classList.contains('open');  
  if(isOpen){  
    detail.classList.remove('open');card.classList.remove('expanded');  
    toggle.innerHTML='<i data-lucide="chevron-down"></i> Tap to view full report';lucide.createIcons({el:toggle});  
  }else{  
    if(!detail.getAttribute('data-rendered')){var f=sortedRecords[idx].fields;detail.innerHTML=renderReviewButton(f,sortedRecords[idx].id)+renderFullReport(f['AI Summary']||f['Meeting Notes']||'')+renderPhotoEvidence(f['Photo URLs']||'',sortedRecords[idx].id);detail.setAttribute('data-rendered','1');loadActionsForVisit(detail,sortedRecords[idx].id);}  
    detail.classList.add('open');card.classList.add('expanded');  
    toggle.innerHTML='<i data-lucide="chevron-up"></i> Tap to collapse';lucide.createIcons({el:toggle});  
  }  
});  
  
function populateRepFilter(records){  
  var reps={};records.forEach(function(r){var rep=r.fields['Rep Name']||'';if(rep){rep=rep.trim();rep=rep.charAt(0).toUpperCase()+rep.slice(1).toLowerCase();reps[rep]=1;}});  
  var sel=document.getElementById('filterRep');while(sel.options.length>1)sel.remove(1);  
  Object.keys(reps).sort().forEach(function(r){var o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});  
}  
  
function getPeriodRange(period){  
  var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());var dayOfWeek=today.getDay();var diffToMonday=(dayOfWeek===0?6:dayOfWeek-1);var thisMonday=new Date(today);thisMonday.setDate(today.getDate()-diffToMonday);  
  if(period==='thisWeek'){return {start:thisMonday,end:null};}  
  if(period==='lastWeek'){var lastMonday=new Date(thisMonday);lastMonday.setDate(thisMonday.getDate()-7);var lastSunday=new Date(thisMonday);lastSunday.setDate(thisMonday.getDate()-1);lastSunday.setHours(23,59,59,999);return {start:lastMonday,end:lastSunday};}  
  if(period==='thisMonth'){return {start:new Date(now.getFullYear(),now.getMonth(),1),end:null};}  
  if(period==='lastMonth'){var lm=new Date(now.getFullYear(),now.getMonth()-1,1);var lmEnd=new Date(now.getFullYear(),now.getMonth(),0);lmEnd.setHours(23,59,59,999);return {start:lm,end:lmEnd};}  
  return {start:null,end:null};  
}  
  
function getFilteredRecords(){  
  var rep=document.getElementById('filterRep').value;var terr=document.getElementById('filterTerritory').value;var priority=document.getElementById('filterPriority').value;var period=document.getElementById('filterPeriod').value;  
  var cutoff=null;var range={start:null,end:null};  
  if(period==='30'||period==='90'){cutoff=new Date(Date.now()-parseInt(period)*24*60*60*1000);}else if(period){range=getPeriodRange(period);}  
  return allRecordsRaw.filter(function(r){  
    var f=r.fields;var repName=(f['Rep Name']||'').trim();repName=repName.charAt(0).toUpperCase()+repName.slice(1).toLowerCase();  
    if(rep&&repName!==rep)return false;if(terr&&f['Territory']!==terr)return false;if(priority&&f['Priority']!==priority)return false;  
    if(cutoff&&f['Visit Date']&&new Date(f['Visit Date'])<cutoff)return false;  
    if(range.start||range.end){if(!f['Visit Date'])return false;var vDate=new Date(f['Visit Date']);if(range.start&&vDate<range.start)return false;if(range.end&&vDate>range.end)return false;}  
    return true;  
  });  
}  
  
function applyFilters(){  
  var filtered=getFilteredRecords();var rep=document.getElementById('filterRep').value;var terr=document.getElementById('filterTerritory').value;var priority=document.getElementById('filterPriority').value;var period=document.getElementById('filterPeriod').value;  
  var searchBox=document.getElementById('repSearch');var q=searchBox?searchBox.value.trim().toLowerCase():'';
  if(q){
    filtered=filtered.filter(function(r){
      var f=r.fields;
      return ['Hospital Name','AI Summary','Meeting Notes','Action Items'].some(function(key){
        var v=f[key];return v&&String(v).toLowerCase().indexOf(q)>-1;
      });
    });
  }
  var periodLabels={thisWeek:'This Week',lastWeek:'Last Week',thisMonth:'This Month',lastMonth:'Last Month','30':'Last 30 Days','90':'Last 90 Days'};  
  var parts=[];if(rep)parts.push('Rep: '+rep);if(terr)parts.push('Territory: '+terr);if(priority)parts.push('Priority: '+priority);if(period)parts.push(periodLabels[period]||period);if(q)parts.push('Search: "'+q+'"');
  document.getElementById('filterStatus').textContent=parts.length?'Filtering: '+parts.join(' · ')+' ('+filtered.length+' visits)':'';  
  renderVisits(filtered);  
}  
  
function resetFilters(){  
  document.getElementById('filterRep').value='';document.getElementById('filterTerritory').value='';document.getElementById('filterPriority').value='';document.getElementById('filterPeriod').value='';document.getElementById('filterStatus').textContent='';  
  renderVisits(allRecordsRaw);  
}  
  
function applyUrlParams(){  
  var params=new URLSearchParams(window.location.search);  
  var rep=params.get('rep');var terr=params.get('territory');var priority=params.get('priority');var period=params.get('period');targetVisitId=params.get('visitId');  
  if(rep)document.getElementById('filterRep').value=rep;  
  if(terr)document.getElementById('filterTerritory').value=terr;  
  if(priority)document.getElementById('filterPriority').value=priority;  
  if(period)document.getElementById('filterPeriod').value=period;  
}  
  
function expandAndScrollToVisit(recordId){  
  if(!recordId)return;  
  var card=document.querySelector('.visit-card[data-id="'+recordId+'"]');if(!card)return;  
  var idx=card.getAttribute('data-idx');var detail=document.getElementById('detail-'+idx);var toggle=card.querySelector('.visit-toggle');  
  // Command Centre / Open Actions context marker — purely in-memory, a
  // plain DOM class with no storage backing it at all. Manager sources
  // (manager-home, manager-actions) keep the original "Opened from
  // Command Centre" treatment, unchanged. The Rep's own Open Actions
  // source gets its own correct wording instead of incorrectly reusing
  // the Manager's ribbon text. Loading Visit History normally, or from
  // any other source, never applies either.
  var _srcParams=new URLSearchParams(window.location.search);
  if(_srcParams.get('source')==='manager-home'||_srcParams.get('source')==='manager-actions'){
    card.classList.add('command-centre-highlight');
  }else if(_srcParams.get('source')==='rep-actions'){
    card.classList.add('rep-actions-highlight');
  }
  // Defensive correction: ensure this specific card's header has the same
  // watch star every other card gets, using the identical construction as
  // the main render loop — not a variant. Self-healing, idempotent: only
  // acts if the star is actually missing and should be present.
  if(idx!==null&&sortedRecords[idx]){
    var hf=sortedRecords[idx].fields||{};
    var hLinkedAccountId=(hf['Account']&&hf['Account'][0])?hf['Account'][0]:null;
    if(!hLinkedAccountId){
      var hNormalizedName=String(hf['Hospital Name']||'').trim().toLowerCase();
      if(hNormalizedName&&accountIdByName[hNormalizedName])hLinkedAccountId=accountIdByName[hNormalizedName];
    }
    var header=card.querySelector('.visit-header');
    if(header&&currentUser.role==='Manager'&&!header.querySelector('.watch-star')){
      var hStarHtml;
      if(hLinkedAccountId){
        var hIsWatched=!!watchedAccountIds[hLinkedAccountId];
        hStarHtml='<button class="watch-star'+(hIsWatched?' watching':'')+'" onclick="event.stopPropagation();toggleWatch(\''+hLinkedAccountId+'\',this)" data-account-id="'+hLinkedAccountId+'" aria-label="'+(hIsWatched?'Remove from watchlist':'Add to watchlist')+'" title="'+(hIsWatched?'Watching — tap to remove':'Tap to watch this account')+'">'+(hIsWatched?'⭐':'☆')+'</button>';
      }else{
        hStarHtml='<button class="watch-star watch-star-unresolved" disabled aria-label="Account not linked — cannot watch" title="This visit is not linked to an account record yet, so it cannot be watched.">☆</button>';
      }
      header.insertAdjacentHTML('afterbegin',hStarHtml);
    }
  }
  if(detail&&!detail.classList.contains('open')){  
    if(!detail.getAttribute('data-rendered')){var f=sortedRecords[idx].fields;detail.innerHTML=renderReviewButton(f,sortedRecords[idx].id)+renderFullReport(f['AI Summary']||f['Meeting Notes']||'')+renderPhotoEvidence(f['Photo URLs']||'',sortedRecords[idx].id);detail.setAttribute('data-rendered','1');loadActionsForVisit(detail,sortedRecords[idx].id);}  
    detail.classList.add('open');card.classList.add('expanded');  
    if(toggle)toggle.innerHTML='<i data-lucide="chevron-up"></i> Tap to collapse';lucide.createIcons({el:toggle});  
  }  
  card.scrollIntoView({behavior:'smooth',block:'start'});  
}  
  
var currentUser=null;  
  
async function loadCurrentUser(){  
  var userId=localStorage.getItem('fieldiq_user_id');var userName=localStorage.getItem('fieldiq_user_name');var userRole=localStorage.getItem('fieldiq_user_role');  
  if(userId&&userName&&userRole){currentUser={userId:userId,name:userName,role:userRole};}  
}  
  
async function loadHistory(){  
  try{  
    if(!currentUser){  
      document.getElementById('visitList').innerHTML='<div class="empty">Please select your name on the Home screen before viewing Visit History.<br><br><a href="./index.html" style="display:inline-block;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;font-weight:700;text-decoration:none;padding:12px 28px;border-radius:12px;box-shadow:0 6px 16px rgba(47,143,255,0.3)">Return Home</a></div>';  
      document.getElementById('countLabel').textContent='';return;  
    }  
    var _incomingParams=new URLSearchParams(window.location.search);
    var _incomingTerritory=_incomingParams.get('territory');
    var endpoint=WORKER+'/get-visits';  
    if(currentUser.role!=='Manager'){
      endpoint=WORKER+'/get-visits?filterByUser='+encodeURIComponent(currentUser.userId);
    }else{
      // Territory only is server-filtered here — it's a constrained,
      // six-value dropdown field, so it's always clean and safe to match
      // exactly. Rep is intentionally NOT server-filtered: rep names are
      // free text and this page's Dashboard-supplied value is normalized
      // for display (trimmed/capitalized) before being put in the URL,
      // which does not necessarily match the raw stored value in Airtable
      // — an exact server-side match can silently return zero records.
      // The existing client-side rep filter below (applyUrlParams() +
      // applyFilters(), which reads ?rep= from the URL independently) was
      // already stable before this fetch existed, so rep filtering is left
      // exactly as it was: fetch everything, filter locally.
      var _q=[];
      if(_incomingTerritory)_q.push('territory='+encodeURIComponent(_incomingTerritory));
      if(_q.length)endpoint+='?'+_q.join('&');
    }
    var res=await fetch(endpoint);var data=await res.json();  
    if(!res.ok)throw new Error(JSON.stringify(data));  
    allRecordsRaw=data.records||[];  
    if(currentUser.role==='Manager'){
      try{
        var wlRes=await fetch(WORKER+'/get-watchlist');
        var wlData=await wlRes.json();
        watchedAccountIds={};
        (wlData.records||[]).forEach(function(w){watchedAccountIds[w.id]=true;});
      }catch(e){watchedAccountIds={};}
      try{
        var accRes=await fetch(WORKER+'/get-accounts');
        var accData=await accRes.json();
        accountIdByName={};
        (accData.records||[]).forEach(function(a){
          var name=String((a.fields||{})['Account Name']||'').trim().toLowerCase();
          if(name)accountIdByName[name]=a.id;
        });
      }catch(e){accountIdByName={};}
    }
    if(currentUser.role==='Manager'){  
      populateRepFilter(allRecordsRaw);document.getElementById('filterBar').style.display='block';  
      document.getElementById('repSearchBox').style.display='block';document.getElementById('repSearch').setAttribute('placeholder','Search accounts…');
      applyUrlParams();applyFilters();  
      if(targetVisitId){expandAndScrollToVisit(targetVisitId);}else{restoreReturnStateIfAny();}  
    }else{  
      document.getElementById('repSearchBox').style.display='block';  
      targetVisitId=new URLSearchParams(window.location.search).get('visitId');  
      renderVisits(allRecordsRaw);  
      if(targetVisitId){expandAndScrollToVisit(targetVisitId);}else{restoreReturnStateIfAny();}  
    }  
  }catch(err){console.error('Visit History failed to load:',err);document.getElementById('visitList').innerHTML='<div class="empty">Could not load your visits. Please try again.</div>';}  
}  
  
loadCurrentUser().then(function(){loadHistory();});

var _repSearchTimer;
document.getElementById('repSearch').addEventListener('input',function(){
  clearTimeout(_repSearchTimer);
  _repSearchTimer=setTimeout(function(){
    if(currentUser&&currentUser.role==='Manager'){applyFilters();return;}
    var q=document.getElementById('repSearch').value.trim().toLowerCase();
    if(!q){renderVisits(allRecordsRaw);return;}
    var filtered=allRecordsRaw.filter(function(r){
      var f=r.fields;
      return ['Hospital Name','AI Summary','Meeting Notes','Action Items'].some(function(key){
        var v=f[key];return v&&String(v).toLowerCase().indexOf(q)>-1;
      });
    });
    renderVisits(filtered);
  },150);
});
</script>

<script>
// Back-to-top floating button — purely cosmetic, self-contained. Created
// entirely via JS so no existing HTML/IDs/layout are touched. Appears only
// after scrolling past 500px, scrolls smoothly to top on click. Does not
// interact with navigation, actions, reminders, photo modal, or any
// business logic.
(function(){
  var btn=document.createElement('button');
  btn.type='button';
  btn.className='back-to-top';
  btn.setAttribute('aria-label','Back to top');
  btn.textContent='↑';
  btn.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });
  document.addEventListener('DOMContentLoaded',function(){
    document.body.appendChild(btn);
  });
  window.addEventListener('scroll',function(){
    btn.classList.toggle('visible',(window.scrollY||document.documentElement.scrollTop)>500);
  },{passive:true});
})();
</script>
