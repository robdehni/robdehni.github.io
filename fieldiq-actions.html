<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Manager Open Actions</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:24px 20px 50px}
.container{max-width:980px;margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-cloud{font-size:26px;line-height:1}.brand-text h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}.brand-text h1 span{color:#2f8fff}.brand-text p{font-size:10px;color:#8a9bb3;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.header{margin-bottom:18px}.page-subtitle{color:#7a8aa3;font-size:13px;margin-top:6px;font-weight:600}
.home-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:16px;border:1px solid #e3ebf5;box-shadow:0 2px 8px rgba(11,31,58,0.05)}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.summary-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.summary-num{font-size:24px;font-weight:900;color:#0b1f3a}.summary-label{font-size:11px;color:#8a9bb3;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.filters{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(11,31,58,0.05);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.filter-field label{display:block;font-size:10px;color:#8a9bb3;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.filter-field select,.filter-field input{width:100%;padding:11px;border:1.5px solid #dde8f5;border-radius:10px;background:#f8fbff;color:#0b1f3a;font-weight:700;outline:none}
.tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab-btn{border:1px solid #e3ebf5;background:#fff;color:#7a8aa3;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:900;white-space:nowrap;cursor:pointer;box-shadow:0 2px 8px rgba(11,31,58,0.04)}
.tab-btn.active{background:#2f8fff;color:#fff;border-color:#2f8fff}
.account-card{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.account-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}
.account-name{font-size:16px;font-weight:900;color:#0b1f3a;line-height:1.35}.account-meta{font-size:12px;color:#8a9bb3;font-weight:800;margin-top:3px}
.status-pill{border-radius:999px;padding:5px 10px;font-size:10.5px;font-weight:900;white-space:nowrap}
.status-open{background:#eaf3ff;color:#2f8fff}.status-overdue{background:#ffe1e5;color:#c43048}.status-completed{background:#e1f5ea;color:#1f8a52}
.expand-btn{width:100%;border:1.5px solid #2f8fff;background:#eaf3ff;color:#2f8fff;border-radius:12px;padding:11px;font-size:14px;font-weight:900;cursor:pointer;margin:8px 0}
.action-list{display:none;margin-top:10px;border-top:1px solid #e3ebf5;padding-top:8px}.account-card.expanded .action-list{display:block}
.action-row{padding:11px 0;border-bottom:1px solid #eef3fa}.action-row:last-child{border-bottom:none}.action-text{font-size:13.5px;color:#3d4f6b;line-height:1.55;font-weight:650;white-space:pre-wrap}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.meta{font-size:10.5px;font-weight:900;padding:5px 9px;border-radius:8px;background:#f4f8fc;color:#7a8aa3;border:1px solid #e3ebf5}
.reminder-btn{width:100%;border:none;border-radius:12px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;padding:13px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.25);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}.reminder-btn:disabled{opacity:.55;cursor:not-allowed;background:#8a9bb3;box-shadow:none}
.loading{text-align:center;padding:46px 20px;color:#8a9bb3;font-weight:700}.spinner{width:34px;height:34px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
.empty,.error-box{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:28px 20px;text-align:center;color:#8a9bb3;font-weight:800;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.error-box{background:#fff3e0;border-color:#ffe5b3;color:#7a6000}.retry-btn{margin-top:10px;border:none;background:#2f8fff;color:#fff;padding:10px 18px;border-radius:10px;font-weight:900}
.toast{position:fixed;left:20px;right:20px;bottom:22px;background:#0b1f3a;color:#fff;border-radius:14px;padding:14px;text-align:center;font-weight:900;font-size:13px;display:none;box-shadow:0 10px 26px rgba(11,31,58,0.25);z-index:999}.toast.visible{display:block}
.footer{text-align:center;color:#aab8cc;font-size:11px;font-weight:600;margin-top:30px}
@media(max-width:720px){.summary-grid{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr}.container{max-width:620px}}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="brand"><span class="brand-cloud">☁️</span><div class="brand-text"><h1>Field<span>IQ</span></h1><p>Territory Intelligence Platform</p></div></div><p class="page-subtitle">Manager Open Actions</p></div>
<a href="./fieldiq.html" class="home-btn">← Manager Home</a>
<div class="summary-grid">
<div class="summary-card"><div class="summary-num" id="openCount">0</div><div class="summary-label">Open</div></div>
<div class="summary-card"><div class="summary-num" id="overdueCount">0</div><div class="summary-label">Overdue</div></div>
<div class="summary-card"><div class="summary-num" id="todayCount">0</div><div class="summary-label">Due Today</div></div>
<div class="summary-card"><div class="summary-num" id="completedCount">0</div><div class="summary-label">Completed</div></div>
</div>
<div class="filters">
<div class="filter-field"><label>Rep</label><select id="repFilter"><option value="">All reps</option></select></div>
<div class="filter-field"><label>Account</label><input id="accountFilter" placeholder="Search account..."></div>
<div class="filter-field"><label>Action</label><input id="textFilter" placeholder="Search action..."></div>
</div>
<div class="tabs"><button class="tab-btn active" data-tab="open">Open</button><button class="tab-btn" data-tab="overdue">Overdue</button><button class="tab-btn" data-tab="today">Due Today</button><button class="tab-btn" data-tab="upcoming">Upcoming</button><button class="tab-btn" data-tab="completed">Completed</button><button class="tab-btn" data-tab="all">All</button></div>
<div id="content"><div class="loading"><div class="spinner"></div>Loading manager actions...</div></div>
<div class="footer">FieldIQ v2.1 · 2026</div>
</div><div class="toast" id="toast">Reminder sent.</div>
<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var currentUserId=localStorage.getItem('fieldiq_user_id'),currentUserName=localStorage.getItem('fieldiq_user_name'),currentUserRole=localStorage.getItem('fieldiq_user_role')||'';
var openActions=[],completedActions=[],allActions=[],usersByRecordId={},activeTab='open',expanded={};
if(!currentUserId||!currentUserName){window.location.href='./index.html';throw new Error('No identity locked');}
if(currentUserRole!=='Manager'){window.location.href='./index.html';throw new Error('Managers only');}
function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]);});}
function todayISO(){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString().slice(0,10);}
function formatDate(v){if(!v)return '';try{return new Date(v+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return v;}}
function formatDateTime(v){if(!v)return '';try{return new Date(v).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return v;}}
function timeoutPromise(ms,msg){return new Promise(function(_,reject){setTimeout(function(){reject(new Error(msg||'Timeout'));},ms);});}
function fetchJson(url,ms){return Promise.race([fetch(url,{cache:'no-store'}).then(function(r){return r.json().then(function(d){if(!r.ok){throw new Error(d.error||('HTTP '+r.status));}return d;});}),timeoutPromise(ms||8000,'Worker timed out')]);}
function getDueState(f){var due=f['Due Date']||'';if((f['Status']||'Open')==='Completed')return 'completed';if(!due)return 'open';if(due<todayISO())return 'overdue';if(due===todayISO())return 'today';return 'upcoming';}
function getAssignedRepName(f){var a=f['Assigned Rep']||[];if(a.length&&usersByRecordId[a[0]])return usersByRecordId[a[0]].name;return f['Rep Name']||a[0]||'Unassigned';}
function getAssignedRepKey(f){var a=f['Assigned Rep']||[];if(a.length&&usersByRecordId[a[0]])return usersByRecordId[a[0]].userId||a[0];return f['Rep Name']||a[0]||'';}
function reminderLockText(group){var latest='';group.forEach(function(r){var v=(r.fields||{})['Last Reminder Sent At'];if(v&&(!latest||new Date(v)>new Date(latest)))latest=v;});if(!latest)return '';var h=(Date.now()-new Date(latest).getTime())/36e5;if(h<24)return 'Locked '+Math.ceil(24-h)+'h';return '';}
function canSendReminder(group){return !reminderLockText(group)&&group.some(function(r){return (r.fields||{})['Status']!=='Completed';});}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg||'Reminder sent.';t.className='toast visible';setTimeout(function(){t.className='toast';},1800);}
async function loadUsersBestEffort(){try{var d=await fetchJson(WORKER+'/get-users',4000);(d.records||[]).forEach(function(x){var f=x.fields||{};usersByRecordId[x.id]={name:f['Display Name']||f['User ID']||x.id,userId:f['User ID']||''};});}catch(e){}}
async function loadActions(){
document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Loading manager actions...</div>';
try{
var openData=await fetchJson(WORKER+'/get-actions?role=Manager&status=Open',8000);
openActions=openData.records||[];
completedActions=[];
try{var compData=await fetchJson(WORKER+'/get-actions?role=Manager&status=Completed',5000);completedActions=(compData.records||[]).filter(function(r){var c=(r.fields||{})['Completed At'];if(!c)return true;return ((Date.now()-new Date(c).getTime())/86400000)<=7;});}catch(e){completedActions=[];}
await loadUsersBestEffort();
allActions=openActions.concat(completedActions);
buildRepFilter();render();
}catch(err){document.getElementById('content').innerHTML='<div class="error-box">Could not load manager actions.<br>'+escapeHtml(err.message)+'<br><button class="retry-btn" onclick="loadActions()">Retry</button></div>';}
}
function buildRepFilter(){var sel=document.getElementById('repFilter'),keep=sel.value,reps={};allActions.forEach(function(r){var f=r.fields||{},k=getAssignedRepKey(f);if(k)reps[k]=getAssignedRepName(f);});sel.innerHTML='<option value="">All reps</option>';Object.keys(reps).sort(function(a,b){return reps[a].localeCompare(reps[b]);}).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=reps[k];sel.appendChild(o);});sel.value=keep;}
function applyFilters(list){var rep=document.getElementById('repFilter').value,acc=document.getElementById('accountFilter').value.trim().toLowerCase(),txt=document.getElementById('textFilter').value.trim().toLowerCase();return list.filter(function(r){var f=r.fields||{};if(rep&&getAssignedRepKey(f)!==rep)return false;if(acc&&String(f['Account Name']||'').toLowerCase().indexOf(acc)===-1)return false;if(txt&&String(f['Action Text']||'').toLowerCase().indexOf(txt)===-1)return false;return true;});}
function listForTab(){var l=allActions;if(activeTab==='open')l=openActions;else if(activeTab==='completed')l=completedActions;else if(activeTab==='all')l=allActions;else l=openActions.filter(function(r){return getDueState(r.fields||{})===activeTab;});return applyFilters(l);}
function groupActions(list){var g={};list.forEach(function(r){var f=r.fields||{},rep=getAssignedRepName(f),key=(f['Account Name']||'Unknown Account')+'||'+rep;if(!g[key])g[key]=[];g[key].push(r);});return g;}
function updateCounts(){document.getElementById('openCount').textContent=openActions.length;document.getElementById('overdueCount').textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='overdue';}).length;document.getElementById('todayCount').textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='today';}).length;document.getElementById('completedCount').textContent=completedActions.length;}
function safeKeyFor(key){return btoa(unescape(encodeURIComponent(key))).replace(/=/g,'');}
function render(){updateCounts();var list=listForTab(),content=document.getElementById('content');if(!list.length){content.innerHTML='<div class="empty">No actions in this view.</div>';return;}var groups=groupActions(list),html='';Object.keys(groups).sort().forEach(function(key){var group=groups[key],f=group[0].fields||{},rep=getAssignedRepName(f),account=f['Account Name']||'Unknown Account';var anyOver=group.some(function(r){return getDueState(r.fields||{})==='overdue';}),allDone=group.every(function(r){return (r.fields||{})['Status']==='Completed';});var pillClass=allDone?'status-completed':(anyOver?'status-overdue':'status-open'),pillText=allDone?'Completed':(anyOver?'Overdue':'Open'),lock=reminderLockText(group),disabled=!canSendReminder(group),dueDates=group.map(function(r){return (r.fields||{})['Due Date'];}).filter(Boolean).sort(),due=dueDates[0]||'',sk=safeKeyFor(key);window['_k_'+sk]=key;var isExp=expanded[key];html+='<div class="account-card '+(isExp?'expanded':'')+'"><div class="account-top"><div><div class="account-name">'+escapeHtml(account)+'</div><div class="account-meta">'+group.length+' action'+(group.length>1?'s':'')+' · '+escapeHtml(rep)+(due?' · Due '+escapeHtml(formatDate(due)):'')+'</div></div><div class="status-pill '+pillClass+'">'+pillText+'</div></div><button class="expand-btn" onclick="toggleExpandKey(\\''+sk+'\\')">'+(isExp?'⌃ Collapse':'▸ Expand')+'</button><div class="action-list">';
group.forEach(function(r){var x=r.fields||{};html+='<div class="action-row"><div class="action-text">→ '+escapeHtml(x['Action Text']||'')+'</div><div class="meta-row"><span class="meta">Rep: '+escapeHtml(getAssignedRepName(x))+'</span>'+(x['Due Date']?'<span class="meta">Due: '+escapeHtml(formatDate(x['Due Date']))+'</span>':'')+(x['Due Time']?'<span class="meta">Time: '+escapeHtml(x['Due Time'])+'</span>':'')+'<span class="meta">Reminders: '+escapeHtml(x['Reminder Count']||0)+'</span>'+(x['Completed At']?'<span class="meta">Completed: '+escapeHtml(formatDateTime(x['Completed At']))+'</span>':'')+'</div></div>';});
html+='</div>';if(!allDone){html+='<button class="reminder-btn" onclick="sendGroupReminderKey(\\''+sk+'\\')" '+(disabled?'disabled':'')+'><i data-lucide="send"></i> '+(lock?'Reminder sent · '+lock:'Send Reminder')+'</button>';}html+='</div>';});content.innerHTML=html;if(window.lucide)lucide.createIcons();}
function toggleExpandKey(sk){var key=window['_k_'+sk];expanded[key]=!expanded[key];render();}
async function sendGroupReminderKey(sk){var key=window['_k_'+sk],groups=groupActions(listForTab()),group=groups[key]||[],first=group.find(function(r){return (r.fields||{})['Status']!=='Completed';});if(!first)return;try{var res=await fetch(WORKER+'/send-reminder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actionId:first.id})});var data=await res.json();if(!res.ok){if(data.locked)throw new Error('Reminder already sent. Available again in '+(data.hoursRemaining||24)+'h.');throw new Error(data.error||'Could not send reminder');}showToast('Reminder sent.');await loadActions();}catch(err){alert(err.message);await loadActions();}}
document.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');activeTab=btn.getAttribute('data-tab');render();});});
document.getElementById('repFilter').addEventListener('change',render);document.getElementById('accountFilter').addEventListener('input',render);document.getElementById('textFilter').addEventListener('input',render);
document.addEventListener('DOMContentLoaded',function(){if(window.lucide)lucide.createIcons();loadActions();});
</script>
</body>
</html>
