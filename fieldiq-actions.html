<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';

var currentUserId=localStorage.getItem('fieldiq_user_id');
var currentUserName=localStorage.getItem('fieldiq_user_name');
var currentUserRole=localStorage.getItem('fieldiq_user_role')||'';

var openActions=[];
var completedActions=[];
var allActions=[];
var usersByRecordId={};
var activeTab='open';
var expanded={};
var currentGroups={};

if(!currentUserId||!currentUserName){
  window.location.href='./index.html';
  throw new Error('No identity locked');
}
if(currentUserRole!=='Manager'){
  window.location.href='./index.html';
  throw new Error('Managers only');
}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
  });
}

function todayISO(){
  var d=new Date();
  return new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString().slice(0,10);
}

function formatDate(v){
  if(!v)return '';
  try{
    return new Date(v+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }catch(e){return v;}
}

function formatDateTime(v){
  if(!v)return '';
  try{
    return new Date(v).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  }catch(e){return v;}
}

async function fetchJson(url,ms){
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},ms||10000);

  try{
    var res=await fetch(url,{cache:'no-store',signal:controller.signal});
    var text=await res.text();

    console.log('[FieldIQ Actions] FETCH',url,'STATUS',res.status,'BODY',text.slice(0,300));

    if(!res.ok){
      throw new Error('HTTP '+res.status+' from '+url+' — '+text.slice(0,250));
    }

    try{
      return JSON.parse(text);
    }catch(e){
      throw new Error('Invalid JSON from '+url+' — '+text.slice(0,250));
    }
  }catch(e){
    if(e.name==='AbortError'){
      throw new Error('Worker timed out after '+((ms||10000)/1000)+' seconds: '+url);
    }
    throw e;
  }finally{
    clearTimeout(timer);
  }
}

function getField(f,names,fallback){
  for(var i=0;i<names.length;i++){
    if(f[names[i]]!==undefined && f[names[i]]!==null && f[names[i]]!=='') return f[names[i]];
  }
  return fallback||'';
}

function getStatus(f){
  return getField(f,['Status','Action Status'],'Open');
}

function isCompleted(f){
  return String(getStatus(f)).toLowerCase()==='completed' || !!getField(f,['Completed At','Completed Date'],'');
}

function getDueState(f){
  if(isCompleted(f))return 'completed';
  var due=getField(f,['Due Date','Action Due Date'],'');
  if(!due)return 'open';
  if(due<todayISO())return 'overdue';
  if(due===todayISO())return 'today';
  return 'upcoming';
}

function getAccountName(f){
  return getField(f,['Account Name','Hospital Name','Hospital','Account'],'Unknown Account');
}

function getActionText(f){
  return getField(f,['Action Text','Action','Action Item','Task','Next Step'],'');
}

function getRepName(f){
  var assigned=f['Assigned Rep']||[];
  if(Array.isArray(assigned)&&assigned.length&&usersByRecordId[assigned[0]]){
    return usersByRecordId[assigned[0]].name;
  }
  return getField(f,['Rep Name','Assigned Rep Name','Owner','User Name'],'Unassigned');
}

function getRepKey(f){
  var assigned=f['Assigned Rep']||[];
  if(Array.isArray(assigned)&&assigned.length){
    if(usersByRecordId[assigned[0]])return usersByRecordId[assigned[0]].userId||assigned[0];
    return assigned[0];
  }
  return getRepName(f);
}

function getTerritory(f){
  return getField(f,['Territory','Area','Zone'],'');
}

function getPriority(f){
  return getField(f,['Priority','Action Priority'],'');
}

function reminderLockText(f){
  var latest=getField(f,['Last Reminder Sent At','Reminder Sent At'],'');
  if(!latest)return '';
  var h=(Date.now()-new Date(latest).getTime())/36e5;
  if(h<24)return 'Locked '+Math.ceil(24-h)+'h';
  return '';
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg||'Done.';
  t.className='toast visible';
  setTimeout(function(){t.className='toast';},1800);
}

async function loadUsersBestEffort(){
  try{
    var d=await fetchJson(WORKER+'/get-users',5000);
    (d.records||[]).forEach(function(x){
      var f=x.fields||{};
      usersByRecordId[x.id]={
        name:f['Display Name']||f['User ID']||x.id,
        userId:f['User ID']||''
      };
    });
  }catch(e){
    console.warn('[FieldIQ Actions] Users load skipped:',e.message);
  }
}

async function loadActions(){
  var content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div>Loading manager actions...</div>';

  try{
    await loadUsersBestEffort();

    var openData=await fetchJson(WORKER+'/get-actions?role=Manager&status=Open',10000);
    openActions=openData.records||[];

    completedActions=[];
    try{
      var completedData=await fetchJson(WORKER+'/get-actions?role=Manager&status=Completed',7000);
      completedActions=(completedData.records||[]).filter(function(r){
        var f=r.fields||{};
        var c=getField(f,['Completed At','Completed Date'],'');
        if(!c)return true;
        return ((Date.now()-new Date(c).getTime())/86400000)<=14;
      });
    }catch(e){
      console.warn('[FieldIQ Actions] Completed actions skipped:',e.message);
    }

    allActions=openActions.concat(completedActions);
    buildRepFilter();
    render();

  }catch(err){
    content.innerHTML=
      '<div class="error-box">Could not load Manager Open Actions.<br><br>'+escapeHtml(err.message)+
      '<br><button class="retry-btn" id="retryBtn">Retry</button></div>';

    var retry=document.getElementById('retryBtn');
    if(retry)retry.addEventListener('click',loadActions);
  }
}

function buildRepFilter(){
  var sel=document.getElementById('repFilter');
  if(!sel)return;

  var keep=sel.value;
  var reps={};

  allActions.forEach(function(r){
    var f=r.fields||{};
    var k=getRepKey(f);
    if(k)reps[k]=getRepName(f);
  });

  sel.innerHTML='<option value="">All reps</option>';

  Object.keys(reps).sort(function(a,b){
    return reps[a].localeCompare(reps[b]);
  }).forEach(function(k){
    var o=document.createElement('option');
    o.value=k;
    o.textContent=reps[k];
    sel.appendChild(o);
  });

  sel.value=keep;
}

function listForTab(){
  var list=openActions;

  if(activeTab==='completed')list=completedActions;
  else if(activeTab==='all')list=allActions;
  else if(activeTab==='overdue')list=openActions.filter(function(r){return getDueState(r.fields||{})==='overdue';});
  else if(activeTab==='today')list=openActions.filter(function(r){return getDueState(r.fields||{})==='today';});
  else if(activeTab==='upcoming')list=openActions.filter(function(r){return getDueState(r.fields||{})==='upcoming';});
  else list=openActions;

  return applyFilters(list);
}

function applyFilters(list){
  var rep=document.getElementById('repFilter')?document.getElementById('repFilter').value:'';
  var acc=document.getElementById('accountFilter')?document.getElementById('accountFilter').value.trim().toLowerCase():'';
  var txt=document.getElementById('textFilter')?document.getElementById('textFilter').value.trim().toLowerCase():'';

  return list.filter(function(r){
    var f=r.fields||{};
    if(rep && getRepKey(f)!==rep)return false;
    if(acc && getAccountName(f).toLowerCase().indexOf(acc)===-1)return false;
    if(txt && getActionText(f).toLowerCase().indexOf(txt)===-1)return false;
    return true;
  });
}

function groupByAccount(list){
  var groups={};

  list.forEach(function(r){
    var f=r.fields||{};
    var account=getAccountName(f);
    var key=account;

    if(!groups[key]){
      groups[key]={
        key:key,
        account:account,
        actions:[],
        reps:{},
        territories:{}
      };
    }

    groups[key].actions.push(r);
    groups[key].reps[getRepName(f)]=true;

    var terr=getTerritory(f);
    if(terr)groups[key].territories[terr]=true;
  });

  return Object.keys(groups).sort().map(function(k){return groups[k];});
}

function updateCounts(){
  var open=document.getElementById('openCount');
  var overdue=document.getElementById('overdueCount');
  var today=document.getElementById('todayCount');
  var completed=document.getElementById('completedCount');

  if(open)open.textContent=openActions.length;
  if(overdue)overdue.textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='overdue';}).length;
  if(today)today.textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='today';}).length;
  if(completed)completed.textContent=completedActions.length;
}

function render(){
  updateCounts();

  var content=document.getElementById('content');
  var list=listForTab();

  if(!list.length){
    content.innerHTML='<div class="empty">No actions in this view.</div>';
    return;
  }

  var groups=groupByAccount(list);
  currentGroups={};

  var html='';

  groups.forEach(function(group,index){
    var gid='g'+index;
    currentGroups[gid]=group;

    var actions=group.actions;
    var reps=Object.keys(group.reps).join(', ');
    var territories=Object.keys(group.territories).join(', ');

    var anyOverdue=actions.some(function(r){return getDueState(r.fields||{})==='overdue';});
    var allDone=actions.every(function(r){return isCompleted(r.fields||{});});

    var pillClass=allDone?'status-completed':(anyOverdue?'status-overdue':'status-open');
    var pillText=allDone?'Completed':(anyOverdue?'Overdue':'Open');

    var dueDates=actions.map(function(r){
      return getField(r.fields||{},['Due Date','Action Due Date'],'');
    }).filter(Boolean).sort();

    var due=dueDates[0]||'';
    var isExp=!!expanded[group.key];

    html+=
      '<div class="account-card '+(isExp?'expanded':'')+'">'+
        '<div class="account-top">'+
          '<div>'+
            '<div class="account-name">'+escapeHtml(group.account)+'</div>'+
            '<div class="account-meta">'+
              actions.length+' action'+(actions.length>1?'s':'')+
              ' · Rep: '+escapeHtml(reps||'Unassigned')+
              (territories?' · '+escapeHtml(territories):'')+
              (due?' · Next due '+escapeHtml(formatDate(due)):'')+
            '</div>'+
          '</div>'+
          '<div class="status-pill '+pillClass+'">'+pillText+'</div>'+
        '</div>'+

        '<button class="expand-btn" data-expand="'+gid+'">'+
          (isExp?'⌃ Collapse':'▸ Expand')+
        '</button>'+

        '<div class="action-list">';

    actions.forEach(function(r){
      var f=r.fields||{};
      var state=getDueState(f);
      var lock=reminderLockText(f);
      var completed=isCompleted(f);
      var dueVal=getField(f,['Due Date','Action Due Date'],'');
      var completedVal=getField(f,['Completed At','Completed Date'],'');

      html+=
        '<div class="action-row">'+
          '<div class="action-text">→ '+escapeHtml(getActionText(f)||'No action text')+'</div>'+
          '<div class="meta-row">'+
            '<span class="meta">Rep: '+escapeHtml(getRepName(f))+'</span>'+
            (getPriority(f)?'<span class="meta">Priority: '+escapeHtml(getPriority(f))+'</span>':'')+
            (dueVal?'<span class="meta">Due: '+escapeHtml(formatDate(dueVal))+'</span>':'')+
            '<span class="meta">Status: '+escapeHtml(state)+'</span>'+
            '<span class="meta">Reminders: '+escapeHtml(getField(f,['Reminder Count'],0))+'</span>'+
            (completedVal?'<span class="meta">Completed: '+escapeHtml(formatDateTime(completedVal))+'</span>':'')+
          '</div>';

      if(!completed){
        html+=
          '<button class="reminder-btn" data-reminder="'+escapeHtml(r.id)+'" '+(lock?'disabled':'')+'>'+
            '<i data-lucide="send"></i> '+(lock?'Reminder sent · '+lock:'Send Reminder')+
          '</button>';
      }

      html+='</div>';
    });

    html+='</div></div>';
  });

  content.innerHTML=html;

  attachRenderEvents();

  if(window.lucide)lucide.createIcons();
}

function attachRenderEvents(){
  document.querySelectorAll('[data-expand]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var gid=btn.getAttribute('data-expand');
      var group=currentGroups[gid];
      if(!group)return;
      expanded[group.key]=!expanded[group.key];
      render();
    });
  });

  document.querySelectorAll('[data-reminder]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var id=btn.getAttribute('data-reminder');
      sendReminder(id,btn);
    });
  });
}

async function sendReminder(actionId,btn){
  if(!actionId)return;

  btn.disabled=true;
  var oldText=btn.textContent;
  btn.textContent='Sending reminder...';

  try{
    var res=await fetch(WORKER+'/send-reminder',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({actionId:actionId})
    });

    var text=await res.text();
    var data={};

    try{data=JSON.parse(text);}catch(e){}

    if(!res.ok){
      if(data.locked){
        throw new Error('Reminder already sent. Available again in '+(data.hoursRemaining||24)+'h.');
      }
      throw new Error(data.error||text.slice(0,200)||'Could not send reminder');
    }

    showToast('Reminder sent.');
    await loadActions();

  }catch(err){
    alert(err.message);
    btn.disabled=false;
    btn.textContent=oldText;
  }
}

function bindStaticEvents(){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      activeTab=btn.getAttribute('data-tab');
      render();
    });
  });

  var rep=document.getElementById('repFilter');
  var account=document.getElementById('accountFilter');
  var text=document.getElementById('textFilter');

  if(rep)rep.addEventListener('change',render);
  if(account)account.addEventListener('input',render);
  if(text)text.addEventListener('input',render);
}

document.addEventListener('DOMContentLoaded',function(){
  bindStaticEvents();
  if(window.lucide)lucide.createIcons();
  loadActions();
});
</script>
