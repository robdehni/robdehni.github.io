<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{text-align:center;margin-bottom:40px}
.logo h1{font-size:42px;font-weight:800;color:#00d4ff;letter-spacing:-1px}
.logo p{color:#444;font-size:13px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.modules{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}
.module{display:flex;align-items:center;gap:16px;background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:18px 20px;text-decoration:none;color:#fff;transition:all 0.2s}
.module:active{border-color:#00d4ff33;background:#141414}
.module-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0}
.module-text{flex:1}
.module-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px}
.module-desc{font-size:11px;color:#555}
.module.primary{border-color:#00d4ff44;background:#00d4ff08}
.module.primary .module-title{color:#00d4ff}
.divider{width:100%;max-width:380px;display:flex;align-items:center;gap:12px;margin:4px 0}
.divider-line{flex:1;height:1px;background:#1a1a1a}
.divider-text{font-size:10px;color:#333;text-transform:uppercase;letter-spacing:1px}
.footer{margin-top:40px;text-align:center;color:#2a2a2a;font-size:11px}
.version{color:#1a1a1a;font-size:10px;margin-top:4px}
.user-locked{width:100%;max-width:380px;display:flex;align-items:center;justify-content:space-between;background:#0d1a0d;border:1px solid #00ff4422;border-radius:14px;padding:14px 18px;margin-bottom:16px}
.user-locked-info{display:flex;align-items:center;gap:10px}
.user-locked-avatar{font-size:22px}
.user-locked-name{font-size:15px;font-weight:700;color:#00ff88}
.user-locked-role{font-size:11px;color:#555;margin-top:2px}
.switch-user-btn{font-size:11px;color:#333;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px}
.switch-user-btn:hover{color:#888}
.user-select-box{width:100%;max-width:380px;margin-bottom:16px}
.user-select-box label{font-size:11px;color:#888;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.user-select-box select{width:100%;padding:14px;background:#111;border:1px solid #1a1a1a;border-radius:14px;color:#fff;font-size:15px;outline:none}
.pin-box{width:100%;max-width:380px;margin-bottom:16px;background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:16px}
.pin-box label{font-size:11px;color:#888;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.pin-box input{width:100%;padding:14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:18px;letter-spacing:4px;text-align:center;outline:none}
.pin-box .pin-btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#00d4ff;color:#000;font-size:14px;font-weight:700;cursor:pointer}
.pin-error{color:#ff6666;font-size:12px;margin-top:8px;text-align:center;display:none}
.pin-error.visible{display:block}
.pin-cancel{font-size:11px;color:#555;text-align:center;margin-top:10px;display:block;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="logo">
  <h1>FieldIQ</h1>
  <p>Territory Intelligence Platform</p>
</div>

<div id="identitySection" style="width:100%;max-width:380px"></div>

<div class="modules">
  <a class="module primary" href="./fieldiq-log-visit.html">
    <div class="module-icon">🎙️</div>
    <div class="module-text">
      <div class="module-title">Log Visit</div>
      <div class="module-desc">Record a field visit — voice to AI report</div>
    </div>
  </a>
  <a class="module" href="./fieldiq-visit-history.html">
    <div class="module-icon">📋</div>
    <div class="module-text">
      <div class="module-title">Visit History</div>
      <div class="module-desc">Your logged visits — dates, accounts, summaries</div>
    </div>
  </a>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Help</div>
    <div class="divider-line"></div>
  </div>
  <a class="module" href="./fieldiq-guide.html">
    <div class="module-icon">📖</div>
    <div class="module-text">
      <div class="module-title">Quick Start Guide</div>
      <div class="module-desc">How to use FieldIQ</div>
    </div>
  </a>
</div>
<div class="footer">
  Mid East Medical FZC — UAE
  <div class="version">FieldIQ v1.0 — 2026</div>
</div>

<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var pendingUser=null;

function switchUser(){
  localStorage.removeItem('fieldiq_user_id');
  localStorage.removeItem('fieldiq_user_name');
  localStorage.removeItem('fieldiq_user_role');
  pendingUser=null;
  location.reload();
}

function renderIdentity(){
  var section=document.getElementById('identitySection');
  var savedId=localStorage.getItem('fieldiq_user_id');
  var savedName=localStorage.getItem('fieldiq_user_name');
  var savedRole=localStorage.getItem('fieldiq_user_role');

  if(savedId && savedName){
    section.innerHTML=
      '<div class="user-locked">'+
        '<div class="user-locked-info">'+
          '<div class="user-locked-avatar">👤</div>'+
          '<div>'+
            '<div class="user-locked-name">'+savedName+'</div>'+
            '<div class="user-locked-role">'+(savedRole||'Sales Rep')+'</div>'+
          '</div>'+
        '</div>'+
        '<button class="switch-user-btn" onclick="switchUser()">Switch User</button>'+
      '</div>';
  } else {
    section.innerHTML=
      '<div class="user-select-box">'+
        '<label>Who are you?</label>'+
        '<select id="homeUserSelect"><option value="">Loading users...</option></select>'+
      '</div>'+
      '<div id="pinSection"></div>';
    loadUsers();
  }
}

function showPinBox(opt){
  pendingUser={
    id: opt.value,
    name: opt.getAttribute('data-name')||opt.value,
    role: opt.getAttribute('data-role')||'Sales Rep',
    pin: opt.getAttribute('data-pin')||''
  };
  var pinSection=document.getElementById('pinSection');
  pinSection.innerHTML=
    '<div class="pin-box">'+
      '<label>Enter PIN for '+pendingUser.name+'</label>'+
      '<input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="••••">'+
      '<button class="pin-btn" id="pinSubmitBtn">Confirm</button>'+
      '<div class="pin-error" id="pinError">Incorrect PIN. Please try again.</div>'+
      '<span class="pin-cancel" id="pinCancel">Cancel</span>'+
    '</div>';

  document.getElementById('pinSubmitBtn').addEventListener('click',checkPin);
  document.getElementById('pinInput').addEventListener('keydown',function(e){
    if(e.key==='Enter')checkPin();
  });
  document.getElementById('pinCancel').addEventListener('click',function(){
    pendingUser=null;
    document.getElementById('pinSection').innerHTML='';
    document.getElementById('homeUserSelect').value='';
  });
  document.getElementById('pinInput').focus();
}

function checkPin(){
  var entered=document.getElementById('pinInput').value.trim();
  var errorEl=document.getElementById('pinError');
  if(!pendingUser){return;}
  if(entered && entered===String(pendingUser.pin)){
    localStorage.setItem('fieldiq_user_id',pendingUser.id);
    localStorage.setItem('fieldiq_user_name',pendingUser.name);
    localStorage.setItem('fieldiq_user_role',pendingUser.role);
    pendingUser=null;
    renderIdentity();
  } else {
    errorEl.className='pin-error visible';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
  }
}

async function loadUsers(){
  try{
    var res=await fetch(WORKER+'/get-users');
    var data=await res.json();
    var sel=document.getElementById('homeUserSelect');
    if(!sel)return;
    sel.innerHTML='<option value="">Select your name...</option>';
    if(data.records){
      data.records.forEach(function(r){
        var f=r.fields;
        if(f['Active?']===false)return;
        var opt=document.createElement('option');
        opt.value=f['User ID']||'';
        opt.textContent=(f['Display Name']||f['User ID']||'Unknown');
        opt.setAttribute('data-name',f['Display Name']||'');
        opt.setAttribute('data-role',f['Role']||'Sales Rep');
        opt.setAttribute('data-pin',f['PIN']||'');
        sel.appendChild(opt);
      });
    }
    sel.addEventListener('change',function(){
      if(!sel.value){
        document.getElementById('pinSection').innerHTML='';
        return;
      }
      var selectedOpt=sel.options[sel.selectedIndex];
      showPinBox(selectedOpt);
    });
  }catch(err){
    var sel=document.getElementById('homeUserSelect');
    if(sel)sel.innerHTML='<option value="">Could not load users</option>';
  }
}

renderIdentity();
</script>
</body>
</html>
