<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ Voice Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:20px;min-height:100vh}
h1{color:#00d4ff;text-align:center;padding:16px 0 4px}
p.sub{color:#888;text-align:center;font-size:13px;margin-bottom:24px}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;margin:6px 0}
.rec{background:#00d4ff;color:#000}
.stp{background:#ff4444;color:#fff;display:none}
#timer{text-align:center;font-size:40px;font-weight:700;color:#333;margin:16px 0}
#timer.on{color:#ff4444}
#status{text-align:center;color:#888;font-size:13px;margin-bottom:12px}
audio{width:100%;margin:12px 0;display:none}
textarea{width:100%;background:#111;border:1px solid #222;border-radius:10px;padding:12px;color:#ccc;font-size:14px;min-height:100px;margin-top:8px;font-family:sans-serif}
.save{background:#00d4ff;color:#000;display:none}
.ok{background:#0a1a0a;border:1px solid #00ff4422;border-radius:10px;padding:12px;color:#00ff88;text-align:center;margin-top:12px;display:none}
.err{color:#ff6666;text-align:center;margin-top:12px}
</style>
</head>
<body>
<h1>FieldIQ</h1>
<p class="sub">Voice Capture — MediaRecorder</p>
<div id="timer">0:00</div>
<div id="status">Tap Record and speak naturally</div>
<button class="btn rec" id="recBtn">⏺ Record</button>
<button class="btn stp" id="stpBtn">⏹ Stop</button>
<audio id="player" controls></audio>
<textarea id="notes" placeholder="Add any notes here after recording..."></textarea>
<button class="btn save" id="saveBtn">Save Visit Notes</button>
<div class="ok" id="ok">✅ Saved</div>
<div class="err" id="err"></div>
<script>
window.onerror=function(m,s,l){document.getElementById('err').textContent='Error: '+m+' line '+l};
var rec,chunks=[],secs=0,tmr;
document.getElementById('recBtn').onclick=async function(){
  try{
    chunks=[];secs=0;
    document.getElementById('timer').textContent='0:00';
    document.getElementById('timer').className='on';
    document.getElementById('player').style.display='none';
    document.getElementById('saveBtn').style.display='none';
    document.getElementById('ok').style.display='none';
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    rec=new MediaRecorder(stream);
    rec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};
    rec.onstop=function(){
      var blob=new Blob(chunks,{type:'audio/webm'});
      var p=document.getElementById('player');
      p.src=URL.createObjectURL(blob);
      p.style.display='block';
      document.getElementById('saveBtn').style.display='block';
      document.getElementById('status').textContent='Done. Press play to review.';
      document.getElementById('timer').className='';
      stream.getTracks().forEach(function(t){t.stop()});
    };
    rec.start();
    tmr=setInterval(function(){
      secs++;
      var m=Math.floor(secs/60),s=secs%60;
      document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
    },1000);
    document.getElementById('recBtn').style.display='none';
    document.getElementById('stpBtn').style.display='block';
    document.getElementById('status').textContent='Recording... speak naturally';
  }catch(e){document.getElementById('err').textContent='Mic error: '+e.message}
};
document.getElementById('stpBtn').onclick=function(){
  if(rec&&rec.state!=='inactive'){rec.stop();clearInterval(tmr)}
  document.getElementById('stpBtn').style.display='none';
  document.getElementById('recBtn').style.display='block';
};
document.getElementById('saveBtn').onclick=function(){
  document.getElementById('ok').style.display='block';
  document.getElementById('saveBtn').textContent='Saved ✓';
  document.getElementById('saveBtn').style.background='#00ff88';
};
</script>
</body>
</html>
