<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Log Visit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#f4f8fc;
  color:#0b1f3a;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  padding:24px 18px 50px;
}
.container{max-width:680px;margin:0 auto}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.header-brand{display:flex;flex-direction:column}
.header-brand h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}
.header-brand h1 span{color:#2f8fff}
.header-brand p{font-size:13px;color:#7a8aa3;font-weight:600;margin-top:2px}

.home-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;color:#2f8fff;font-size:13px;font-weight:700;text-decoration:none;
  padding:9px 16px;border-radius:30px;margin-bottom:18px;
  border:1px solid #e3ebf5;box-shadow:0 2px 8px rgba(11,31,58,0.05);
}
.home-btn:hover{border-color:#2f8fff}

.card{
  background:#fff;border:1px solid #e3ebf5;border-radius:20px;padding:22px;
  margin-bottom:16px;box-shadow:0 4px 16px rgba(11,31,58,0.06);
}

.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0}
.field{display:flex;flex-direction:column}
.field label{font-size:11px;color:#8a9bb3;margin-bottom:7px;display:block;text-transform:uppercase;letter-spacing:0.6px;font-weight:700}
.field input,.field select{
  width:100%;padding:13px 14px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:12px;
  color:#0b1f3a;font-size:14.5px;outline:none;font-weight:600;
}
.field input:focus,.field select:focus{border-color:#2f8fff}
.field select option{background:#fff}
.field-full{grid-column:1/-1}

.hospital-wrapper{position:relative}
.hospital-list{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;
  border:1px solid #e3ebf5;border-radius:14px;max-height:220px;overflow-y:auto;z-index:999;
  box-shadow:0 8px 24px rgba(11,31,58,0.12);
}
.hospital-list.open{display:block}
.hospital-option{padding:12px 14px;font-size:13.5px;color:#3a4a63;cursor:pointer;border-bottom:1px solid #f0f4f9;font-weight:600}
.hospital-option:last-child{border-bottom:none}
.hospital-option:hover,.hospital-option:active{background:#eaf3ff;color:#2f8fff}

.not-listed-check{display:flex;align-items:center;gap:9px;margin-top:12px;margin-bottom:4px;cursor:pointer}
.not-listed-check input[type="checkbox"]{width:18px;height:18px;accent-color:#2f8fff;cursor:pointer;flex-shrink:0}
.not-listed-check span{font-size:13px;color:#5b6b85;font-weight:600}

.new-account-fields{display:none;grid-column:1/-1;background:#eef6ff;border:1px solid #d3e8ff;border-radius:14px;padding:16px;margin-top:8px}
.new-account-fields.visible{display:block}
.new-account-fields .field{margin-bottom:12px}
.new-account-fields .field:last-child{margin-bottom:0}
.new-account-badge{
  display:inline-block;background:#2f8fff;color:#fff;border-radius:8px;font-size:10.5px;font-weight:800;
  padding:3px 10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;
}

.user-locked{
  display:flex;align-items:center;justify-content:space-between;background:#eef9f0;
  border:1px solid #c9ecd2;border-radius:14px;padding:13px 16px;margin-bottom:4px;
}
.user-locked-info{display:flex;align-items:center;gap:10px}
.user-locked-avatar{
  width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2f8fff,#7ec3ff);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;flex-shrink:0;
}
.user-locked-name{font-size:14px;font-weight:800;color:#0b1f3a}
.user-locked-role{font-size:11.5px;color:#7a8aa3;margin-top:1px;font-weight:600}
.switch-user-btn{font-size:11.5px;color:#2f8fff;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px;font-weight:700}
.switch-user-btn:hover{color:#1f6fe0}

.identity-select-wrap select{
  width:100%;padding:13px 14px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:12px;
  color:#0b1f3a;font-size:14.5px;outline:none;font-weight:600;
}

.mic-section{text-align:center;margin:8px 0 4px}
.mic-btn{
  width:108px;height:108px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#3d9bff,#1f6fe0);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:44px;
  box-shadow:0 10px 28px rgba(47,143,255,0.35);
  transition:transform 0.15s,box-shadow 0.2s;
}
.mic-btn:active{transform:scale(0.96)}
.mic-btn.recording{background:linear-gradient(135deg,#ff5c6e,#e0344a);box-shadow:0 10px 28px rgba(224,52,74,0.35)}
.status{color:#7a8aa3;font-size:13.5px;min-height:18px;margin-bottom:8px;font-weight:600}
.status.active{color:#e0344a}
.status.transcribing{color:#d98a1c}
.status.done{color:#1fa861}
.recording-indicator{display:none;text-align:center;margin:8px 0}
.recording-indicator.visible{display:block}
.recording-timer{font-size:30px;font-weight:800;color:#e0344a;letter-spacing:2px;margin:4px 0}
audio{width:100%;border-radius:12px;margin:10px 0;display:none}

.transcript-box{
  background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:14px;padding:16px;
  min-height:120px;margin:14px 0;font-size:14.5px;line-height:1.7;color:#1c2c45;
  width:100%;resize:vertical;font-family:-apple-system,sans-serif;outline:none;
}
.transcript-box:focus{border-color:#2f8fff}

.btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:15.5px;font-weight:800;cursor:pointer;margin:6px 0;transition:transform 0.15s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;box-shadow:0 8px 22px rgba(47,143,255,0.32)}
.btn-secondary{background:#fff;color:#7a8aa3;border:1.5px solid #e3ebf5}
.btn:disabled{opacity:0.45;cursor:not-allowed}

.success-card{background:#fff;border:1px solid #e3ebf5;border-radius:20px;padding:24px;margin:16px 0;display:none;box-shadow:0 4px 18px rgba(11,31,58,0.07)}
.success-card .tick{font-size:38px;text-align:center;margin-bottom:10px}
.success-card h3{color:#1fa861;font-size:17px;text-align:center;margin-bottom:18px;font-weight:800}
.report-section{margin:14px 0}
.report-section h4{color:#2f8fff;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #eef3f9;font-weight:800}
.report-section p{color:#3a4a63;font-size:13.5px;line-height:1.7}
.priority-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12.5px;font-weight:800;margin-top:4px}
.priority-high{background:#ffe5e8;color:#e0344a}
.priority-medium{background:#fff3e0;color:#d98a1c}
.priority-low{background:#e3f8ea;color:#1fa861}

.processing-overlay{text-align:center;padding:36px;display:none}
.spinner{width:44px;height:44px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-overlay p{color:#7a8aa3;font-size:14px;font-weight:600}

.edit-notice{background:#fff8e6;border:1px solid #ffe5a3;border-radius:12px;padding:11px 16px;font-size:13px;color:#9a6a00;margin-bottom:6px;display:none;font-weight:600}
.edit-notice.visible{display:block}

@media(min-width:768px){
  .container{max-width:780px}
  .card{padding:30px}
}
@media(min-width:1100px){
  .container{max-width:1400px}
  body{padding:32px 40px 60px}
  .desktop-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:24px;align-items:start}
  .card{padding:34px}
  .mic-btn{width:128px;height:128px;font-size:52px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="header-brand">
    <h1>Field<span>IQ</span></h1>
    <p>Log Visit</p>
  </div>
</div>
<a href="/" id="homeBtn" class="home-btn">← Home</a>

<div class="desktop-grid">
<div class="card">
<div class="fields">
  <div class="field field-full">
    <label>Hospital / Account</label>
    <div class="hospital-wrapper">
      <input type="text" id="hospital" placeholder="Search 137 hospitals..." autocomplete="off">
      <div class="hospital-list" id="hospitalList"></div>
    </div>
    <label class="not-listed-check">
      <input type="checkbox" id="notListedCheck">
      <span>Account not listed</span>
    </label>
    <div class="new-account-fields" id="newAccountFields">
      <div class="new-account-badge">New Account</div>
      <div class="field">
        <label>Account Name</label>
        <input type="text" id="newAccountName" placeholder="Enter account or hospital name">
      </div>
      <div class="field">
        <label>City</label>
        <input type="text" id="newAccountCity" placeholder="e.g. Dubai, Riyadh, Doha">
      </div>
    </div>
  </div>
  <div class="field"><label>Visit Date</label><input type="date" id="visitDate"></div>
  <div class="field">
    <label>Territory</label>
    <select id="territory">
      <option value="">Select territory</option>
      <option>UAE</option><option>KSA</option><option>Qatar</option>
      <option>Kuwait</option><option>Bahrain</option><option>Oman</option>
    </select>
  </div>
  <div class="field">
    <label>Visit Type</label>
    <select id="visitType">
      <option value="">Select type</option>
      <option>In-person</option><option>Virtual</option><option>Phone</option>
    </select>
  </div>

  <div class="field-full" id="userIdentitySection">
  </div>
</div>
</div>

<div class="card">
<div class="mic-section">
  <button class="mic-btn" id="micBtn">🎙️</button>
  <div class="status" id="status">Tap mic to start recording</div>
  <div class="recording-indicator" id="recordingIndicator">
    <div class="recording-timer" id="recordingTimer">0:00</div>
  </div>
  <audio id="audioPlayer" controls></audio>
</div>
<div style="position:relative">
  <div class="edit-notice" id="editNotice">✏️ <strong>Review your transcript.</strong> Tap to correct any mistakes before processing.</div>
  <textarea class="transcript-box" id="transcriptText" placeholder="Your speech will appear here automatically after recording... tap to edit before processing."></textarea>
  <div style="font-size:11.5px;color:#aab8cc;text-align:right;margin-top:-10px;margin-bottom:10px;font-weight:600">Tap to edit before processing</div>
</div>
<button class="btn btn-primary" id="submitBtn">Process Visit Log</button>
<button class="btn btn-secondary" id="clearBtn">Clear</button>
</div>
</div>

<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <p>Analysing your visit...</p>
</div>
<div class="success-card" id="successCard">
  <div class="tick">✅</div>
  <h3>Visit Logged Successfully</h3>
  <div id="reportContent"></div>
  <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Log Another Visit</button>
</div>
</div>

<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
window.onerror=function(msg){document.getElementById('status').textContent='Error: '+msg;};

// ── HOME BUTTON ROUTING ─────────────────────────────────────────
(function(){
  var ref=document.referrer||'';
  var homeBtn=document.getElementById('homeBtn');
  if(ref.includes('fieldiq.html')){
    homeBtn.href='/fieldiq.html';
  } else {
    homeBtn.href='/';
  }
})();


// ── USER IDENTITY ──────────────────────────────────────────────
var currentUserId='', currentUserName='', currentUserRole='';

function renderUserIdentity(){
  var section=document.getElementById('userIdentitySection');
  var savedId=localStorage.getItem('fieldiq_user_id');
  var savedName=localStorage.getItem('fieldiq_user_name');
  var savedRole=localStorage.getItem('fieldiq_user_role');

  if(savedId && savedName){
    // LOCKED — show panel, no dropdown
    currentUserId=savedId;
    currentUserName=savedName;
    currentUserRole=savedRole||'Sales Rep';
    var switchBtnHtml = (currentUserRole==='Manager') ? '<button class="switch-user-btn" onclick="switchUser()">Switch User</button>' : '';
    section.innerHTML=
      '<div class="user-locked">'+
        '<div class="user-locked-info">'+
          '<div class="user-locked-avatar">👤</div>'+
          '<div>'+
            '<div class="user-locked-name">'+savedName+'</div>'+
            '<div class="user-locked-role">'+currentUserRole+'</div>'+
          '</div>'+
        '</div>'+
        switchBtnHtml+
      '</div>';
  } else {
    // NO IDENTITY — redirect to home for login, do not show dropdown here
    window.location.href='/';
    return;
  }
}

function switchUser(){
  localStorage.removeItem('fieldiq_user_id');
  localStorage.removeItem('fieldiq_user_name');
  localStorage.removeItem('fieldiq_user_role');
  location.reload();
}

async function loadUsers(){
  try{
    var res=await fetch(WORKER+'/get-users');
    var data=await res.json();
    var sel=document.getElementById('userSelect');
    if(!sel)return;
    sel.innerHTML='<option value="">Select your name...</option>';
    if(data.records){
      data.records.forEach(function(r){
        var f=r.fields;
        if(f['Active?']===false)return;
        var opt=document.createElement('option');
        opt.value=f['User ID']||'';
        opt.textContent=(f['Display Name']||f['User ID']||'Unknown');
        opt.setAttribute('data-name',f['Display Name']||'');
        opt.setAttribute('data-role',f['Role']||'Sales Rep');
        sel.appendChild(opt);
      });
    }
    // Lock identity immediately on selection, not only after visit submission
    sel.addEventListener('change',function(){
      if(!sel.value)return;
      var selectedOpt=sel.options[sel.selectedIndex];
      var lockId=sel.value;
      var lockName=selectedOpt.getAttribute('data-name')||sel.value;
      var lockRole=selectedOpt.getAttribute('data-role')||'Sales Rep';
      localStorage.setItem('fieldiq_user_id',lockId);
      localStorage.setItem('fieldiq_user_name',lockName);
      localStorage.setItem('fieldiq_user_role',lockRole);
      renderUserIdentity();
    });
  }catch(err){
    var sel=document.getElementById('userSelect');
    if(sel)sel.innerHTML='<option value="">Could not load users</option>';
  }
}

renderUserIdentity();

// ── NEW ACCOUNT TOGGLE ─────────────────────────────────────────
var notListedCheck=document.getElementById('notListedCheck');
var newAccountFields=document.getElementById('newAccountFields');
var hospitalInput=document.getElementById('hospital');
var hospitalList=document.getElementById('hospitalList');

notListedCheck.addEventListener('change',function(){
  if(this.checked){
    newAccountFields.classList.add('visible');
    hospitalInput.value='';
    hospitalList.classList.remove('open');
    hospitalInput.style.display='none';
  }else{
    newAccountFields.classList.remove('visible');
    hospitalInput.style.display='';
  }
});

// ── HOSPITAL LIST ──────────────────────────────────────────────

itory":"UAE"},{"name":"National Center for Cancer Care","territory":"Qatar"},{"name":"New Mowasat Hospital","territory":"Kuwait"},{"name":"Nizwa Hospital","territory":"Oman"},{"name":"Noor Specialist Hospital","territory":"Bahrain"},{"name":"Oasis Hospital Al Ain","territory":"UAE"},{"name":"Ohud Hospital Madinah","territory":"Saudi Arabia - Madinah"},{"name":"Prince Sultan Military Medical City","territory":"Saudi Arabia - Riyadh"},{"name":"Psychiatric Hospital Bahrain","territory":"Bahrain"},{"name":"RAK Hospital","territory":"UAE"},{"name":"Rashid Hospital","territory":"UAE"},{"name":"Royal Bahrain Hospital","territory":"Bahrain"},{"name":"Royal Hospital Muscat","territory":"Oman"},{"name":"Royale Hayat Hospital","territory":"Kuwait"},{"name":"Rumailah Hospital","territory":"Qatar"},{"name":"Rustaq Hospital","territory":"Oman"},{"name":"Salalah Hospital","territory":"Oman"},{"name":"Salmaniya Medical Complex","territory":"Bahrain"},{"name":"Saqr Hospital Ras Al Khaimah","territory":"UAE"},{"name":"Saudi Aramco Medical Organization Dhahran","territory":"Saudi Arabia - Eastern Province"},{"name":"Saudi German Hospital Dubai","territory":"UAE"},{"name":"Saudi German Hospital Jeddah","territory":"Saudi Arabia - Jeddah"},{"name":"Saudi German Hospital Riyadh","territory":"Saudi Arabia - Riyadh"},{"name":"Security Forces Hospital Riyadh","territory":"Saudi Arabia - Riyadh"},{"name":"Sheikh Khalifa Hospital Umm Al Quwain","territory":"UAE"},{"name":"Sheikh Khalifa Medical City Abu Dhabi","territory":"UAE"},{"name":"Sheikh Shakhbout Medical City","territory":"UAE"},{"name":"Sidra Medicine","territory":"Qatar"},{"name":"Sitra Health Center Hospital","territory":"Bahrain"},{"name":"Sohar Hospital","territory":"Oman"},{"name":"Sultan Qaboos University Hospital","territory":"Oman"},{"name":"Sur Hospital","territory":"Oman"},{"name":"Tawam Hospital Al Ain","territory":"UAE"},{"name":"The View Hospital","territory":"Qatar"},{"name":"Thumbay Hospital Ajman","territory":"UAE"},{"name":"University Hospital Sharjah","territory":"UAE"},{"name":"Valiant Clinic and Hospital","territory":"UAE"},{"name":"Women's Wellness and Research Center","territory":"Qatar"},{"name":"Zulekha Hospital Dubai","territory":"UAE"},{"name":"Zulekha Hospital Sharjah","territory":"UAE"}];

function showList(query){
  hospitalList.innerHTML='';
  var q=query.toLowerCase().trim();
  var filtered=(q.length===0?HOSPITALS.slice(0,50):HOSPITALS.filter(function(h){return h.name.toLowerCase().indexOf(q)>-1||h.territory.toLowerCase().indexOf(q)>-1;})).slice(0,50);
  filtered.forEach(function(h){
    var div=document.createElement('div');
    div.className='hospital-option';
    div.textContent=h.name+' — '+h.territory;
    div.addEventListener('click',function(){hospitalInput.value=h.name;hospitalList.classList.remove('open');});
    hospitalList.appendChild(div);
  });
  hospitalList.classList.add('open');
}
hospitalInput.addEventListener('input',function(){showList(this.value);});
hospitalInput.addEventListener('focus',function(){showList(this.value);});
document.addEventListener('click',function(e){if(!e.target.closest('.hospital-wrapper'))hospitalList.classList.remove('open');});
document.getElementById('visitDate').value=new Date().toISOString().split('T')[0];

// ── RECORDING ──────────────────────────────────────────────────
var mediaRecorder=null,chunks=[],seconds=0,timerInterval=null,streamRef=null,isRecording=false;
var micBtn=document.getElementById('micBtn');
var statusEl=document.getElementById('status');
var transcriptText=document.getElementById('transcriptText');
var audioPlayer=document.getElementById('audioPlayer');
var submitBtn=document.getElementById('submitBtn');
var successCard=document.getElementById('successCard');
var processingOverlay=document.getElementById('processingOverlay');

micBtn.addEventListener('click',function(){if(!isRecording)startRecording();else stopRecording();});

async function startRecording(){
  try{
    isRecording=true;chunks=[];seconds=0;
    document.getElementById('recordingTimer').textContent='0:00';
    transcriptText.value='';audioPlayer.style.display='none';successCard.style.display='none';
    statusEl.className='status active';
    streamRef=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(streamRef);
    mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
    mediaRecorder.onstop=function(){
      isRecording=false;
      var blob=new Blob(chunks,{type:'audio/webm'});
      audioPlayer.src=URL.createObjectURL(blob);audioPlayer.style.display='block';
      micBtn.className='mic-btn';micBtn.textContent='🎙️';
      document.getElementById('recordingIndicator').className='recording-indicator';
      statusEl.className='status transcribing';statusEl.textContent='Transcribing visit...';
      if(streamRef)streamRef.getTracks().forEach(function(t){t.stop();});
      var fd=new FormData();fd.append('file',blob,'visit.webm');fd.append('model','whisper-1');
      fetch(WORKER+'/transcribe',{method:'POST',body:fd})
      .then(function(r){return r.json();})
      .then(function(d){
        var t=d.text||d.transcript||'';
        if(t){transcriptText.value=t;statusEl.className='status done';statusEl.textContent='Transcript ready. Edit if needed then process.';document.getElementById('editNotice').className='edit-notice visible';}
        else{statusEl.className='status';statusEl.textContent='Transcription failed. Type notes manually.';}
      }).catch(function(){statusEl.className='status';statusEl.textContent='Transcription error — type notes manually.';});
    };
    mediaRecorder.start();
    timerInterval=setInterval(function(){seconds++;var m=Math.floor(seconds/60),s=seconds%60;document.getElementById('recordingTimer').textContent=m+':'+(s<10?'0':'')+s;},1000);
    micBtn.className='mic-btn recording';micBtn.textContent='⏹';
    document.getElementById('recordingIndicator').className='recording-indicator visible';
    statusEl.textContent='Recording... tap mic to stop';
  }catch(e){isRecording=false;statusEl.textContent='Mic error: '+e.message;}
}
function stopRecording(){
  clearInterval(timerInterval);
  document.getElementById('recordingIndicator').className='recording-indicator';
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
}

document.getElementById('clearBtn').addEventListener('click',function(){
  isRecording=false;transcriptText.value='';audioPlayer.style.display='none';audioPlayer.src='';
  successCard.style.display='none';processingOverlay.style.display='none';
  statusEl.textContent='Tap mic to start recording';statusEl.className='status';
  submitBtn.disabled=false;submitBtn.textContent='Process Visit Log';
  micBtn.className='mic-btn';micBtn.textContent='🎙️';
  document.getElementById('recordingIndicator').className='recording-indicator';
  clearInterval(timerInterval);seconds=0;document.getElementById('recordingTimer').textContent='0:00';
  if(streamRef)streamRef.getTracks().forEach(function(t){t.stop();});
  streamRef=null;mediaRecorder=null;
  document.getElementById('editNotice').className='edit-notice';
  notListedCheck.checked=false;
  newAccountFields.classList.remove('visible');
  hospitalInput.style.display='';
  document.getElementById('newAccountName').value='';
  document.getElementById('newAccountCity').value='';
});

// ── REPORT PARSING ─────────────────────────────────────────────
function parseReport(text){
  var sections={summary:'',contacts:'',outcomes:'',nextSteps:'',signals:'',sentiment:'',priority:''};
  var lines=text.split('\n'),current='';
  for(var i=0;i<lines.length;i++){
    var l=lines[i].trim();
    if(l.match(/VISIT SUMMARY/i))current='summary';
    else if(l.match(/KEY CONTACTS/i))current='contacts';
    else if(l.match(/OUTCOMES/i))current='outcomes';
    else if(l.match(/NEXT STEPS/i))current='nextSteps';
    else if(l.match(/OPPORTUNITY/i))current='signals';
    else if(l.match(/SENTIMENT/i))current='sentiment';
    else if(l.match(/PRIORITY/i))current='priority';
    else if(l&&current)sections[current]+=(sections[current]?'\n':'')+l;
  }
  return sections;
}
function getOutcome(sentiment){
  sentiment=(sentiment||'').toLowerCase();
  if(sentiment.includes('positive'))return'Positive';
  if(sentiment.includes('negative'))return'Negative';
  return'Neutral';
}
function extractPriority(text){
  text=(text||'').toLowerCase();
  if(text.includes('high'))return'High';
  if(text.includes('medium'))return'Medium';
  if(text.includes('low'))return'Low';
  return'Medium';
}
function getPriorityClass(t){t=t.toLowerCase();if(t.indexOf('high')>-1)return'priority-high';if(t.indexOf('medium')>-1)return'priority-medium';return'priority-low';}
function renderReport(text){
  var s=parseReport(text),html='';
  if(s.summary)html+='<div class="report-section"><h4>Visit Summary</h4><p>'+s.summary.replace(/\n/g,'<br>')+'</p></div>';
  if(s.contacts)html+='<div class="report-section"><h4>Key Contacts</h4><p>'+s.contacts.replace(/\n/g,'<br>')+'</p></div>';
  if(s.outcomes)html+='<div class="report-section"><h4>Outcomes & Decisions</h4><p>'+s.outcomes.replace(/\n/g,'<br>')+'</p></div>';
  if(s.nextSteps)html+='<div class="report-section"><h4>Next Steps</h4><p>'+s.nextSteps.replace(/\n/g,'<br>')+'</p></div>';
  if(s.signals)html+='<div class="report-section"><h4>Opportunity Signals</h4><p>'+s.signals.replace(/\n/g,'<br>')+'</p></div>';
  if(s.sentiment)html+='<div class="report-section"><h4>Sentiment</h4><p>'+s.sentiment.replace(/\n/g,'<br>')+'</p></div>';
  if(s.priority)html+='<div class="report-section"><h4>Priority</h4><span class="priority-badge '+getPriorityClass(s.priority)+'">'+s.priority.replace(/\*\*/g,'').trim()+'</span></div>';
  return html||'<div class="report-section"><p>'+text+'</p></div>';
}

// ── SUBMIT ─────────────────────────────────────────────────────
submitBtn.addEventListener('click',async function(){
  var transcript=transcriptText.value.trim();
  if(!transcript||transcript.length<3){alert('Please record a visit first.');return;}

  // Get user identity
  var repName='', userRole='', userId='';
  var savedId=localStorage.getItem('fieldiq_user_id');
  if(savedId){
    userId=savedId;
    repName=localStorage.getItem('fieldiq_user_name')||savedId;
    userRole=localStorage.getItem('fieldiq_user_role')||'Sales Rep';
  } else {
    var sel=document.getElementById('userSelect');
    if(!sel||!sel.value){alert('Please select your name.');return;}
    var selectedOpt=sel.options[sel.selectedIndex];
    userId=sel.value;
    repName=selectedOpt.getAttribute('data-name')||sel.value;
    userRole=selectedOpt.getAttribute('data-role')||'Sales Rep';
    // Lock identity after first use
    localStorage.setItem('fieldiq_user_id',userId);
    localStorage.setItem('fieldiq_user_name',repName);
    localStorage.setItem('fieldiq_user_role',userRole);
  }

  var isNewAccount=notListedCheck.checked;
  var hospitalName='';
  if(isNewAccount){
    var newName=document.getElementById('newAccountName').value.trim();
    if(!newName){alert('Please enter the account name.');return;}
    hospitalName=newName;
  }else{
    hospitalName=hospitalInput.value.trim();
  }

  submitBtn.disabled=true;submitBtn.textContent='Processing...';
  processingOverlay.style.display='block';successCard.style.display='none';

  var latitude=null,longitude=null,accuracy=null;
  await new Promise(function(resolve){
    if(!navigator.geolocation){resolve();return;}
    navigator.geolocation.getCurrentPosition(
      function(pos){latitude=pos.coords.latitude;longitude=pos.coords.longitude;accuracy=Math.round(pos.coords.accuracy);resolve();},
      function(){resolve();},{timeout:3000,enableHighAccuracy:false}
    );
  });

  try{
    var aiRes=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:1000,
      messages:[{role:'user',content:'You are a MedTech sales intelligence assistant operating in the GCC region. The transcript below may be in English, Arabic, mixed Arabic-English, or Gulf/Levantine/Egyptian Arabic dialect. Understand the full meaning regardless of language or dialect used. Focus on extracting business meaning, not translating word-for-word. Structure the intelligence into a concise English report with these exact sections:\n\nVISIT SUMMARY\nKEY CONTACTS MET\nOUTCOMES & DECISIONS\nNEXT STEPS\nOPPORTUNITY SIGNALS\nSENTIMENT\nPRIORITY LEVEL (respond with exactly one word: High, Medium, or Low)\n\nFor PRIORITY LEVEL, classify based on:\n- High: quotation requested, procurement engaged, decision maker committed, strong buying signal, evaluation planned\n- Medium: follow-up needed, positive interest, return visit requested, relationship developing\n- Low: informational visit, no current opportunity, no buying signal, long-term monitoring\n\nCommon mixed-language patterns to expect: Arabic sentences with English MedTech terms, Arabic with English numbers and dates, Gulf business Arabic mixed with English. Extract all intelligence regardless of which language it appears in. Output the report in professional English only.\n\nTranscript:\n'+transcript}]
    })});
    var aiData=await aiRes.json();
    var result=aiData.content?aiData.content[0].text:JSON.stringify(aiData);
    var parsed=parseReport(result);
    var priority=extractPriority(parsed.priority);
    var visitDate=document.getElementById('visitDate').value;
    var territory=document.getElementById('territory').value;
    var visitType=document.getElementById('visitType').value;

    var savePayload={
      'Hospital Name': hospitalName,
      'Visit Date': visitDate,
      'Territory': territory,
      'Visit Type': visitType,
      'Rep Name': repName,
      'User ID': userId,
      'User Role': userRole,
      'Display Name': repName,
      'Raw Transcript': transcript,
      'AI Summary': result,
      'Outcome': getOutcome(parsed.sentiment),
      'Meeting Notes': parsed.summary,
      'Action Items': parsed.nextSteps,
      'Priority': priority,
      'Latitude': latitude,
      'Longitude': longitude,
      'Accuracy': accuracy,
      'New Account': isNewAccount,
      'Pending Review': isNewAccount
    };

    var saveRes=await fetch(WORKER+'/save-visit',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(savePayload)
    });
    var saveData=await saveRes.json();
    if(!saveRes.ok){
      processingOverlay.style.display='none';submitBtn.disabled=false;submitBtn.textContent='Process Visit Log';
      alert('Save error '+saveRes.status+': '+JSON.stringify(saveData));return;
    }
    processingOverlay.style.display='none';successCard.style.display='block';
    document.getElementById('reportContent').innerHTML=renderReport(result);

    // Re-render identity panel (now locked)
    renderUserIdentity();

  }catch(err){
    processingOverlay.style.display='none';submitBtn.disabled=false;submitBtn.textContent='Process Visit Log';
    alert('Error: '+err.message);
  }
});
</script>
