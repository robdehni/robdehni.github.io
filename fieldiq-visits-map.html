<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Visit Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
.topbar{background:#111;border-bottom:1px solid #1a1a1a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:20px;color:#00d4ff;font-weight:700}
.topbar span{color:#555;font-size:13px}
.filters{background:#111;border-bottom:1px solid #1a1a1a;padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0}
.filters select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#ccc;padding:6px 10px;font-size:13px;outline:none;cursor:pointer}
.filters select option{background:#1a1a1a}
.filter-btn{background:#00d4ff;border:none;border-radius:6px;color:#000;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
.filter-btn.secondary{background:#1a1a1a;color:#666;border:1px solid #222}
.stats{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:8px 20px;display:flex;gap:20px;flex-shrink:0}
.stat{font-size:12px;color:#555}
.stat span{color:#00d4ff;font-weight:700}
#map{flex:1;z-index:1;margin-bottom:60px}
.legend{position:absolute;bottom:70px;right:10px;background:#111;border:1px solid #222;border-radius:8px;padding:12px;z-index:1000;font-size:12px}
.legend-item{display:flex;align-items:center;gap:8px;margin:4px 0;color:#aaa}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:2000;background:#111;border:1px solid #222;border-radius:12px;padding:30px 40px}
.spinner{width:36px;height:36px;border:3px solid #1a1a1a;border-top:3px solid #00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#888;font-size:14px}
.error-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:2000;background:#1a0a0a;border:1px solid #ff444433;border-radius:12px;padding:30px 40px;color:#ff6666;display:none}
.leaflet-popup-content-wrapper{background:#111;border:1px solid #2a2a2a;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.leaflet-popup-content{color:#ccc;font-size:13px;line-height:1.6;margin:12px 16px;min-width:220px;max-width:280px}
.leaflet-popup-tip{background:#111}
.popup-hospital{font-size:15px;font-weight:700;color:#00d4ff;margin-bottom:6px}
.popup-row{display:flex;justify-content:space-between;gap:8px;margin:3px 0;font-size:12px}
.popup-label{color:#555}
.popup-value{color:#ccc;text-align:right}
.popup-sentiment{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;margin:6px 0}
.popup-summary{margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1a;font-size:12px;color:#888;line-height:1.5;max-height:80px;overflow-y:auto}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #1a1a1a;display:flex;z-index:9999}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:#555;font-size:11px;font-weight:600;letter-spacing:0.3px;transition:color 0.2s}
.nav-item.active{color:#00d4ff}
.nav-icon{font-size:22px;margin-bottom:3px}
</style>
</head>
