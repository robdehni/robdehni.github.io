<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:20px 18px 80px}
.container{max-width:780px;margin:0 auto}

.topbar{text-align:center;margin-bottom:18px}
.topbar h1{font-size:24px;color:#0b1f3a;font-weight:800;letter-spacing:-0.4px}
.topbar p{color:#7a8aa3;font-size:12.5px;margin-top:4px;font-weight:600}
.manager-badge{
  display:inline-block;background:#fff3e0;color:#d98a1c;border:1px solid #ffe5b3;border-radius:8px;
  font-size:10.5px;font-weight:800;padding:3px 10px;margin-left:8px;text-transform:uppercase;letter-spacing:0.5px;
}
.home-btn{
  display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;
  text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:14px;border:1px solid #e3ebf5;
  box-shadow:0 2px 8px rgba(11,31,58,0.05);
}
.home-btn:hover{border-color:#2f8fff}

.filter-bar{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.filter-bar h3{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.filter-select{
  width:100%;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;
  font-size:12.5px;outline:none;font-weight:600;
}
.filter-select:focus{border-color:#2f8fff}
.filter-btns{display:flex;gap:8px}
.fbtn-apply{flex:1;padding:11px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:10px;font-size:12.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.3)}
.fbtn-reset{flex:1;padding:11px;background:#fff;color:#7a8aa3;border:1.5px solid #e3ebf5;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.filter-active{font-size:10.5px;color:#2f8fff;margin-top:8px;text-align:center;min-height:14px;font-weight:700}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.kpi-label{font-size:10px;color:#8a9bb3;text-transform:uppercase;letter-spacing:0.8px;font-weight:800;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;color:#2f8fff}
.kpi-sub{font-size:11px;color:#aab8cc;margin-top:3px;font-weight:600}

.sentiment-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.sent-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:14px;text-align:center;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.sent-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-weight:800}
.sent-value{font-size:22px;font-weight:800}
.sent-positive .sent-label,.sent-positive .sent-value{color:#1fa861}
.sent-neutral .sent-label,.sent-neutral .sent-value{color:#d98a1c}
.sent-negative .sent-label,.sent-negative .sent-value{color:#e0344a}

.section-title{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #e3ebf5}
.priority-section{margin-bottom:8px}
.priority-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.priority-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.priority-title{font-size:12.5px;font-weight:800;color:#0b1f3a}
.priority-count{font-size:11.5px;color:#aab8cc;font-weight:600}
.priority-card{background:#fff;border:1px solid #e3ebf5;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 3px 10px rgba(11,31,58,0.04)}
.priority-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
