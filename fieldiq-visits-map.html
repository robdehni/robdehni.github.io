<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Visit Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,sans-serif;display:flex;flex-direction:column}
.topbar{background:#111;border-bottom:1px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:17px;color:#00d4ff;font-weight:700}
.home-btn{display:inline-block;color:#555;font-size:11px;text-decoration:none;padding:4px 10px;border:1px solid #222;border-radius:6px;background:#1a1a1a;white-space:nowrap}
.home-btn:hover{color:#00d4ff;border-color:#00d4ff}
.filters{background:#111;border-bottom:1px solid #1a1a1a;padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;align-items:center}
.filters select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#ccc;padding:5px 8px;font-size:12px;outline:none;max-width:110px}
.fbtn{background:#00d4ff;border:none;border-radius:6px;color:#000;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.fbtn.sec{background:#1a1a1a;color:#666;border:1px solid #222}
.stats{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:5px 16px;display:flex;gap:14px;flex-shrink:0}
.stat{font-size:11px;color:#555}.stat span{font-weight:700}
#map{flex:1;min-height:0;width:100%}
.legend{position:absolute;bottom:12px;right:8px;background:rgba(17,17,17,0.95);border:1px solid #222;border-radius:8px;padding:10px;z-index:1000;font-size:11px}
.li{display:flex;align-items:center;gap:6px;margin:3px 0;color:#aaa}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(17,17,17,0.96);border:1px solid #222;border-radius:12px;padding:28px 36px;text-align:center;z-index:2000;min-width:220px}
.spinner{width:32px;height:32px;border:3px solid #1a1a1a;border-top:3px solid #00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay p{color:#888;font-size:13px;margin-top:4px}
.err{background:rgba(26,10,10,0.96);border-color:#ff444433;color:#ff6666}
.leaflet-popup-content-wrapper{background:#111;border:1px solid #2a2a2a;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.7)}
.leaflet-popup-content{color:#ccc;font-size:12px;line-height:1.5;margin:10px 14px;min-width:190px;max-width:260px}
.leaflet-popup-tip{background:#111}
.ph{font-size:14px;font-weight:700;color:#00d4ff;margin-bottom:5px}
.pr{display:flex;justify-content:space-between;gap:8px;margin:2px 0;font-size:11px}
.pl{color:#555}.pv{color:#ccc;text-align:right}
.ps{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin:4px 0}
.psum{margin-top:6px;padding-top:6px;border-top:1px solid #1a1a1a;font-size:11px;color:#666;line-height:1.4;max-height:70px;overflow-y:auto}
</style>
</head>
<body>
<div class="topbar">
  <h1>FieldIQ — Visit Map</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="updated" style="color:#555;font-size:11px">Loading...</span>
    <a class="home-btn" href="https://fieldiq.biz/fieldiq.html">← Home</a>
  </div>
</div>
<div class="filters">
  <select id="fTerr"><option value="">All Territories</option></select>
  <select id="fRep"><option value="">All Reps</option></select>
  <select id="fSent"><option value="">All Sentiment</option><option value="positive">Positive</option><option value="neutral">Neutral</option><option value="negative">Negative</option></select>
  <button class="fbtn" onclick="applyFilters()">Apply</button>
  <button class="fbtn sec" onclick="resetFilters()">Reset</button>
</div>
<div class="stats">
  <div class="stat">Visits: <span id="sCount" style="color:#00d4ff">0</span></div>
  <div class="stat">Positive: <span id="sPos" style="color:#44cc88">0</span></div>
  <div class="stat">Neutral: <span id="sNeu" style="color:#ffaa44">0</span></div>
  <div class="stat">Negative: <span id="sNeg" style="color:#ff6666">0</span></div>
</div>
<div id="map"></div>
<div class="legend">
  <div class="li"><div class="ld" style="background:#44cc88"></div>Positive</div>
  <div class="li"><div class="ld" style="background:#ffaa44"></div>Neutral</div>
  <div class="li"><div class="ld" style="background:#ff6666"></div>Negative</div>
  <div class="li"><div class="ld" style="background:#888"></div>Unknown</div>
</div>
<div class="overlay" id="loadingEl">
  <div class="spinner"></div>
  <p>Loading visits...</p>
</div>
<div class="overlay err" id="errorEl" style="display:none">
  <p id="errorMsg">Failed to load visits.</p>
  <button class="fbtn" style="margin-top:12px" onclick="loadVisits()">Retry</button>
</div>
<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var allVisits=[];
var markers;
var theMap;

theMap=L.map('map',{zoomControl:true}).setView([24.5,54.0],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:18
}).addTo(theMap);
markers=L.layerGroup().addTo(theMap);

setTimeout(function(){theMap.invalidateSize();},300);

function formatDate(d){
  if(!d)return'—';
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function getSent(s){
  if(!s)return'unknown';
  s=s.toLowerCase();
  var i=s.indexOf('sentiment');
  if(i>-1){
    var t=s.substring(i,i+120);
    if(t.indexOf('positive')>-1)return'positive';
    if(t.indexOf('negative')>-1)return'negative';
    if(t.indexOf('neutral')>-1)return'neutral';
  }
  if(s.indexOf('positive')>-1)return'positive';
  if(s.indexOf('negative')>-1)return'negative';
  if(s.indexOf('neutral')>-1)return'neutral';
  return'unknown';
}
function getColor(s){return s==='positive'?'#44cc88':s==='neutral'?'#ffaa44':s==='negative'?'#ff6666':'#888';}
function getBadgeStyle(s){
  if(s==='positive')return'background:#44cc8822;color:#44cc88;border:1px solid #44cc8844';
  if(s==='neutral')return'background:#ffaa4422;color:#ffaa44;border:1px solid #ffaa4444';
  if(s==='negative')return'background:#ff666622;color:#ff6666;border:1px solid #ff666644';
  return'background:#88888822;color:#888;border:1px solid #88888844';
}
function makeIcon(c){
  return L.divIcon({
    className:'',
    html:'<div style="width:14px;height:14px;border-radius:50%;background:'+c+';border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.6)"></div>',
    iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-10]
  });
}
function trunc(t,n){
  if(!t)return'';
  var i=t.indexOf('VISIT SUMMARY');
  if(i>-1){var s=t.substring(i+13,i+13+n).trim();return s.length===n?s+'...':s;}
  return t.length>n?t.substring(0,n)+'...':t;
}

function renderMarkers(visits){
  markers.clearLayers();
  var p=0,n=0,neg=0,shown=0;
  visits.forEach(function(v){
    var f=v.fields;
    if(!f.Latitude||!f.Longitude)return;
    shown++;
    var sent=getSent(f['AI Summary']||'');
    if(sent==='positive')p++;
    else if(sent==='neutral')n++;
    else if(sent==='negative')neg++;
    var popup=
      '<div class="ph">'+(f['Hospital Name']||'Unknown Hospital')+'</div>'+
      '<span class="ps" style="'+getBadgeStyle(sent)+'">'+sent.charAt(0).toUpperCase()+sent.slice(1)+'</span>'+
      '<div class="pr"><span class="pl">Rep</span><span class="pv">'+(f['Rep Name']||'—')+'</span></div>'+
      '<div class="pr"><span class="pl">Date</span><span class="pv">'+formatDate(f['Visit Date'])+'</span></div>'+
      '<div class="pr"><span class="pl">Type</span><span class="pv">'+(f['Visit Type']||'—')+'</span></div>'+
      '<div class="pr"><span class="pl">Territory</span><span class="pv">'+(f['Territory']||'—')+'</span></div>'+
      (f['AI Summary']?'<div class="psum">'+trunc(f['AI Summary'],160)+'</div>':'');
    markers.addLayer(
      L.marker([f.Latitude,f.Longitude],{icon:makeIcon(getColor(sent))})
       .bindPopup(popup,{maxWidth:280})
    );
  });
  document.getElementById('sCount').textContent=shown;
  document.getElementById('sPos').textContent=p;
  document.getElementById('sNeu').textContent=n;
  document.getElementById('sNeg').textContent=neg;
}

function populateFilters(visits){
  var t={},r={};
  visits.forEach(function(v){
    var f=v.fields;
    if(f.Territory)t[f.Territory]=1;
    if(f['Rep Name'])r[f['Rep Name']]=1;
  });
  var ts=document.getElementById('fTerr');
  while(ts.options.length>1)ts.remove(1);
  Object.keys(t).sort().forEach(function(x){
    var o=document.createElement('option');o.value=x;o.textContent=x;ts.appendChild(o);
  });
  var rs=document.getElementById('fRep');
  while(rs.options.length>1)rs.remove(1);
  Object.keys(r).sort().forEach(function(x){
    var o=document.createElement('option');o.value=x;o.textContent=x;rs.appendChild(o);
  });
}

function applyFilters(){
  var t=document.getElementById('fTerr').value;
  var r=document.getElementById('fRep').value;
  var s=document.getElementById('fSent').value;
  var filtered=allVisits.filter(function(v){
    var f=v.fields;
    if(t&&f.Territory!==t)return false;
    if(r&&f['Rep Name']!==r)return false;
    if(s&&getSent(f['AI Summary']||'')!==s)return false;
    return true;
  });
  renderMarkers(filtered);
}

function resetFilters(){
  document.getElementById('fTerr').value='';
  document.getElementById('fRep').value='';
  document.getElementById('fSent').value='';
  renderMarkers(allVisits);
}

async function loadVisits(){
  document.getElementById('loadingEl').style.display='block';
  document.getElementById('errorEl').style.display='none';
  try{
    var res=await fetch(WORKER+'/get-visits');
    var data=await res.json();
    if(!res.ok)throw new Error('Worker error '+res.status+': '+JSON.stringify(data));
    allVisits=data.records||[];
    if(allVisits.length===0){
      document.getElementById('loadingEl').style.display='none';
      document.getElementById('errorEl').style.display='block';
      document.getElementById('errorMsg').textContent='No visits found in Airtable yet. Log a visit first.';
      return;
    }
    populateFilters(allVisits);
    renderMarkers(allVisits);
    document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString();
    document.getElementById('loadingEl').style.display='none';
    setTimeout(function(){theMap.invalidateSize();},100);
  }catch(err){
    document.getElementById('loadingEl').style.display='none';
    document.getElementById('errorEl').style.display='block';
    document.getElementById('errorMsg').textContent='Error: '+err.message;
  }
}

loadVisits();
</script>
</body>
</html>
