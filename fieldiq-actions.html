<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Manager Open Actions</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:24px 20px 50px}
.container{max-width:980px;margin:0 auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-cloud{font-size:26px;line-height:1}
.brand-text h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}
.brand-text h1 span{color:#2f8fff}
.brand-text p{font-size:10px;color:#8a9bb3;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.header{margin-bottom:18px}
.page-subtitle{color:#7a8aa3;font-size:13px;margin-top:6px;font-weight:600}
.home-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:16px;border:1px solid #e3ebf5;box-shadow:0 2px 8px rgba(11,31,58,0.05)}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.summary-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.summary-num{font-size:24px;font-weight:900;color:#0b1f3a}
.summary-label{font-size:11px;color:#8a9bb3;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.filters{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:12px;margin-bottom:14px;box-shadow:0 4px 14px rgba(11,31,58,0.05);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.filter-field label{display:block;font-size:10px;color:#8a9bb3;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.filter-field select,.filter-field input{width:100%;padding:11px;border:1.5px solid #dde8f5;border-radius:10px;background:#f8fbff;color:#0b1f3a;font-weight:700;outline:none}
.tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab-btn{border:1px solid #e3ebf5;background:#fff;color:#7a8aa3;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:900;white-space:nowrap;cursor:pointer;box-shadow:0 2px 8px rgba(11,31,58,0.04)}
.tab-btn.active{background:#2f8fff;color:#fff;border-color:#2f8fff}
.loading{text-align:center;padding:46px 20px;color:#8a9bb3;font-weight:700}
.spinner{width:34px;height:34px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.action-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.action-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px;align-items:flex-start}
.account-name{font-size:15px;font-weight:900;color:#0b1f3a;line-height:1.35}
.rep-line{font-size:12px;color:#7a8aa3;font-weight:800;margin-top:3px}
.status-pill{border-radius:999px;padding:5px 10px;font-size:10.5px;font-weight:900;white-space:nowrap}
.status-open{background:#eaf3ff;color:#2f8fff}
.status-overdue{background:#ffe1e5;color:#c43048}
.status-completed{background:#e1f5ea;color:#1f8a52}
.action-text{font-size:13.5px;color:#3d4f6b;line-height:1.55;margin-bottom:12px;font-weight:600;white-space:pre-wrap}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.meta{font-size:10.5px;font-weight:900;padding:5px 9px;border-radius:8px;background:#f4f8fc;color:#7a8aa3;border:1px solid #e3ebf5}
.reminder-btn{width:100%;border:none;border-radius:12px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;padding:13px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.25);display:flex;align-items:center;justify-content:center;gap:8px}
.reminder-btn:disabled{opacity:.55;cursor:not-allowed;background:#8a9bb3;box-shadow:none}
.reminder-btn [data-lucide]{width:18px;height:18px}
.empty{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:34px 20px;text-align:center;color:#8a9bb3;font-weight:800;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.empty [data-lucide]{width:42px;height:42px;color:#2f8fff;margin-bottom:10px}
.error-box{background:#fff3e0;border:1px solid #ffe5b3;border-radius:14px;padding:16px;color:#7a6000;font-size:13px;font-weight:800;text-align:center;margin-bottom:12px}
.retry-btn{margin-top:10px;border:none;background:#2f8fff;color:#fff;padding:10px 18px;border-radius:10px;font-weight:900}
.toast{position:fixed;left:20px;right:20px;bottom:22px;background:#0b1f3a;color:#fff;border-radius:14px;padding:14px;text-align:center;font-weight:900;font-size:13px;display:none;box-shadow:0 10px 26px rgba(11,31,58,0.25);z-index:999}
.toast.visible{display:block}
.footer{text-align:center;color:#aab8cc;font-size:11px;font-weight:600;margin-top:30px}
@media(max-width:720px){.summary-grid{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr}.container{max-width:620px}}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="brand"><span class="brand-cloud">☁️</span><div class="brand-text"><h1>Field<span>IQ</span></h1><p>Territory Intelligence Platform</p></div></div><p class="page-subtitle">Manager Open Actions</p></div>
<a href="./fieldiq.html" class="home-btn">← Manager Home</a>
<div class="summary-grid">
<div class="summary-card"><div class="summary-num" id="openCount">0</div><div class="summary-label">Open</div></div>
<div class="summary-card"><div class="summary-num" id="overdueCount">0</div><div class="summary-label">Overdue</div></div>
<div class="summary-card"><div class="summary-num" id="todayCount">0</div><div class="summary-label">Due Today</div></div>
<div class="summary-card"><div class="summary-num" id="completedCount">0</div><div class="summary-label">Completed</div></div>
</div>
<div class="filters">
<div class="filter-field"><label>Rep</label><select id="repFilter"><option value="">All reps</option></select></div>
<div class="filter-field"><label>Account</label><input id="accountFilter" placeholder="Search account..."></div>
<div class="filter-field"><label>Action</label><input id="textFilter" placeholder="Search action..."></div>
</div>
<div class="tabs">
<button class="tab-btn active" data-tab="open">Open</button>
<button class="tab-btn" data-tab="overdue">Overdue</button>
<button class="tab-btn" data-tab="today">Due Today</button>
<button class="tab-btn" data-tab="upcoming">Upcoming</button>
<button class="tab-btn" data-tab="completed">Completed</button>
<button class="tab-btn" data-tab="all">All</button>
</div>
<div id="content"><div class="loading"><div class="spinner"></div>Loading manager actions...</div></div>
<div class="footer">FieldIQ v2.1 · 2026</div>
</div>
<div class="toast" id="toast">Reminder sent.</div>
<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var currentUserId=localStorage.getItem('fieldiq_user_id');
var currentUserName=localStorage.getItem('fieldiq_user_name');
var currentUserRole=localStorage.getItem('fieldiq_user_role')||'';
var openActions=[],completedActions=[],allActions=[],usersByRecordId={},activeTab='open';
if(!currentUserId||!currentUserName){window.location.href='./index.html';throw new Error('No identity locked');}
if(currentUserRole!=='Manager'){window.location.href='./index.html';throw new Error('Managers only');}
function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]);});}
function todayISO(){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString().slice(0,10);}
function formatDate(value){if(!value)return '';try{return new Date(value+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return value;}}
function formatDateTime(value){if(!value)return '';try{return new Date(value).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return value;}}
function getDueState(f){var due=f['Due Date']||'';if((f['Status']||'Open')==='Completed')return 'completed';if(!due)return 'open';if(due<todayISO())return 'overdue';if(due===todayISO())return 'today';return 'upcoming';}
function getAssignedRepName(f){var assigned=f['Assigned Rep']||[];if(assigned.length&&usersByRecordId[assigned[0]])return usersByRecordId[assigned[0]].name;return assigned[0]||'Unassigned';}
function getAssignedRepKey(f){var assigned=f['Assigned Rep']||[];if(assigned.length&&usersByRecordId[assigned[0]])return usersByRecordId[assigned[0]].userId||assigned[0];return assigned[0]||'';}
function reminderLockText(f){var last=f['Last Reminder Sent At'];if(!last)return '';var hours=(Date.now()-new Date(last).getTime())/36e5;if(hours<24){return 'Locked '+Math.ceil(24-hours)+'h';}return '';}
function canSendReminder(f){if((f['Status']||'Open')!=='Open')return false;return !reminderLockText(f);}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg||'Reminder sent.';t.className='toast visible';setTimeout(function(){t.className='toast';},1800);}
async function loadUsers(){try{var res=await fetch(WORKER+'/get-users');var data=await res.json();if(!res.ok)return;(data.records||[]).forEach(function(r){var f=r.fields||{};usersByRecordId[r.id]={name:f['Display Name']||f['User ID']||r.id,userId:f['User ID']||'',role:f['Role']||''};});}catch(e){}}
async function loadActions(){
document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Loading manager actions...</div>';
try{
await loadUsers();
var openRes=await fetch(WORKER+'/get-actions?role=Manager&status=Open');var openData=await openRes.json();if(!openRes.ok)throw new Error(openData.error||'Could not load open actions');
var completedRes=await fetch(WORKER+'/get-actions?role=Manager&status=Completed');var completedData=await completedRes.json();if(!completedRes.ok)completedData={records:[]};
openActions=openData.records||[];
completedActions=(completedData.records||[]).filter(function(r){var completedAt=(r.fields||{})['Completed At'];if(!completedAt)return true;var ageDays=(Date.now()-new Date(completedAt).getTime())/86400000;return ageDays<=7;});
allActions=openActions.concat(completedActions);
buildRepFilter();render();
}catch(err){document.getElementById('content').innerHTML='<div class="error-box">Could not load manager actions.<br>'+escapeHtml(err.message)+'<br><button class="retry-btn" onclick="loadActions()">Retry</button></div>';}
}
function buildRepFilter(){var sel=document.getElementById('repFilter');var existing=sel.value;var reps={};allActions.forEach(function(r){var f=r.fields||{};var key=getAssignedRepKey(f);if(key)reps[key]=getAssignedRepName(f);});sel.innerHTML='<option value="">All reps</option>';Object.keys(reps).sort(function(a,b){return reps[a].localeCompare(reps[b]);}).forEach(function(k){var opt=document.createElement('option');opt.value=k;opt.textContent=reps[k];sel.appendChild(opt);});sel.value=existing;}
function applyFilters(list){var rep=document.getElementById('repFilter').value;var account=document.getElementById('accountFilter').value.trim().toLowerCase();var text=document.getElementById('textFilter').value.trim().toLowerCase();return list.filter(function(r){var f=r.fields||{};if(rep&&getAssignedRepKey(f)!==rep)return false;if(account&&String(f['Account Name']||'').toLowerCase().indexOf(account)===-1)return false;if(text&&String(f['Action Text']||'').toLowerCase().indexOf(text)===-1)return false;return true;});}
function listForTab(){var list=allActions;if(activeTab==='open')list=openActions;else if(activeTab==='completed')list=completedActions;else if(activeTab==='all')list=allActions;else list=openActions.filter(function(r){return getDueState(r.fields||{})===activeTab;});return applyFilters(list);}
function updateCounts(){document.getElementById('openCount').textContent=openActions.length;document.getElementById('overdueCount').textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='overdue';}).length;document.getElementById('todayCount').textContent=openActions.filter(function(r){return getDueState(r.fields||{})==='today';}).length;document.getElementById('completedCount').textContent=completedActions.length;}
function render(){
updateCounts();var list=listForTab();var content=document.getElementById('content');
if(list.length===0){content.innerHTML='<div class="empty"><i data-lucide="check-circle"></i><div>No actions in this view.</div></div>';lucide.createIcons();return;}
content.innerHTML=list.map(function(r){
var f=r.fields||{};var state=getDueState(f);var status=f['Status']||'Open';var pillClass=state==='overdue'?'status-overdue':(status==='Completed'?'status-completed':'status-open');var pillText=status==='Completed'?'Completed':(state==='overdue'?'Overdue':'Open');var repName=getAssignedRepName(f);var due=f['Due Date']||'';var dueTime=f['Due Time']||'';var reminders=f['Reminder Count'];var lastReminder=f['Last Reminder Sent At']||'';var completedAt=f['Completed At']||'';var lock=reminderLockText(f);var disabled=!canSendReminder(f);var btnText=status==='Completed'?'Completed':(lock?('Reminder sent • '+lock):'Send Reminder');
var meta='';meta+='<span class="meta">Rep: '+escapeHtml(repName)+'</span>';if(due)meta+='<span class="meta">Due: '+escapeHtml(formatDate(due))+'</span>';if(dueTime)meta+='<span class="meta">Time: '+escapeHtml(dueTime)+'</span>';meta+='<span class="meta">Reminders: '+escapeHtml(reminders===undefined?'0':reminders)+'</span>';if(lastReminder)meta+='<span class="meta">Last reminder: '+escapeHtml(formatDateTime(lastReminder))+'</span>';if(completedAt)meta+='<span class="meta">Completed: '+escapeHtml(formatDateTime(completedAt))+'</span>';
var button='';if(status!=='Completed'){button='<button class="reminder-btn" onclick="sendReminder(\''+r.id+'\')" id="btn-'+r.id+'" '+(disabled?'disabled':'')+'><i data-lucide="send"></i> '+escapeHtml(btnText)+'</button>';}
return '<div class="action-card"><div class="action-top"><div><div class="account-name">'+escapeHtml(f['Account Name']||'Unknown Account')+'</div><div class="rep-line">'+escapeHtml(repName)+'</div></div><div class="status-pill '+pillClass+'">'+escapeHtml(pillText)+'</div></div><div class="action-text">'+escapeHtml(f['Action Text']||'')+'</div><div class="meta-row">'+meta+'</div>'+button+'</div>';
}).join('');
lucide.createIcons();
}
async function sendReminder(actionId){
var btn=document.getElementById('btn-'+actionId);if(btn){btn.disabled=true;btn.innerHTML='Sending reminder...';}
try{var res=await fetch(WORKER+'/send-reminder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actionId:actionId})});var data=await res.json();if(!res.ok){if(data.locked){throw new Error('Reminder already sent. Available again in '+(data.hoursRemaining||24)+'h.');}throw new Error(data.error||'Could not send reminder');}showToast('Reminder sent.');await loadActions();}
catch(err){alert(err.message);await loadActions();}
}
document.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');activeTab=btn.getAttribute('data-tab');render();});});
document.getElementById('repFilter').addEventListener('change',render);
document.getElementById('accountFilter').addEventListener('input',render);
document.getElementById('textFilter').addEventListener('input',render);
document.addEventListener('DOMContentLoaded',function(){lucide.createIcons();loadActions();});
</script>
</body>
</html>
