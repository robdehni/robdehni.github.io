<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ — Account Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:20px 18px 60px}
.container{max-width:780px;margin:0 auto}
.topbar{text-align:center;margin-bottom:18px}
.topbar h1{font-size:24px;color:#0b1f3a;font-weight:800;letter-spacing:-0.4px}
.topbar p{color:#7a8aa3;font-size:12.5px;margin-top:4px;font-weight:600}
.home-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:14px;border:1px solid #e3ebf5;box-shadow:0 2px 8px rgba(11,31,58,0.05)}
.home-btn:hover{border-color:#2f8fff}
.filter-bar{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.filter-select{width:100%;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;font-size:12.5px;outline:none;font-weight:600}
.filter-select:focus{border-color:#2f8fff}
.search-input{display:none;width:100%;margin-top:10px;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;font-size:12.5px;outline:none;font-weight:600}
.search-input.visible{display:block}
.search-input:focus{border-color:#2f8fff}
.search-input::placeholder{color:#aab8cc;font-weight:400}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.stat-pill{background:#fff;border:1px solid #e3ebf5;border-radius:14px;padding:12px 8px;text-align:center;font-size:11px;color:#7a8aa3;font-weight:700;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.stat-pill span{display:block;font-size:22px;font-weight:800;color:#2f8fff;margin-bottom:3px}
.account-card{background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px 18px;margin-bottom:10px;box-shadow:0 4px 14px rgba(11,31,58,0.05);cursor:pointer;transition:border-color 0.15s}
.account-card:hover{border-color:#2f8fff}
.account-card.open{border-color:#2f8fff}
.account-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.account-name{font-size:15px;font-weight:800;color:#0b1f3a;overflow-wrap:break-word;word-break:break-word}
.account-city{font-size:12px;color:#7a8aa3;font-weight:600;margin-top:2px}
.account-right{text-align:right;flex-shrink:0}
.account-count{font-size:11px;color:#2f8fff;font-weight:800}
.account-last{font-size:11px;color:#aab8cc;font-weight:600;margin-top:2px}
.account-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:10.5px;padding:3px 10px;border-radius:8px;font-weight:700}
.badge-territory{background:#eef3f9;color:#5b6b85}
.badge-positive{background:#e3f8ea;color:#1fa861}
.badge-neutral{background:#fff3e0;color:#d98a1c}
.badge-negative{background:#ffe5e8;color:#e0344a}
.badge-unknown{background:#eef3f9;color:#7a8aa3}
.badge-followup{background:#fff8e1;color:#b8860b}
.badge-high{background:#ffe5e8;color:#e0344a}
.account-meta{font-size:11.5px;color:#aab8cc;font-weight:600}
.account-toggle{font-size:11px;color:#2f8fff;font-weight:700;text-align:center;margin-top:10px;user-select:none}
.intel-panel{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #eef3f9}
.intel-panel.open{display:block}
.intel-section{margin-bottom:14px}
.intel-label{font-size:10px;color:#8a9bb3;text-transform:uppercase;letter-spacing:0.8px;font-weight:800;margin-bottom:6px}
.intel-rep-list{font-size:12.5px;color:#3d4f6b;font-weight:600;line-height:1.6}
.intel-action{font-size:12px;color:#3d4f6b;padding:6px 0;border-bottom:1px solid #f4f8fc;line-height:1.5}
.intel-action:last-child{border-bottom:none}
.intel-action-meta{font-size:10.5px;color:#aab8cc;font-weight:600;margin-bottom:2px}
.intel-visit{background:#f8fafd;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #e3ebf5}
.intel-visit.positive{border-left-color:#1fa861}
.intel-visit.negative{border-left-color:#e0344a}
.intel-visit.neutral{border-left-color:#d98a1c}
.intel-visit-header{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px}
.intel-visit-rep{color:#2f8fff;font-weight:700}
.intel-visit-date{color:#aab8cc;font-weight:600}
.intel-visit-summary{font-size:11px;color:#5b6b85;line-height:1.5}
.intel-history-btn{display:inline-block;margin-top:8px;background:#eaf3ff;color:#2f8fff;border:1px solid #cfe3ff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;text-decoration:none}
.intel-history-btn:hover{background:#dceeff}
.prompt-msg{background:#fff;border:1px solid #e3ebf5;border-radius:14px;padding:30px;text-align:center;color:#7a8aa3;font-size:13.5px;font-weight:600;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.empty{text-align:center;color:#aab8cc;font-size:13.5px;padding:40px 20px;font-weight:600}
.loading{text-align:center;padding:60px;color:#aab8cc;font-weight:600}
.spinner{width:36px;height:36px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:768px){.container{max-width:900px}}
@media(min-width:1100px){.container{max-width:1100px}body{padding:32px 40px 60px}}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
  <h1>FieldIQ</h1>
  <p id="lastUpdated">Loading...</p>
</div>
<a href="./dashboard.html" class="home-btn">← Dashboard</a>

<div class="filter-bar">
  <select class="filter-select" id="territorySelect" onchange="onTerritoryChange(this)">
    <option value="">Select territory first</option>
    <option>UAE</option><option>KSA</option><option>Qatar</option>
    <option>Kuwait</option><option>Bahrain</option><option>Oman</option>
  </select>
  <input type="text" id="accountSearch" class="search-input" placeholder="🔍  Search accounts or cities..." oninput="onSearch(this.value)" autocomplete="off">
</div>

<div class="stats-row" id="statsRow" style="display:none">
  <div class="stat-pill"><span id="statAccounts">—</span>Accounts</div>
  <div class="stat-pill"><span id="statVisits">—</span>Total Visits</div>
  <div class="stat-pill"><span id="statFollowUps">—</span>Open Follow-Ups</div>
</div>

<div id="accountList">
  <div class="prompt-msg">Select a territory to view accounts</div>
</div>
</div>

<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var role=localStorage.getItem('fieldiq_user_role');
if(role!=='Manager'){window.location.href='./index.html';throw new Error('Manager only');}

var allAccounts=[];
var allVisits=[];
var dataLoaded=false;
var selectedTerritory='';

function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function truncate(t,n){if(!t)return'';t=String(t).trim();return t.length>n?t.substring(0,n)+'...':t;}

function getSentiment(s){
  if(!s)return'unknown';s=s.toLowerCase();
  var i=s.indexOf('sentiment');
  if(i>-1){var t=s.substring(i,i+120);if(t.indexOf('positive')>-1)return'positive';if(t.indexOf('negative')>-1)return'negative';if(t.indexOf('neutral')>-1)return'neutral';}
  if(s.indexOf('positive')>-1)return'positive';if(s.indexOf('negative')>-1)return'negative';if(s.indexOf('neutral')>-1)return'neutral';
  return'unknown';
}

function sentBadgeClass(s){
  return s==='positive'?'badge-positive':s==='negative'?'badge-negative':s==='neutral'?'badge-neutral':'badge-unknown';
}

// Primary join: Account linked-record field (array of Airtable record IDs).
// Fallback: Hospital Name text match for visits without Account link.
function getVisitsForAccount(account){
  var accId=account.id;
  var accName=(account.fields['Account Name']||'').trim().toLowerCase();
  return allVisits.filter(function(v){
    var f=v.fields;
    if(f['Account']&&f['Account'].length>0){return f['Account'].indexOf(accId)>-1;}
    return(f['Hospital Name']||'').trim().toLowerCase()===accName;
  });
}

function buildIntelPanel(account,visits){
  if(!visits.length){
    return'<div class="intel-section"><div class="intel-label">Visit History</div><div class="empty" style="padding:12px 0">No visits recorded for this account yet.</div></div>';
  }
  var sorted=visits.slice().sort(function(a,b){
    var da=a.fields['Visit Date']?new Date(a.fields['Visit Date']):new Date(0);
    var db=b.fields['Visit Date']?new Date(b.fields['Visit Date']):new Date(0);
    return db-da;
  });
  var reps={};
  sorted.forEach(function(v){reps[(v.fields['Rep Name']||'Unknown').trim()]=true;});
  var openFollowUps=sorted.filter(function(v){
    var f=v.fields;
    return f['Action Items']&&String(f['Action Items']).trim()&&f['Reviewed']!==true;
  });
  var html='';
  html+='<div class="intel-section"><div class="intel-label">Rep Coverage</div><div class="intel-rep-list">'+Object.keys(reps).join(' · ')+'</div></div>';
  if(openFollowUps.length>0){
    html+='<div class="intel-section"><div class="intel-label">Open Follow-Ups ('+openFollowUps.length+')</div>';
    openFollowUps.slice(0,5).forEach(function(v){
      html+='<div class="intel-action"><div class="intel-action-meta">'+formatDate(v.fields['Visit Date'])+' · '+(v.fields['Rep Name']||'Unknown')+'</div>'+truncate(v.fields['Action Items'],140)+'</div>';
    });
    html+='</div>';
  }
  html+='<div class="intel-section"><div class="intel-label">Recent Visits</div>';
  sorted.slice(0,5).forEach(function(v){
    var f=v.fields;
    var sent=getSentiment(f['AI Summary']||f['Outcome']||'');
    var summary='';
    if(f['AI Summary']){var idx=f['AI Summary'].indexOf('VISIT SUMMARY');summary=idx>-1?f['AI Summary'].substring(idx+13,idx+160).trim():f['AI Summary'].substring(0,160);if(summary.length>=140)summary=summary.substring(0,140)+'...';}
    else if(f['Meeting Notes']){summary=truncate(f['Meeting Notes'],140);}
    html+='<div class="intel-visit '+sent+'"><div class="intel-visit-header"><span class="intel-visit-rep">'+(f['Rep Name']||'Unknown')+'</span><span class="intel-visit-date">'+formatDate(f['Visit Date'])+(f['Priority']?' · '+f['Priority']:'')+'</span></div>'+(summary?'<div class="intel-visit-summary">'+summary+'</div>':'')+'</div>';
  });
  html+='</div>';
  html+='<a href="fieldiq-visit-history.html?territory='+encodeURIComponent(selectedTerritory)+'" class="intel-history-btn">View Visit History →</a>';
  return html;
}

function toggleAccount(accId){
  var panel=document.getElementById('intel-'+accId);
  var toggle=document.getElementById('toggle-'+accId);
  var card=document.getElementById('card-'+accId);
  if(!panel)return;
  var isOpen=panel.classList.contains('open');
  if(isOpen){
    panel.classList.remove('open');
    if(card)card.classList.remove('open');
    toggle.textContent='▾ View account intelligence';
  }else{
    if(!panel.getAttribute('data-rendered')){
      var account=allAccounts.find(function(a){return a.id===accId;});
      if(account){panel.innerHTML=buildIntelPanel(account,getVisitsForAccount(account));panel.setAttribute('data-rendered','1');}
    }
    panel.classList.add('open');
    if(card)card.classList.add('open');
    toggle.textContent='▴ Collapse';
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function getFilteredAccounts(territory,query){
  var q=(query||'').trim().toLowerCase();
  return allAccounts.filter(function(acc){
    var f=acc.fields;
    if(territory&&(f['Territory']||'').trim()!==territory)return false;
    if(q){var name=(f['Account Name']||'').toLowerCase();var city=(f['City']||'').toLowerCase();if(name.indexOf(q)===-1&&city.indexOf(q)===-1)return false;}
    return true;
  });
}

function renderAccounts(accounts){
  var listEl=document.getElementById('accountList');
  if(!accounts.length){
    listEl.innerHTML='<div class="empty">No accounts found in this territory.</div>';
    document.getElementById('statsRow').style.display='none';
    return;
  }
  var totalVisits=0,totalFollowUps=0;
  accounts.forEach(function(acc){
    var visits=getVisitsForAccount(acc);
    totalVisits+=visits.length;
    visits.forEach(function(v){if(v.fields['Action Items']&&String(v.fields['Action Items']).trim()&&v.fields['Reviewed']!==true)totalFollowUps++;});
  });
  document.getElementById('statAccounts').textContent=accounts.length;
  document.getElementById('statVisits').textContent=totalVisits;
  document.getElementById('statFollowUps').textContent=totalFollowUps;
  document.getElementById('statsRow').style.display='grid';

  var html='';
  accounts.forEach(function(acc){
    var f=acc.fields;var id=acc.id;
    var name=f['Account Name']||'Unknown';var city=f['City']||'';var territory=f['Territory']||'';
    var visits=getVisitsForAccount(acc);var count=visits.length;
    var sorted=visits.slice().sort(function(a,b){var da=a.fields['Visit Date']?new Date(a.fields['Visit Date']):new Date(0);var db=b.fields['Visit Date']?new Date(b.fields['Visit Date']):new Date(0);return db-da;});
    var lastVisit=sorted[0]||null;
    var lastDate=lastVisit?formatDate(lastVisit.fields['Visit Date']):'No visits';
    var lastRep=lastVisit?(lastVisit.fields['Rep Name']||'Unknown'):'—';
    var latestSent=lastVisit?getSentiment(lastVisit.fields['AI Summary']||lastVisit.fields['Outcome']||''):'unknown';
    var openActions=visits.filter(function(v){return v.fields['Action Items']&&String(v.fields['Action Items']).trim()&&v.fields['Reviewed']!==true;}).length;
    var highUnreviewed=visits.filter(function(v){return v.fields['Priority']==='High'&&v.fields['Reviewed']!==true;}).length;
    html+=
      '<div class="account-card" id="card-'+id+'" onclick="toggleAccount(\''+id+'\')">'+
        '<div class="account-header">'+
          '<div><div class="account-name">'+name+'</div>'+(city?'<div class="account-city">'+city+'</div>':'')+
          '</div>'+
          '<div class="account-right"><div class="account-count">'+count+' visit'+(count!==1?'s':'')+'</div><div class="account-last">Last: '+lastDate+'</div></div>'+
        '</div>'+
        '<div class="account-badges">'+
          '<span class="badge badge-territory">'+territory+'</span>'+
          '<span class="badge '+sentBadgeClass(latestSent)+'">'+latestSent+'</span>'+
          (openActions>0?'<span class="badge badge-followup">'+openActions+' follow-up'+(openActions!==1?'s':'')+'</span>':'')+
          (highUnreviewed>0?'<span class="badge badge-high">'+highUnreviewed+' high priority</span>':'')+
        '</div>'+
        '<div class="account-meta">Last rep: '+lastRep+'</div>'+
        '<div class="account-toggle" id="toggle-'+id+'">▾ View account intelligence</div>'+
        '<div class="intel-panel" id="intel-'+id+'"></div>'+
      '</div>';
  });
  listEl.innerHTML=html;
}

function onTerritoryChange(sel){
  selectedTerritory=sel.value;
  var searchEl=document.getElementById('accountSearch');
  searchEl.value='';
  if(!selectedTerritory){
    searchEl.classList.remove('visible');
    document.getElementById('accountList').innerHTML='<div class="prompt-msg">Select a territory to view accounts</div>';
    document.getElementById('statsRow').style.display='none';
    return;
  }
  searchEl.classList.add('visible');
  if(!dataLoaded){document.getElementById('accountList').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';return;}
  renderAccounts(getFilteredAccounts(selectedTerritory,''));
}

function onSearch(query){
  if(!selectedTerritory||!dataLoaded)return;
  renderAccounts(getFilteredAccounts(selectedTerritory,query));
}

async function loadData(){
  try{
    var results=await Promise.all([fetch(WORKER+'/get-accounts'),fetch(WORKER+'/get-visits')]);
    var accData=await results[0].json();
    var visData=await results[1].json();
    if(!results[0].ok)throw new Error('Accounts: '+JSON.stringify(accData));
    if(!results[1].ok)throw new Error('Visits: '+JSON.stringify(visData));
    allAccounts=(accData.records||[]).sort(function(a,b){return(a.fields['Account Name']||'').localeCompare(b.fields['Account Name']||'');});
    allVisits=visData.records||[];
    dataLoaded=true;
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();
    if(selectedTerritory){renderAccounts(getFilteredAccounts(selectedTerritory,''));}
  }catch(err){
    document.getElementById('lastUpdated').textContent='Load error';
    document.getElementById('accountList').innerHTML='<div class="empty">Failed to load data.<br>'+err.message+'</div>';
  }
}

loadData();
</script>
</body>
</html>
