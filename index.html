<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 50px}

/* ── Brand block — matches fieldiq.html reference ── */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-cloud{font-size:26px;line-height:1}
.brand-text h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}
.brand-text h1 span{color:#2f8fff}
.brand-text p{font-size:10px;color:#8a9bb3;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.logo{text-align:left;margin-bottom:28px}

.modules{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}

/* ── Module cards — standardised to fieldiq.html spec ── */
.module{
  display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #e3ebf5;border-radius:18px;
  padding:18px 20px;text-decoration:none;color:#0b1f3a;box-shadow:0 4px 14px rgba(11,31,58,0.05);transition:transform 0.15s;
}
.module:active{transform:scale(0.98)}
.module-icon-wrap{
  width:50px;height:50px;border-radius:14px;background:#eaf3ff;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}
.module-icon-wrap [data-lucide]{width:26px;height:26px;stroke-width:1.8;color:#2f8fff}
.module-text{flex:1}
.module-title{font-size:15.5px;font-weight:800;color:#0b1f3a;margin-bottom:2px}
.module-desc{font-size:12px;color:#7a8aa3;font-weight:500}
.module-arrow{color:#aab8cc;font-size:18px;font-weight:700}

.module.primary{border-color:transparent;background:linear-gradient(135deg,#3d9bff,#1f6fe0);box-shadow:0 10px 26px rgba(47,143,255,0.32)}
.module.primary .module-title{color:#fff}
.module.primary .module-desc{color:#dbecff}
.module.primary .module-icon-wrap{background:#fff}
.module.primary .module-icon-wrap [data-lucide]{color:#2f8fff}
.module.primary .module-arrow{color:#fff}

/* ── Section labels — matches fieldiq.html ── */
.section-label{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin:22px 0 10px;width:100%;max-width:380px}

.footer{margin-top:32px;text-align:center;color:#aab8cc;font-size:11px;font-weight:600}

/* ── Identity / PIN components — unchanged ── */
.user-locked{
  width:100%;max-width:380px;display:flex;align-items:center;justify-content:space-between;
  background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:14px 18px;margin-bottom:18px;
  box-shadow:0 4px 14px rgba(11,31,58,0.05);
}
.user-locked-info{display:flex;align-items:center;gap:10px}
.user-locked-avatar{font-size:20px}
.user-locked-name{font-size:14.5px;font-weight:700;color:#0b1f3a}
.user-locked-role{font-size:11px;color:#8a9bb3;margin-top:2px;font-weight:600}
.switch-user-btn{font-size:11px;color:#2f8fff;background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px;font-weight:600}
.switch-user-btn:hover{color:#1f6fe0}

.user-select-box{width:100%;max-width:380px;margin-bottom:16px}
.user-select-box label{font-size:11px;color:#8a9bb3;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:0.6px;font-weight:700}
.user-select-box select{
  width:100%;padding:14px;background:#fff;border:1.5px solid #dde8f5;border-radius:14px;color:#0b1f3a;
  font-size:15px;outline:none;font-weight:600;box-shadow:0 4px 14px rgba(11,31,58,0.05);
}
.user-select-box select:focus{border-color:#2f8fff}

.pin-box{
  width:100%;max-width:380px;margin-bottom:16px;background:#fff;border:1px solid #e3ebf5;
  border-radius:16px;padding:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05);
}
.pin-box label{font-size:11px;color:#8a9bb3;margin-bottom:10px;display:block;text-transform:uppercase;letter-spacing:0.6px;font-weight:700}
.pin-box input{
  width:100%;padding:16px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:12px;color:#0b1f3a;
  font-size:20px;letter-spacing:6px;text-align:center;outline:none;font-weight:700;
}
.pin-box input:focus{border-color:#2f8fff}
.pin-box .pin-btn{
  width:100%;padding:14px;margin-top:12px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;font-size:14.5px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 16px rgba(47,143,255,0.3);
}
.pin-error{color:#e0344a;font-size:12px;margin-top:10px;text-align:center;display:none;font-weight:600}
.pin-error.visible{display:block}
.pin-cancel{font-size:12px;color:#8a9bb3;text-align:center;margin-top:12px;display:block;cursor:pointer;text-decoration:underline;font-weight:600}
</style>
</head>
<body>

<div class="logo">
  <div class="brand">
    <span class="brand-cloud">☁️</span>
    <div class="brand-text">
      <h1>Field<span>IQ</span></h1>
      <p>Territory Intelligence Platform</p>
    </div>
  </div>
</div>

<div id="identitySection" style="width:100%;max-width:380px"></div>

<div id="modulesSection"></div>

<div class="footer">FieldIQ v2.1 · 2026</div>

<script>
var WORKER='https://fieldiq-proxy.rdehni1979.workers.dev';
var pendingUser=null;

function switchUser(){
  localStorage.removeItem('fieldiq_user_id');
  localStorage.removeItem('fieldiq_user_name');
  localStorage.removeItem('fieldiq_user_role');
  pendingUser=null;
  location.reload();
}

function renderIdentity(){
  var section=document.getElementById('identitySection');
  var savedId=localStorage.getItem('fieldiq_user_id');
  var savedName=localStorage.getItem('fieldiq_user_name');
  var savedRole=localStorage.getItem('fieldiq_user_role');

  if(savedId && savedName){
    section.innerHTML=
      '<div class="user-locked">'+
        '<div class="user-locked-info">'+
          '<div class="user-locked-avatar">👤</div>'+
          '<div>'+
            '<div class="user-locked-name">'+savedName+'</div>'+
            '<div class="user-locked-role">'+(savedRole||'Sales Rep')+'</div>'+
          '</div>'+
        '</div>'+
        '<button class="switch-user-btn" onclick="switchUser()">Switch User</button>'+
      '</div>';
  } else {
    section.innerHTML=
      '<div class="user-select-box">'+
        '<label>Who are you?</label>'+
        '<select id="homeUserSelect"><option value="">Loading users...</option></select>'+
      '</div>'+
      '<div id="pinSection"></div>';
    loadUsers();
  }
}

function showPinBox(opt){
  pendingUser={
    id: opt.value,
    name: opt.getAttribute('data-name')||opt.value,
    role: opt.getAttribute('data-role')||'Sales Rep',
    pin: opt.getAttribute('data-pin')||''
  };
  var pinSection=document.getElementById('pinSection');
  pinSection.innerHTML=
    '<div class="pin-box">'+
      '<label>Enter PIN for '+pendingUser.name+'</label>'+
      '<input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="••••">'+
      '<button class="pin-btn" id="pinSubmitBtn">Confirm</button>'+
      '<div class="pin-error" id="pinError">Incorrect PIN. Please try again.</div>'+
      '<span class="pin-cancel" id="pinCancel">Cancel</span>'+
    '</div>';

  document.getElementById('pinSubmitBtn').addEventListener('click',checkPin);
  document.getElementById('pinInput').addEventListener('keydown',function(e){
    if(e.key==='Enter')checkPin();
  });
  document.getElementById('pinCancel').addEventListener('click',function(){
    pendingUser=null;
    document.getElementById('pinSection').innerHTML='';
    document.getElementById('homeUserSelect').value='';
  });
  document.getElementById('pinInput').focus();
}

function checkPin(){
  var entered=document.getElementById('pinInput').value.trim();
  var errorEl=document.getElementById('pinError');
  if(!pendingUser){return;}
  if(entered && entered===String(pendingUser.pin)){
    localStorage.setItem('fieldiq_user_id',pendingUser.id);
    localStorage.setItem('fieldiq_user_name',pendingUser.name);
    localStorage.setItem('fieldiq_user_role',pendingUser.role);
    if(pendingUser.role==='Manager'){
      window.location.href='./fieldiq.html';
      return;
    }
    pendingUser=null;
    renderIdentity();
    renderModules();
  } else {
    errorEl.className='pin-error visible';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').focus();
  }
}

async function loadUsers(){
  try{
    var res=await fetch(WORKER+'/get-users');
    var data=await res.json();
    var sel=document.getElementById('homeUserSelect');
    if(!sel)return;
    sel.innerHTML='<option value="">Select your name...</option>';
    if(data.records){
      data.records.forEach(function(r){
        var f=r.fields;
        if(f['Active?']===false)return;
        var opt=document.createElement('option');
        opt.value=f['User ID']||'';
        opt.textContent=(f['Display Name']||f['User ID']||'Unknown');
        opt.setAttribute('data-name',f['Display Name']||'');
        opt.setAttribute('data-role',f['Role']||'Sales Rep');
        opt.setAttribute('data-pin',f['PIN']||'');
        sel.appendChild(opt);
      });
    }
    sel.addEventListener('change',function(){
      if(!sel.value){
        document.getElementById('pinSection').innerHTML='';
        return;
      }
      var selectedOpt=sel.options[sel.selectedIndex];
      showPinBox(selectedOpt);
    });
  }catch(err){
    var sel=document.getElementById('homeUserSelect');
    if(sel)sel.innerHTML='<option value="">Could not load users</option>';
  }
}

function renderModules(){
  var role=localStorage.getItem('fieldiq_user_role');
  var section=document.getElementById('modulesSection');
  var isManager=(role==='Manager');

  var html='<div class="modules">';

  if(isManager){
    html+='<div class="section-label">Management</div>';
    html+=
      '<a class="module primary" href="./dashboard.html">'+
        '<div class="module-icon-wrap"><i data-lucide="layout-dashboard"></i></div>'+
        '<div class="module-text">'+
          '<div class="module-title">Dashboard</div>'+
          '<div class="module-desc">KPIs, rep performance, territory coverage, filters</div>'+
        '</div>'+
        '<div class="module-arrow">›</div>'+
      '</a>'+
      '<a class="module" href="./fieldiq-actions.html">'+
        '<div class="module-icon-wrap"><i data-lucide="check-square"></i></div>'+
        '<div class="module-text">'+
          '<div class="module-title">Open Actions</div>'+
          '<div class="module-desc">Outstanding action items by account and rep</div>'+
        '</div>'+
        '<div class="module-arrow">›</div>'+
      '</a>'+
      '<a class="module" href="./fieldiq-visits-map.html">'+
        '<div class="module-icon-wrap"><i data-lucide="map-pin"></i></div>'+
        '<div class="module-text">'+
          '<div class="module-title">Visit Map</div>'+
          '<div class="module-desc">Live GPS map of all field activity across GCC</div>'+
        '</div>'+
        '<div class="module-arrow">›</div>'+
      '</a>'+
      '<a class="module" href="./fieldiq-insights.html">'+
        '<div class="module-icon-wrap"><i data-lucide="brain-circuit"></i></div>'+
        '<div class="module-text">'+
          '<div class="module-title">AI Insights</div>'+
          '<div class="module-desc">Account intelligence, territory trends, institutional memory</div>'+
        '</div>'+
        '<div class="module-arrow">›</div>'+
      '</a>';
    html+='<div class="section-label">Field Operations</div>';
  }

  html+=
    '<a class="module'+(isManager?'':' primary')+'" href="./fieldiq-log-visit.html">'+
      '<div class="module-icon-wrap"><i data-lucide="mic"></i></div>'+
      '<div class="module-text">'+
        '<div class="module-title">Log Visit</div>'+
        '<div class="module-desc">Record a field visit — voice to intelligence</div>'+
      '</div>'+
      '<div class="module-arrow">›</div>'+
    '</a>'+
    '<a class="module" href="./fieldiq-visit-history.html">'+
      '<div class="module-icon-wrap"><i data-lucide="clock"></i></div>'+
      '<div class="module-text">'+
        '<div class="module-title">Visit History</div>'+
        '<div class="module-desc">Your logged visits — dates, accounts, summaries</div>'+
      '</div>'+
      '<div class="module-arrow">›</div>'+
    '</a>';

  html+='<div class="section-label">Help</div>'+
    '<a class="module" href="./fieldiq-guide.html">'+
      '<div class="module-icon-wrap"><i data-lucide="book-open"></i></div>'+
      '<div class="module-text">'+
        '<div class="module-title">Quick Start Guide</div>'+
        '<div class="module-desc">How to use FieldIQ</div>'+
      '</div>'+
      '<div class="module-arrow">›</div>'+
    '</a>';

  html+='</div>';
  section.innerHTML=html;
  lucide.createIcons();
}

if (localStorage.getItem('fieldiq_user_role') === 'Manager') {
  window.location.href = './fieldiq.html';
  throw new Error('Manager redirected to portal');
}
renderIdentity();
renderModules();
</script>
</body>
</html>
