<title>FieldIQ — Voice Capture Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 24px; padding-top: 16px; }
.header h1 { font-size: 28px; color: #00d4ff; font-weight: 700; }
.header p { color: #888; font-size: 13px; margin-top: 4px; }
.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
.field label { font-size: 11px; color: #888; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { width: 100%; padding: 11px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
.field select option { background: #1a1a1a; }
.hospital-wrapper { position: relative; }
.hospital-list { display: none; position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 999; }
.hospital-list.open { display: block; }
.hospital-option { padding: 10px 11px; font-size: 13px; color: #ccc; cursor: pointer; border-bottom: 1px solid #222; }
.hospital-option:last-child { border-bottom: none; }
.hospital-option:hover { background: #252525; color: #00d4ff; }
.voice-section { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 24px; margin: 20px 0; text-align: center; }
.voice-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
.record-btn { width: 88px; height: 88px; border-radius: 50%; border: 3px solid #00d4ff; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.record-btn.active { border-color: #ff4444; }
.record-icon { width: 32px; height: 32px; border-radius: 50%; background: #00d4ff; }
.record-btn.active .record-icon { background: #ff4444; border-radius: 6px; width: 26px; height: 26px; }
.record-status { font-size: 14px; color: #888; margin-bottom: 8px; }
.record-status.recording { color: #ff6666; }
.record-status.done { color: #00ff88; }
.timer { font-size: 36px; font-weight: 700; color: #333; letter-spacing: 3px; margin-bottom: 20px; }
.timer.active { color: #ff4444; }
.timer.done { color: #00d4ff; }
.stop-btn { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ff4444; background: transparent; color: #ff4444; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 12px; display: none; }
.stop-btn.visible { display: block; }
.playback-section { margin-top: 16px; display: none; text-align: left; }
.playback-section.visible { display: block; }
.playback-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
audio { width: 100%; border-radius: 8px; margin-bottom: 16px; }
.notes-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
.notes-box { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px; color: #ccc; font-size: 14px; line-height: 1.7; min-height: 100px; resize: vertical; font-family: -apple-system, sans-serif; outline: none; }
.process-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #00d4ff; color: #000; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; display: none; }
.process-btn.visible { display: block; }
