<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rep Review Report — FieldIQ</title>
<style>
*{box-sizing:border-box}
body{background:#f4f8fc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0b1f3a;padding:30px;max-width:800px;margin:0 auto;min-height:100vh}
h1{font-size:20px;font-weight:800;margin-bottom:4px;color:#0b1f3a}
.rr-meta{color:#5b6b85;font-size:12.5px;margin-bottom:24px}
.rr-meta div{margin-bottom:3px}
.rr-meta strong{color:#0b1f3a}
h2{font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:#2f8fff;border-bottom:2px solid #eaf3ff;padding-bottom:6px;margin:26px 0 12px;page-break-after:avoid}
.rr-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px}
.rr-stat{background:#fff;border:1px solid #e3ebf5;border-radius:8px;padding:10px 12px}
.rr-stat .num{font-size:20px;font-weight:800;color:#2f8fff}
.rr-stat .label{font-size:11px;color:#5b6b85}
.rr-count-row{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;border-bottom:1px solid #f0f3f8}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
th{text-align:left;background:#f4f8fc;padding:6px 8px;font-size:10.5px;text-transform:uppercase;color:#5b6b85;border-bottom:1px solid #e3ebf5}
td{padding:6px 8px;border-bottom:1px solid #f0f3f8;color:#3a4a63}
tr:last-child td{border-bottom:none}
.rr-highlight{border:1px solid #eaf3ff;border-radius:8px;padding:10px 12px;margin-bottom:8px;page-break-inside:avoid;background:#fff}
.rr-highlight-head{font-size:12.5px;margin-bottom:4px;color:#0b1f3a}
.rr-priority-tag{font-weight:700;color:#d9534f}
.rr-highlight-body{font-size:12px;color:#3a4a63;line-height:1.5}
.rr-empty{color:#aab8cc;font-style:italic;font-size:12px}
ul{font-size:13px;line-height:1.8;padding-left:18px;margin:0}
li{margin-bottom:4px}
.action-bar{display:flex;gap:10px;margin-bottom:24px;align-items:center;flex-wrap:wrap}
.btn-print{background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(47,143,255,0.3)}
.btn-back{background:#fff;color:#2f8fff;border:1.5px solid #e3ebf5;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-back:hover{border-color:#2f8fff}
.state-msg{text-align:center;padding:80px 24px;color:#7a8aa3;font-size:14px;font-weight:600}
.state-msg a{color:#2f8fff;font-weight:700;text-decoration:none}
@media print{
  body{background:#fff;padding:20px}
  .no-print{display:none!important}
  h2{border-bottom:1px solid #cfe3ff}
  .rr-stat{border:1px solid #e3ebf5}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  var root=document.getElementById('root');

  // ── READ PAYLOAD ────────────────────────────────────────────────────────────
  var raw=null;
  try{raw=sessionStorage.getItem('fieldiq_report');}catch(e){}

  if(!raw){
    root.innerHTML='<div class="state-msg">No report data found.<br><br><a href="./dashboard.html">← Return to Dashboard</a></div>';
    return;
  }

  var d=null;
  try{d=JSON.parse(raw);}catch(e){}

  if(!d||!d.meta||!d.html){
    root.innerHTML='<div class="state-msg">Report data could not be read.<br><br><a href="./dashboard.html">← Return to Dashboard</a></div>';
    return;
  }

  // Clear immediately — data is now in memory, no need to persist
  try{sessionStorage.removeItem('fieldiq_report');}catch(e){}

  // ── RENDER ──────────────────────────────────────────────────────────────────
  var m=d.meta;
  var s=d.summary;
  var h=d.html;

  document.title='Rep Review Report — '+m.rep;

  var promptItems=(d.prompts||[]).map(function(p){return'<li>'+p+'</li>';}).join('');

  root.innerHTML=
    '<div class="action-bar no-print">'+
      '<button class="btn-print" onclick="window.print()">🖨️ Print / Save as PDF</button>'+
      '<a href="./dashboard.html" class="btn-back">← Back to Dashboard</a>'+
    '</div>'+

    '<h1>Rep Review Report</h1>'+
    '<div class="rr-meta">'+
      '<div><strong>Rep:</strong> '+m.rep+'</div>'+
      '<div><strong>Territory:</strong> '+m.terr+'</div>'+
      '<div><strong>Reporting Period:</strong> '+m.periodLabel+' ('+m.startLabel+' \u2013 '+m.endLabel+')</div>'+
      '<div><strong>Generated:</strong> '+m.generated+'</div>'+
    '</div>'+

    '<h2>Activity Summary</h2>'+
    '<div class="rr-summary-grid">'+
      '<div class="rr-stat"><div class="num">'+s.totalVisits+'</div><div class="label">Total Visits</div></div>'+
      '<div class="rr-stat"><div class="num">'+s.accountsVisited+'</div><div class="label">Accounts Visited</div></div>'+
      '<div class="rr-stat"><div class="num">'+s.newAccountsCount+'</div><div class="label">New Accounts Discovered</div></div>'+
      '<div class="rr-stat"><div class="num">'+s.highPriorityCount+'</div><div class="label">High Priority Visits</div></div>'+
    '</div>'+
    '<div class="rr-summary-grid" style="margin-top:14px">'+
      '<div><strong style="font-size:12px">Visit Type</strong>'+(s.visitTypeHtml||'<div class="rr-count-row"><span>—</span><span>0</span></div>')+'</div>'+
      '<div><strong style="font-size:12px">Sentiment / Outcome</strong>'+(s.outcomeHtml||'<div class="rr-count-row"><span>—</span><span>0</span></div>')+'</div>'+
    '</div>'+
    '<div style="margin-top:10px"><strong style="font-size:12px">Priority</strong>'+(s.priorityHtml||'')+'</div>'+

    '<h2>Accounts Visited</h2>'+
    '<table><thead><tr><th>Account</th><th>Territory</th><th>Date</th><th>Visit Type</th><th>Priority</th><th>Outcome</th></tr></thead><tbody>'+h.visitRows+'</tbody></table>'+

    '<h2>New Accounts Discovered</h2>'+
    '<table><thead><tr><th>Account</th><th>Territory</th><th>Rep</th><th>Date</th><th>Review Status</th></tr></thead><tbody>'+h.newAccountRows+'</tbody></table>'+

    '<h2>High Priority / Opportunity Highlights</h2>'+
    (h.highPriorityBlocks||'<p class="rr-empty">No High Priority visits this period.</p>')+

    '<h2>Open Follow-Ups Required</h2>'+
    '<table><thead><tr><th>Account</th><th>Rep</th><th>Date</th><th>Action Items</th></tr></thead><tbody>'+h.followUpRows+'</tbody></table>'+

    '<h2>Manager Discussion / Coaching Prompts</h2>'+
    '<ul>'+promptItems+'</ul>';
})();
</script>
</body>
</html>
