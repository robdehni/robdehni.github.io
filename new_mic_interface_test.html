<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROB AUDIO TEST 123</title>
<style>
body { margin: 0; background: #ff0000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; }
h1 { color: white; font-size: 32px; margin-bottom: 40px; }
button { width: 250px; height: 100px; font-size: 28px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; margin: 10px; }
#btn1 { background: white; color: #ff0000; }
#btn2 { background: #333; color: white; }
#msg { color: white; font-size: 20px; margin: 20px; }
audio { width: 280px; margin-top: 20px; }
</style>
</head>
<body>
<h1>ROB AUDIO TEST 123</h1>
<button id="btn1" onclick="go()">RECORD</button>
<button id="btn2" onclick="halt()" disabled>STOP</button>
<div id="msg">Ready</div>
<audio id="ap" controls style="display:none"></audio>
<script>
var r, c=[];
async function go(){
  c=[];
  var s = await navigator.mediaDevices.getUserMedia({audio:true});
  r = new MediaRecorder(s);
  r.ondataavailable = function(e){ if(e.data.size>0) c.push(e.data); };
  r.onstop = function(){
    var b = new Blob(c,{type:'audio/webm'});
    var a = document.getElementById('ap');
    a.src = URL.createObjectURL(b);
    a.style.display='block';
    document.getElementById('msg').textContent='Done! Press play.';
    s.getTracks().forEach(function(t){t.stop();});
  };
  r.start();
  document.getElementById('msg').textContent='Recording...';
  document.getElementById('btn1').disabled=true;
  document.getElementById('btn2').disabled=false;
}
function halt(){
  r.stop();
  document.getElementById('btn1').disabled=false;
  document.getElementById('btn2').disabled=true;
  document.getElementById('msg').textContent='Stopped.';
}
</script>
</body>
</html>
